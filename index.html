        const lemmaMatch = lemmaMap.get(key) || getDictionaryAnalysisIndexEntry(key);
        if (!lemmaMatch?.lemma) continue;
        result.baseForm = lemmaMatch.lemma || d.form;
        result.pos = lemmaMatch.pos || result.pos;
        result.reading = lemmaMatch.readingKana || null;
        result.analysisSource = d.reason === 'exact' ? 'exact-dict' : 'deinflected-dict';
        result.analysisScore = d.reason === 'exact' ? 115 : 95;
        cache.set(memoKey, result);
        return result;
      }
      cache.set(memoKey, result);
      return result;
    }

    function scoreJapaneseSpanCandidate(candidate, context = {}) {
      const spanSurface = candidate.surface;
      const partSurfaces = candidate.parts.map((p) => normalizeTokenSurface(p.surface || ''));
      const normalizedSpanSurface = normalizeTokenSurface(spanSurface);
      const prevSurface = normalizeTokenSurface(context.prevSurface || '');
      const nextSurface = normalizeTokenSurface(context.nextSurface || '');
      let score = 0;
      const analysis = resolveTokenAnalysisFromDictionary(spanSurface, context);
      if (analysis?.analysisSource === 'exact-dict') score += 120;
      if (analysis?.analysisSource === 'deinflected-dict') score += 104;

      if (candidate.parts.length > 1) score += 6 + Math.min(candidate.parts.length - 1, 4) * 4;
      const joinedContainsParticle = candidate.parts.length > 1 && partSurfaces.some((s) => isLikelyParticleSurface(s));
      if (joinedContainsParticle) score -= 520;

      const lastPart = partSurfaces[partSurfaces.length - 1] || '';
      if (candidate.parts.length > 1 && isLikelyParticleSurface(lastPart)) score -= 1200;

      const firstPart = partSurfaces[0] || '';
      if (candidate.parts.length > 1 && isLikelyParticleSurface(firstPart)) score -= 1200;
      if (candidate.parts.length === 1 && isSingleKanji(firstPart)) {
        if (isKanaOnly(nextSurface) && !isLikelyParticleSurface(nextSurface)) {
          const extra = analysis?.analysisSource === 'exact-dict' ? 160 : 90;
          score -= extra;
        }
      }

      if (candidate.parts.length === 1 && prevSurface && isSuspiciousStandaloneInflectionToken(normalizedSpanSurface) && isJapaneseText(prevSurface)) {
        score -= 92;
      }
      if (candidate.parts.length === 1 && isLikelyInflectionContinuation(normalizedSpanSurface) && prevSurface && isJapaneseText(prevSurface)) {
        score -= 42;
      }
      if (candidate.parts.length === 1 && nextSurface && isLikelyInflectionContinuation(nextSurface) && isJapaneseText(normalizedSpanSurface)) {
        score -= 38;
      }

      if (candidate.parts.length === 1 && prevSurface && isSingleKanji(prevSurface) && isKanaOnly(normalizedSpanSurface)
          && !isLikelyParticleSurface(normalizedSpanSurface) && !isSuspiciousStandaloneInflectionToken(normalizedSpanSurface)) {
        score -= 140;
      }

      for (let i = 0; i < partSurfaces.length - 1; i++) {
        const left = partSurfaces[i];
        const right = partSurfaces[i + 1];
        if (isLikelyParticleSurface(right)) continue;
        if (isSingleKanji(left) && /^[ぁ-ゖ]/u.test(right || '')) score += 24;
        if (INFLECTION_CONTINUATION_SET.has(right)) score += 28;
        if (isLikelyInflectionContinuation(right)) score += 10;
        if (right === 'っぱなし' || right === 'かけ' || right === '上がっ' || right === '上がった') score += 28;
      }

      if (analysis?.analysisSource === 'deinflected-dict' && candidate.parts.length > 1) score += 22;
      if (analysis?.analysisSource === 'exact-dict' && candidate.parts.length > 1) score += 10;
      if (/[\p{Script=Han}][ぁ-ゖ].*(て|で|た)$/u.test(spanSurface)) score += 24;
      if (/[\p{Script=Han}][ぁ-ゖ].*ず$/u.test(spanSurface)) score += 34;
      if (containsKanji(spanSurface) && /く$/u.test(spanSurface)) score += 20;
      if (/(て|で)くれ(た|て|る)$/u.test(spanSurface)) score += 54;
      if (/(て|で)お(く|いた)$/u.test(spanSurface)) score += 34;
      if (/[\p{Script=Han}][ぁ-ゖ]+っぱなし$/u.test(spanSurface)) score += 42;
      if (/[\p{Script=Han}][ぁ-ゖ]+かけ(た|て)$/u.test(spanSurface)) score += 36;
      if (/[\p{Script=Han}][ぁ-ゖ].*られそう$/u.test(spanSurface)) score += 62;
      if (candidate.parts.length >= 5 && isKanaOnly(spanSurface)) score -= 10;
      if (candidate.parts.length >= 6 && spanSurface.length >= 10) score -= 6;
      if (/(て|で)くれたら$/u.test(spanSurface)) score += 72;
      if (candidate.parts.length > 1 && /^(から|なら|また|でも|そして)/u.test(spanSurface)) score -= 64;
      if (candidate.parts.length > 1 && /(から|なら|ので|のに|けど|けれど)$/u.test(spanSurface)) score -= 48;
      if (candidate.parts.length > 1 && /(?:たら)(?!$).+/u.test(spanSurface)) score -= 54;
      if (containsKanji(spanSurface) && /くな(?:った|って|る|れた|れて|れる)$/u.test(spanSurface)) score -= 82;
      if (candidate.parts.length > 1 && analysis?.analysisSource === 'heuristic') {
        for (let i = 0; i < partSurfaces.length - 1; i++) {
          const left = partSurfaces[i];
          const right = partSurfaces[i + 1];
          if (/^[ぁ-ゖー]+$/u.test(left) && /[\p{Script=Han}]/u.test(right)) score -= 36;
          if (/[\p{Script=Han}]/u.test(left) && /^[ぁ-ゖー]+$/u.test(right) && !isLikelyInflectionContinuation(right)) score -= 18;
        }
      }
      return {
        ...candidate,
        analysis,
        score
      };
    }

    function buildJapaneseSpanCandidates(runTokens, startIndex, maxSpan = MAX_JAPANESE_SPAN_TOKENS) {
      const candidates = [];
      const cap = Math.min(runTokens.length, startIndex + maxSpan);
      const firstSurface = normalizeTokenSurface(runTokens[startIndex]?.surface || '');
      if (isLikelyParticleSurface(firstSurface)) {
        const parts = runTokens.slice(startIndex, startIndex + 1);
        candidates.push({
          startIndex,
          endIndexExclusive: startIndex + 1,
          parts,
          surface: parts[0]?.surface || '',
          startOffset: parts[0]?.startOffset ?? 0,
          endOffset: parts[0]?.endOffset ?? 0
        });
        return candidates;
      }
      for (let endExclusive = startIndex + 1; endExclusive <= cap; endExclusive++) {
        const parts = runTokens.slice(startIndex, endExclusive);
        const surface = parts.map((p) => p.surface || '').join('');
        const normParts = parts.map((p) => normalizeTokenSurface(p.surface || ''));
        if (parts.length > 1 && normParts.some((s) => isLikelyParticleSurface(s))) continue;
        const last = normParts[normParts.length - 1] || '';
        if (parts.length > 1 && isLikelyParticleSurface(last)) continue;
        candidates.push({
          startIndex,
          endIndexExclusive: endExclusive,
          parts,
          surface,
          startOffset: parts[0]?.startOffset ?? 0,
          endOffset: parts[parts.length - 1]?.endOffset ?? 0
        });
      }
      return candidates;
    }

    function chooseBestJapaneseTokenPath(scoredByStart, runLength) {
      const dp = new Array(runLength + 1).fill(null);
      dp[runLength] = { score: 0, next: null };
      for (let i = runLength - 1; i >= 0; i--) {
        const candidates = scoredByStart.get(i) || [];
        let best = { score: Number.NEGATIVE_INFINITY, next: null };
        for (const candidate of candidates) {
          const tail = dp[candidate.endIndexExclusive];
          if (!tail) continue;
          const total = candidate.score + tail.score;
          if (total > best.score) {
            best = { score: total, next: candidate };
          }
        }
        dp[i] = best.next ? best : { score: 0, next: null };
      }
      const path = [];
      let idx = 0;
      while (idx < runLength) {
        const current = dp[idx]?.next;
        if (!current) {
          const fallbackPart = scoredByStart.get(idx)?.[0];
          if (!fallbackPart) break;
          path.push(fallbackPart);
          idx += 1;
          continue;
        }
        path.push(current);
        idx = current.endIndexExclusive;
      }
      return path;
    }

    function analyzeJapaneseTokenRun(runTokens, context = {}) {
      if (!runTokens.length) return [];
      const scoredByStart = new Map();
      for (let startIndex = 0; startIndex < runTokens.length; startIndex++) {
        const candidates = buildJapaneseSpanCandidates(runTokens, startIndex);
        const prevSurface = runTokens[startIndex - 1]?.surface || '';
        const scored = candidates.map((candidate) => {
          const nextSurface = runTokens[candidate.endIndexExclusive]?.surface || '';
          return scoreJapaneseSpanCandidate(candidate, { ...context, prevSurface, nextSurface });
        });
        scoredByStart.set(startIndex, scored);
      }
      const bestPath = chooseBestJapaneseTokenPath(scoredByStart, runTokens.length);
      return bestPath.map((choice) => ({
        surface: choice.surface,
        startOffset: choice.startOffset,
        endOffset: choice.endOffset,
        isWordLike: true,
        rawSpanLength: choice.parts.length,
        rawStartTokenIndex: choice.startIndex,
        rawEndTokenIndex: choice.endIndexExclusive - 1,
        analysis: {
          baseForm: choice.analysis?.baseForm || normalizeTokenSurface(choice.surface),
          pos: choice.analysis?.pos || 'word',
          reading: choice.analysis?.reading || null,
          source: choice.analysis?.analysisSource || 'merged-span',
          score: choice.score
        }
      }));
    }

    function buildMergedRepairToken(windowTokens, surface, context = {}) {
      const analysis = resolveTokenAnalysisFromDictionary(surface, context);
      const normalizedSurface = normalizeTokenSurface(surface);
      const specialBaseForm = /^(?:わからない|分からない|かわからない|か分からない)$/u.test(normalizedSurface)
        ? 'わかる'
        : /^(?:よかった)$/u.test(normalizedSurface)
          ? 'よい'
          : null;
      return {
        surface,
        startOffset: windowTokens[0]?.startOffset ?? 0,
        endOffset: windowTokens[windowTokens.length - 1]?.endOffset ?? 0,
        isWordLike: true,
        rawSpanLength: windowTokens.reduce((sum, tk) => sum + (Number(tk.rawSpanLength) || 1), 0),
        rawStartTokenIndex: Number.isInteger(windowTokens[0]?.rawStartTokenIndex) ? windowTokens[0].rawStartTokenIndex : 0,
        rawEndTokenIndex: Number.isInteger(windowTokens[windowTokens.length - 1]?.rawEndTokenIndex)
          ? windowTokens[windowTokens.length - 1].rawEndTokenIndex
          : windowTokens.length - 1,
        analysis: {
          baseForm: specialBaseForm || analysis?.baseForm || surface,
          pos: analysis?.pos || 'word',
          reading: analysis?.reading || null,
          source: normalizedSurface === 'よかった'
            ? 'repair-merge-yokatta'
            : specialBaseForm
              ? 'repair-merge-wakaranai'
              : (analysis?.analysisSource || 'repair-merge'),
          score: analysis?.analysisScore || 0
        }
      };
    }

    function shouldRepairMergeWindow(windowTokens) {
      if (!windowTokens.length || windowTokens.length > 4) return false;
      if (windowTokens.some((tk) => !isJapaneseText(tk.surface || '') || classifyToken(tk.surface || '') !== 'word')) return false;
      const parts = windowTokens.map((tk) => normalizeTokenSurface(tk.surface || ''));
      const surface = parts.join('');
      if (!surface) return false;
      const allowSingleInternalKanaRepair = windowTokens.length === 3
        && /^[ぁ-ゖ]$/u.test(parts[1])
        && parts[2].length <= 2
        && isLikelyInflectionContinuation(parts[2])
        && containsKanji(parts[0])
        && /[ぁ-ゖ]+(った|って|て|た|る)$/u.test(surface);
      const allowWakaranaiRepair = (windowTokens.length === 3 && /^(?:わからない|分からない)$/u.test(surface))
        || (windowTokens.length === 4 && /^(?:か(?:わからない|分からない))$/u.test(surface));
      const allowYokattaRepair = windowTokens.length >= 2
        && windowTokens.length <= 4
        && /^(?:よかった)$/u.test(surface);
      if (isLikelyParticleSurface(parts[0]) && !allowWakaranaiRepair) return false;
      if (/^(から|なら|また|でも|そして)/u.test(surface)) return false;
      if (/(から|なら|ので|のに|けど|けれど)$/u.test(surface)) return false;
      if (parts.some((part) => isLikelyParticleSurface(part)) && !allowSingleInternalKanaRepair && !allowWakaranaiRepair) return false;
      if (containsKanji(surface) && /くな(?:った|って|る|れた|れて|れる)$/u.test(surface)) return false;
      if (/(て|で)(いた|いる|くれる|くれた|くれたら|くれて|おく|おいた)$/u.test(surface)) return true;
      if (windowTokens.length === 2 && parts[0] === 'かもし' && parts[1] === 'れない') return true;
      if (allowSingleInternalKanaRepair) return true;
      if (allowWakaranaiRepair) return true;
      if (allowYokattaRepair) return true;
      return false;
    }

    function getCopulaSplitSuffix(surface) {
      const normalized = normalizeTokenSurface(surface || '');
      if (!normalized || normalized.length <= 1) return null;
      if (/だった$/u.test(normalized)) {
        const head = normalized.slice(0, -3);
        if (head) return { head, suffix: 'だった' };
      }
      if (/でした$/u.test(normalized)) {
        const head = normalized.slice(0, -3);
        if (head) return { head, suffix: 'でした' };
      }
      if (/です$/u.test(normalized)) {
        const head = normalized.slice(0, -2);
        if (head) return { head, suffix: 'です' };
      }
      if (/だ$/u.test(normalized)) {
        const head = normalized.slice(0, -1);
        if (!head) return null;
        if (/[\p{Script=Han}]$/u.test(head)) return { head, suffix: 'だ' };
        if (isKanaOnly(head) && [...head].length >= 3 && !/[んいしちにびみり]$/u.test(head)) return { head, suffix: 'だ' };
      }
      return null;
    }

    function shouldSplitMergedCopulaToken(token, context = {}) {
      if (!token?.surface || classifyToken(token.surface || '') !== 'word' || !isJapaneseText(token.surface || '')) return null;
      const split = getCopulaSplitSuffix(token.surface);
      if (!split) return null;
      const normalizedSurface = normalizeTokenSurface(token.surface || '');
      const analysis = resolveTokenAnalysisFromDictionary(normalizedSurface, context);
      if (analysis?.analysisSource === 'exact-dict' || analysis?.analysisSource === 'deinflected-dict') return null;
      return split;
    }

    function buildSplitTokenFromSource(sourceToken, pieceSurface, startOffset, endOffset, analysis) {
      return {
        ...sourceToken,
        surface: pieceSurface,
        startOffset,
        endOffset,
        analysis: {
          ...(sourceToken.analysis || {}),
          ...analysis
        }
      };
    }

    function splitMergedCopulaToken(token, context = {}) {
      const split = shouldSplitMergedCopulaToken(token, context);
      if (!split) return null;
      const headLength = [...split.head].length;
      const startOffset = token.startOffset ?? 0;
      const midOffset = startOffset + headLength;
      const endOffset = token.endOffset ?? midOffset + [...split.suffix].length;
      const headAnalysis = resolveTokenAnalysisFromDictionary(split.head, context);
      return [
        buildSplitTokenFromSource(token, split.head, startOffset, midOffset, {
          baseForm: headAnalysis?.baseForm || split.head,
          pos: headAnalysis?.pos || 'word',
          reading: headAnalysis?.reading || null,
          source: 'post-split-copula'
        }),
        buildSplitTokenFromSource(token, split.suffix, midOffset, endOffset, {
          baseForm: 'だ',
          pos: 'auxiliary',
          reading: null,
          source: 'post-split-copula'
        })
      ];
    }

    function repairMergedJapaneseTokens(tokens, context = {}) {
      const out = [];
      for (let i = 0; i < tokens.length; i++) {
        let mergedRepair = null;
        for (let span = Math.min(4, tokens.length - i); span >= 2; span--) {
          const window = tokens.slice(i, i + span);
          if (!shouldRepairMergeWindow(window)) continue;
          const surface = window.map((tk) => tk.surface || '').join('');
          mergedRepair = buildMergedRepairToken(window, surface, context);
          i += span - 1;
          break;
        }
        if (mergedRepair) {
          out.push(mergedRepair);
          continue;
        }
        const current = { ...tokens[i] };
        const surface = normalizeTokenSurface(current.surface || '');
        if (surface === 'な' && i + 1 < tokens.length) {
          const next = tokens[i + 1];
          const nextSurface = normalizeTokenSurface(next.surface || '');
          if (/^(っ|った|って|る|れた|れて|れる)$/u.test(nextSurface)) {
            out.push({
              ...current,
              surface: surface + nextSurface,
              endOffset: next.endOffset,
              rawSpanLength: (current.rawSpanLength || 1) + (next.rawSpanLength || 1),
              rawEndTokenIndex: Number.isInteger(next.rawEndTokenIndex) ? next.rawEndTokenIndex : current.rawEndTokenIndex,
              analysis: {
                ...(current.analysis || {}),
                baseForm: 'なる',
                source: 'post-merge-naru'
              }
            });
            i += 1;
            continue;
          }
        }
        const copulaSplit = splitMergedCopulaToken(current, context);
        if (copulaSplit) {
          out.push(...copulaSplit);
          continue;
        }
        out.push(current);
      }
      return out;
    }

    function mergeJapaneseTokensForDisplayAndLookup(rawTokens, context = {}) {
      if (!Array.isArray(rawTokens) || !rawTokens.length) return [];
      const preparedRawTokens = refineJapaneseRawTokens(rawTokens);
      const merged = [];
      const runs = collectJapaneseTokenRuns(preparedRawTokens);
      if (!runs.length) {
        return preparedRawTokens.map((raw) => ({ ...raw, rawSpanLength: 1, analysis: null }));
      }
      let runCursor = 0;
      let tokenCursor = 0;
      while (tokenCursor < preparedRawTokens.length) {
        const run = runs[runCursor];
        if (!run || tokenCursor < run.start) {
          const token = preparedRawTokens[tokenCursor];
          merged.push({ ...token, rawSpanLength: 1, analysis: null });
          tokenCursor += 1;
          continue;
        }
        const analyzed = analyzeJapaneseTokenRun(run.tokens, context);
        for (const analyzedToken of analyzed) {
          merged.push({
            ...analyzedToken,
            rawStartTokenIndex: run.start + analyzedToken.rawStartTokenIndex,
            rawEndTokenIndex: run.start + analyzedToken.rawEndTokenIndex
          });
        }
        tokenCursor = run.end;
        runCursor += 1;
      }
      return repairMergedJapaneseTokens(merged, context);
    }

    function buildTokenModel(rawToken, context) {
      const surface = rawToken.surface || '';
      const normalizedSurface = normalizeTokenSurface(surface);
      const tokenType = classifyToken(surface);
      const isJapanese = isJapaneseText(surface);
      const tokenIndex = context.tokenIndex;
      return {
        id: `${context.bookId || 'book'}_${context.sectionIndex}_${context.sentenceIndex}_${tokenIndex}`,
        surface,
        normalizedSurface,
        startOffset: rawToken.startOffset,
        endOffset: rawToken.endOffset,
        isJapanese,
        sectionIndex: context.sectionIndex,
        sentenceIndex: context.sentenceIndex,
        tokenIndex,
        tokenType,
        pos: rawToken.analysis?.pos || tokenType,
        baseForm: rawToken.analysis?.baseForm || normalizedSurface || surface,
        reading: rawToken.analysis?.reading || null,
        analysisSource: rawToken.analysis?.source || 'raw-segmenter',
        analysisScore: Number(rawToken.analysis?.score) || 0,
        sourceRawTokenCount: Number(rawToken.rawSpanLength) || 1,
        rawStartTokenIndex: Number.isInteger(rawToken.rawStartTokenIndex) ? rawToken.rawStartTokenIndex : tokenIndex,
        rawEndTokenIndex: Number.isInteger(rawToken.rawEndTokenIndex) ? rawToken.rawEndTokenIndex : tokenIndex
      };
    }

    // =========================
    // [NUEVO Fase 2] Token cache / memoization + render layer
    // =========================
    function cacheTokenizationResult(cacheKey, payload) {
      state.sentenceTokenCache.set(cacheKey, payload);
      return payload;
    }

    function shouldTokenizeCurrentView() {
      return state.readingMode === 'sentence';
    }

    function getTokenizedSentence(bookId, sectionIndex, sentenceIndex) {
      const section = state.sections[sectionIndex];
      if (!section) return { sentence: '', tokens: [] };
      const sentences = getSentencesForSection(section);
      const sentence = sentences[sentenceIndex] || '';
      const overrideRecord = getSentenceOverrideRecord(bookId, sectionIndex, sentenceIndex, sentence);
      const overrideSignature = overrideRecord ? `manual::${overrideRecord.updatedAt || ''}::${overrideRecord.segmentedText || ''}` : 'auto';
      const cacheKey = `${TOKEN_ANALYSIS_VERSION}::${bookId || 'book'}::${section.path}::${sentenceIndex}::${sentence}::${overrideSignature}`;
      const cached = state.sentenceTokenCache.get(cacheKey);
      if (cached) return cached;

      if (overrideRecord?.segmentedText) {
        const manualTokens = buildManualSentenceTokens(sentence, overrideRecord.segmentedText, {
          bookId,
          sectionIndex,
          sentenceIndex
        });
        if (manualTokens.length) {
          return cacheTokenizationResult(cacheKey, {
            sentence,
            tokens: manualTokens,
            tokenizationMode: 'manual',
            overrideId: overrideRecord.id,
            segmentedText: overrideRecord.segmentedText
          });
        }
      }

      return cacheTokenizationResult(cacheKey, buildAutomaticSentenceTokenization(bookId, sectionIndex, sentenceIndex, sentence));
    }

    function getTokenizedSection(bookId, sectionIndex) {
      const section = state.sections[sectionIndex];
      if (!section) return [];
      const sentences = getSentencesForSection(section);
      return sentences.map((_, sentenceIndex) => getTokenizedSentence(bookId, sectionIndex, sentenceIndex));
    }

    function runJapaneseTokenizationSelfTests() {
      const testCases = [
        {
          name: 'Target sentence: segmentation and lemmas',
          input: '立ちっぱなしのこころを見て、また顔をしかめ、「おなかが痛いなら寝たら」と呼びかけた。',
          expectedSurfaces: ['立ちっぱなし','の','こころ','を','見て','、','また','顔','を','しかめ','、','「','おなか','が','痛い','なら','寝たら','」','と','呼びかけた','。'],
          expectedBaseForms: { '見て': '見る', '呼びかけた': '呼びかける' }
        },
        {
          name: '子ども handling',
          input: '学校のような、病院のような雰囲気のある古い建物の二階から、子どもの声がしていた。',
          expectedContains: ['子ども','の','声','が','していた']
        },
        {
          name: 'Progressive reading',
          input: '彼は本を読んでいた。',
          expectedContains: ['彼','は','本','を','読んでいた','。']
        },
        {
          name: 'Compound verbs',
          input: '彼女に呼びかけて、立ち上がった。',
          expectedContains: ['彼女','に','呼びかけて','、','立ち上がった','。']
        },
        {
          name: 'Te-form sanity',
          input: '見て食べた。',
          expectedContains: ['見て','食べた','。'],
          expectedBaseForms: { '見て': '見る', '食べた': '食べる' }
        },
        {
          name: 'Ta-form should stay merged',
          input: 'スクールで食べるように作ったお弁当は、じゃあ、家で食べるのね。',
          expectedContains: ['作った']
        },
        {
          name: 'Classical negative should stay merged',
          input: 'そこ、置いておくから食べられそうなら食べて」こころの目を見ず、自分の朝の支度を始める。',
          expectedContains: ['置いておく','食べられそう','食べて','見ず','支度','始める']
        },
        {
          name: 'Particles and auxiliary chains should stay split/merged correctly',
          input: '──お父さんがいてくれたら少しは庇ってくれたかもしれないのに、と苦しくなった。',
          expectedSurfaces: ['─','─','お父さん','が','いてくれたら','少し','は','庇ってくれた','かもしれない','の','に','、','と','苦しく','なった','。']
        },
        {
          name: 'Auxiliary kureru chain should deinflect to main verb when possible',
          input: '彼が庇ってくれた。',
          expectedContains: ['庇ってくれた'],
          expectedBaseForms: { '庇ってくれた': '庇う' }
        },
        {
          name: 'Copula should split from adverbial noun phrases',
          input: 'こころが起きる頃にはもういないことがほとんどだ。',
          expectedContains: ['ほとんど','だ']
        },
        {
          name: 'Past copula should split after time nouns',
          input: '気がつくと、三時だった。',
          expectedContains: ['三時','だった']
        },
        {
          name: 'Wakaranai chain should stay merged',
          input: 'どうしてこんなに眠いのかわからないけど、学校にいる時よりも、家にいると眠気に襲われることが多い。',
          expectedContains: ['かわからない']
        },
        {
          name: 'Mou should stay intact',
          input: 'こころが起きる頃にはもういないことがほとんどだ。',
          expectedContains: ['もう']
        },
        {
          name: 'Yokatta should stay merged',
          input: '隠せばよかった。',
          expectedContains: ['よかった']
        }
      ];

      const tokenize = (text) => {
        const raw = tokenizeJapaneseText(text);
        const merged = mergeJapaneseTokensForDisplayAndLookup(raw, { analysisMemo: new Map() });
        return merged.map((tk, tokenIndex) => buildTokenModel(tk, {
          bookId: 'selftest',
          sectionIndex: 0,
          sentenceIndex: 0,
          tokenIndex
        }));
      };
      const report = testCases.map((test) => {
        const tokens = tokenize(test.input);
        const surfaces = tokens.map((t) => t.surface);
        const baseMap = Object.fromEntries(tokens.map((t) => [t.surface, t.baseForm]));
        const missingExpected = (test.expectedSurfaces || []).filter((s) => !surfaces.includes(s));
        const missingContains = (test.expectedContains || []).filter((s) => !surfaces.includes(s));
        const wrongBase = Object.entries(test.expectedBaseForms || {}).filter(([surface, base]) => baseMap[surface] !== base);
        return {
          name: test.name,
          ok: !missingExpected.length && !missingContains.length && !wrongBase.length,
          surfaces,
          baseMap,
          missingExpected,
          missingContains,
          wrongBase
        };
      });
      const passed = report.filter((r) => r.ok).length;
      const summary = { passed, total: report.length, report };
      console.table(report.map((r) => ({ name: r.name, ok: r.ok, missing: [...r.missingExpected, ...r.missingContains].join(', ') || '—' })));
      console.log('runJapaneseTokenizationSelfTests summary', summary);
      return summary;
    }

    if (typeof window !== 'undefined') {
      window.runJapaneseTokenizationSelfTests = runJapaneseTokenizationSelfTests;
    }

    function getReaderPaginationContext() {
      const readerCard = $('.reader-card');
      const readerContent = $('.reader-content');
      const widthFromDom = Math.max((readerContent?.clientWidth || 0) - 8, 0);
      const widthFallback = Math.max(Math.min(window.innerWidth - 32, 720), 280);
      const stickyHeight = readerCard ? readerCard.getBoundingClientRect().height : 190;
      const pageHeight = Math.max(Math.round(window.innerHeight - stickyHeight - 42), 240);
      return {
        width: Math.round(widthFromDom || widthFallback),
        pageHeight,
        stickyHeight: Math.round(stickyHeight || 0)
      };
    }

    function getPaginationSignature(context = getReaderPaginationContext()) {
      return [
        state.currentBookId || 'book',
        state.settings.fontSize,
        state.settings.showSegmentation ? 1 : 0,
        context.width
      ].join('::');
    }

    function getPaginationCacheKey(sectionIndex, context = getReaderPaginationContext()) {
      const section = state.sections[Math.max(0, Number(sectionIndex) || 0)];
      return `${getPaginationSignature(context)}::${section?.path || sectionIndex || 0}`;
    }

    function getPaginationMeasureInner(context = getReaderPaginationContext()) {
      let host = document.getElementById('paginationMeasureHost');
      if (!host) {
        host = document.createElement('div');
        host.id = 'paginationMeasureHost';
        document.body.appendChild(host);
      }
      host.style.width = `${context.width}px`;
      host.innerHTML = `<div class="reader-content" style="width:${context.width}px;font-size:${state.settings.fontSize}px;--reader-font-size:${state.settings.fontSize}px;"><div class="reader-page-frame" style="--reader-page-height:${context.pageHeight}px;"><div class="page-mode-text" id="paginationMeasureInner"></div></div></div>`;
      return host.querySelector('#paginationMeasureInner');
    }

    function getFlatSentenceEntries(bookId = state.currentBookId) {
      const cached = state.flatSentenceEntriesCache;
      if (cached?.bookId === bookId && cached.entries) return cached.entries;
      const entries = [];
      state.sections.forEach((section, sectionIndex) => {
        const sentences = getSentencesForSection(section);
        sentences.forEach((_, sentenceIndex) => {
          entries.push({
            flatIndex: entries.length,
            sectionIndex,
            sentenceIndex
          });
        });
      });
      state.flatSentenceEntriesCache = { bookId, entries };
      state.flatSentenceIndexLookupCache = null;
      return entries;
    }

    function getFlatSentenceIndexLookup(bookId = state.currentBookId) {
      const cached = state.flatSentenceIndexLookupCache;
      if (cached?.bookId === bookId && cached.lookup) return cached.lookup;
      const lookup = new Map();
      getFlatSentenceEntries(bookId).forEach((entry, flatIndex) => {
        lookup.set(`${entry.sectionIndex}:${entry.sentenceIndex}`, flatIndex);
      });
      state.flatSentenceIndexLookupCache = { bookId, lookup };
      return lookup;
    }

    function getFlatSentenceIndexForLocation(sectionIndex, sentenceIndex, bookId = state.currentBookId) {
      const safeSectionIndex = Math.max(0, Math.min(Number(sectionIndex) || 0, Math.max(state.sections.length - 1, 0)));
      const sectionSentences = getSentencesForSection(state.sections[safeSectionIndex] || {});
      const safeSentenceIndex = Math.max(0, Math.min(Number(sentenceIndex) || 0, Math.max(sectionSentences.length - 1, 0)));
      const lookup = getFlatSentenceIndexLookup(bookId);
      const exact = lookup.get(`${safeSectionIndex}:${safeSentenceIndex}`);
      if (Number.isInteger(exact)) return exact;
      const fallback = lookup.get(`${safeSectionIndex}:0`);
      if (Number.isInteger(fallback)) return fallback;
      return 0;
    }

    function buildVirtualPageMap(sectionIndex, context = getReaderPaginationContext()) {
      const section = state.sections[Math.max(0, Number(sectionIndex) || 0)] || null;
      const sentenceCount = getSectionSentenceCount(section);
      if (!sentenceCount) {
        return [{ startSentence: 0, endSentence: 0 }];
      }

      const pages = [];
      const sentencesPerPage = 17;
      for (let pageStart = 0; pageStart < sentenceCount; pageStart += sentencesPerPage) {
        const endSentence = Math.min(pageStart + sentencesPerPage - 1, sentenceCount - 1);
        pages.push({ startSentence: pageStart, endSentence });
      }

      if (!pages.length) {
        pages.push({ startSentence: 0, endSentence: Math.max(sentenceCount - 1, 0) });
      }
      return pages;
    }

    function getPageMapForSection(sectionIndex, context = getReaderPaginationContext()) {
      const cacheKey = getPaginationCacheKey(sectionIndex, context);
      if (state.pageMapsCache.has(cacheKey)) return state.pageMapsCache.get(cacheKey);
      const pageMap = buildVirtualPageMap(sectionIndex, context);
      state.pageMapsCache.set(cacheKey, pageMap);
      return pageMap;
    }

    function getPaginationSummary(context = getReaderPaginationContext()) {
      const signature = getPaginationSignature(context);
      if (state.pageSummariesCache.has(signature)) return state.pageSummariesCache.get(signature);
      const sectionPageCounts = state.sections.map((_, sectionIndex) => getPageMapForSection(sectionIndex, context).length || 1);
      const summary = {
        signature,
        sectionPageCounts,
        totalPages: Math.max(sectionPageCounts.reduce((sum, count) => sum + count, 0), 1)
      };
      state.pageSummariesCache.set(signature, summary);
      return summary;
    }

    function findPageIndexForSentence(pageMap, sentenceIndex) {
      if (!pageMap?.length) return 0;
      const safeSentenceIndex = Math.max(0, Number(sentenceIndex) || 0);
      const found = pageMap.findIndex((page) => safeSentenceIndex >= page.startSentence && safeSentenceIndex <= page.endSentence);
      if (found >= 0) return found;
      if (safeSentenceIndex <= pageMap[0].startSentence) return 0;
      return pageMap.length - 1;
    }

    function getVirtualPageInfoForLocation(sectionIndex, sentenceIndex, context = getReaderPaginationContext()) {
      const summary = getPaginationSummary(context);
      const safeSectionIndex = Math.max(0, Math.min(Number(sectionIndex) || 0, Math.max(state.sections.length - 1, 0)));
      const pageMap = getPageMapForSection(safeSectionIndex, context);
      const sectionPageIndex = findPageIndexForSentence(pageMap, sentenceIndex);
      const page = pageMap[sectionPageIndex] || { startSentence: 0, endSentence: 0 };
      const pagesBefore = summary.sectionPageCounts.slice(0, safeSectionIndex).reduce((sum, count) => sum + count, 0);
      return {
        page,
        pageMap,
        sectionPageIndex,
        sectionPageCurrent: sectionPageIndex + 1,
        sectionPageTotal: Math.max(pageMap.length, 1),
        globalPageIndex: pagesBefore + sectionPageIndex,
        globalPageCurrent: pagesBefore + sectionPageIndex + 1,
        globalPageTotal: summary.totalPages,
        context
      };
    }

    function getCurrentVirtualPageInfo(context = getReaderPaginationContext()) {
      return getVirtualPageInfoForLocation(state.currentSpineIndex, state.currentSentenceIndex, context);
    }

    function locateGlobalPage(globalPageIndex, context = getReaderPaginationContext()) {
      const summary = getPaginationSummary(context);
      const targetIndex = Math.max(0, Math.min(Number(globalPageIndex) || 0, Math.max(summary.totalPages - 1, 0)));
      let remaining = targetIndex;
      for (let sectionIndex = 0; sectionIndex < state.sections.length; sectionIndex++) {
        const sectionPageCount = summary.sectionPageCounts[sectionIndex] || 1;
        if (remaining < sectionPageCount) {
          const pageMap = getPageMapForSection(sectionIndex, context);
          return {
            sectionIndex,
            pageIndex: remaining,
            page: pageMap[remaining] || { startSentence: 0, endSentence: 0 }
          };
        }
        remaining -= sectionPageCount;
      }
      const fallbackSectionIndex = Math.max(state.sections.length - 1, 0);
      const fallbackPageMap = getPageMapForSection(fallbackSectionIndex, context);
      const fallbackPageIndex = Math.max(fallbackPageMap.length - 1, 0);
      return {
        sectionIndex: fallbackSectionIndex,
        pageIndex: fallbackPageIndex,
        page: fallbackPageMap[fallbackPageIndex] || { startSentence: 0, endSentence: 0 }
      };
    }

    function goToGlobalPage(globalPageIndex, context = getReaderPaginationContext()) {
      const location = locateGlobalPage(globalPageIndex, context);
      state.currentSpineIndex = location.sectionIndex;
      state.currentSentenceIndex = Math.max(0, location.page.startSentence || 0);
    }

    function renderTokenizedVirtualPage(bookId, sectionIndex, sentenceIndex = 0, context = getReaderPaginationContext(), options = {}) {
      const tokenizedSentences = getTokenizedSection(bookId, sectionIndex);
      if (!tokenizedSentences.length) return '<p class="status">Sin texto legible en esta sección.</p>';
      const footerPageInfo = getVirtualPageInfoForLocation(sectionIndex, sentenceIndex, context);
      const page = footerPageInfo.page;
      const visibleSentences = tokenizedSentences.slice(page.startSentence, page.endSentence + 1);
      const activeSentenceIndex = Number.isInteger(options.activeSentenceIndex) ? options.activeSentenceIndex : null;
      const payloadBySentenceIndex = new Map();
      visibleSentences.forEach((payload, offset) => {
        payloadBySentenceIndex.set(page.startSentence + offset, payload);
      });
      const structure = getParagraphSentenceStructureForSection(state.sections[sectionIndex] || {});
      const paragraphsHtml = (structure.paragraphs || []).map((paragraph) => {
        const linesHtml = (paragraph.lines || []).map((line) => {
          const sentenceHtml = (line.sentenceIndexes || [])
            .filter((realSentenceIndex) => payloadBySentenceIndex.has(realSentenceIndex))
            .map((realSentenceIndex) => {
              const payload = payloadBySentenceIndex.get(realSentenceIndex);
              const isCurrentSentence = activeSentenceIndex !== null && realSentenceIndex === activeSentenceIndex;
              return `<span class="page-sentence ${isCurrentSentence ? 'current-sentence' : ''}" data-section-index="${sectionIndex}" data-sentence-index="${realSentenceIndex}">${renderSegmentedSentence(payload, { segmented: state.settings.showSegmentation, inline: true })}</span>`;
            })
            .join('');
          if (!sentenceHtml) return '';
          return `<span class="page-line">${sentenceHtml}</span>`;
        }).filter(Boolean);
        if (!linesHtml.length) return '';
        return `<p class="page-paragraph">${linesHtml.join('<br>')}</p>`;
      }).filter(Boolean).join('');
      const fallbackHtml = visibleSentences.map((payload, offset) => {
        const realSentenceIndex = page.startSentence + offset;
        const isCurrentSentence = activeSentenceIndex !== null && realSentenceIndex === activeSentenceIndex;
        return `<span class="page-sentence ${isCurrentSentence ? 'current-sentence' : ''}" data-section-index="${sectionIndex}" data-sentence-index="${realSentenceIndex}">${renderSegmentedSentence(payload, { segmented: state.settings.showSegmentation, inline: true })}</span>`;
      }).join('');
      return `<div class="reader-page-frame" style="--reader-page-height:${context.pageHeight}px;"><div class="page-mode-text">${paragraphsHtml || fallbackHtml}</div><div class="reader-page-footer">Pg ${footerPageInfo.globalPageCurrent}/${footerPageInfo.globalPageTotal}</div></div>`;
    }

    function alignPageModeToCurrentSentence() {
      const readerContentWrap = $('.reader-content-wrap');
      if (!readerContentWrap) return;
      const stickyHeader = $('.reader-card');
      const stickyHeight = stickyHeader ? stickyHeader.getBoundingClientRect().height : 0;
      const topPadding = 10;
      const targetTop = window.scrollY + readerContentWrap.getBoundingClientRect().top - stickyHeight - topPadding;
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'auto' });
    }

    function syncCurrentSentenceFromToken(token) {
      if (!Number.isInteger(token?.sentenceIndex)) return;
      if (Number.isInteger(token?.sectionIndex)) {
        state.currentSpineIndex = Math.max(0, Math.min(token.sectionIndex, Math.max(state.sections.length - 1, 0)));
      }
      const sectionSentences = getSentencesForSection(state.sections[state.currentSpineIndex] || {});
      const cap = Math.max(sectionSentences.length - 1, 0);
      state.currentSentenceIndex = Math.max(0, Math.min(token.sentenceIndex, cap));
    }


    function attachTokenMetadata(token) {
      const debug = `${token.pos}${token.baseForm ? ` · ${token.baseForm}` : ''}`;
      const interactive = isInteractiveToken(token);
      const identity = interactive ? getTokenIdentity(token) : null;
      const storedLevel = identity ? state.vocabMap.get(identity.vocabKey)?.familiarityLevel : null;
      const knownLevel = getEffectiveFamiliarityLevel(storedLevel);
      const learningClass = knownLevel === 1 ? 'known-learning' : '';
      const unknownClass = interactive && !knownLevel ? 'unknown-word' : '';
      return [
        `class="token ${token.isJapanese ? 'jp' : ''} ${token.pos === 'punct' ? 'punct' : ''} ${interactive ? 'clickable' : ''} ${learningClass} ${unknownClass} ${knownLevel ? `known-level-${knownLevel}` : ''} ${state.settings.tokenDebug ? 'dbg' : ''}"`,
        `data-token-id="${escapeHtml(token.id)}"`,
        `data-section-index="${token.sectionIndex}"`,
        `data-sentence-index="${token.sentenceIndex}"`,
        `data-token-index="${token.tokenIndex}"`,
        `data-interactive="${interactive ? '1' : '0'}"`,
        identity ? `data-vocab-key="${escapeHtml(identity.vocabKey)}"` : '',
        `data-surface="${escapeHtml(token.surface)}"`,
        `data-base-form="${escapeHtml(token.baseForm || '')}"`,
        `data-pos="${escapeHtml(token.pos || '')}"`,
        `data-analysis-source="${escapeHtml(token.analysisSource || 'raw-segmenter')}"`,
        `data-source-raw-token-count="${Number(token.sourceRawTokenCount) || 1}"`,
        state.settings.tokenDebug ? `data-debug="${escapeHtml(debug)}"` : ''
      ].filter(Boolean).join(' ');
    }

    function renderSentenceTokens(tokens, options = {}) {
      const { segmented = false, inline = false } = options;
      const tokensHtml = tokens.map((token) => `<span ${renderTokenWithKnowledgeState(token)}>${escapeHtml(token.surface)}</span>`).join('');
      if (inline) {
        return `<span class="sentence-inline ${segmented ? '' : 'compact'}">${tokensHtml}</span>`;
      }
      return `<div class="segmented-line ${segmented ? '' : 'compact'}">${tokensHtml}</div>`;
    }

    function renderSegmentedSentence(payload, options = {}) {
      if (!payload?.tokens?.length) return escapeHtml(payload?.sentence || '');
      return renderSentenceTokens(payload.tokens, options);
    }

    // =========================
    // [NUEVO Fase 3] Vocabulary data model / deduplicación
    // =========================
    function isInteractiveToken(token) {
      if (!token) return false;
      if (!token.isJapanese) return false;
      if (!token.normalizedSurface) return false;
      return token.tokenType !== 'punct' && token.tokenType !== 'space' && token.tokenType !== 'empty';
    }

    function buildVocabKey(token) {
      // Estrategia Fase 3: preferir lemma/baseForm (si hay), fallback a normalizedSurface.
      // Fase 4 podrá refinar usando datos léxicos más ricos.
      const lemma = normalizeTokenSurface(token?.baseForm || '');
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const normalizedKey = lemma || normalizedSurface;
      return normalizedKey ? `jp:${normalizedKey}` : '';
    }

    function getTokenIdentity(token) {
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const vocabKey = buildVocabKey(token);
      return { vocabKey, normalizedKey: vocabKey.replace(/^jp:/, ''), normalizedSurface };
    }

    async function loadVocabularyMap() {
      const entries = await dbGetAll(STORES.vocabEntries);
      state.vocabMap = new Map(entries.map((entry) => [entry.vocabKey, entry]));
      touchVocabularyData();
      return state.vocabMap;
    }

    async function loadVocabEntryByKey(key) {
      if (!key) return null;
      if (state.vocabMap.has(key)) return state.vocabMap.get(key);
      const entry = await dbGetByIndex(STORES.vocabEntries, 'vocabKey', key);
      if (entry) {
        state.vocabMap.set(key, entry);
        touchVocabularyData();
      }
      return entry;
    }

    async function upsertVocabEntryFromToken(token, context = {}) {
      const identity = getTokenIdentity(token);
      if (!identity.vocabKey) return null;
      const now = new Date().toISOString();
      const existing = await loadVocabEntryByKey(identity.vocabKey);
      const sourceBookIds = new Set(existing?.sourceBookIds || []);
      if (context.bookId) sourceBookIds.add(context.bookId);
      const entry = {
        id: existing?.id || uuid(),
        vocabKey: identity.vocabKey,
        normalizedKey: identity.normalizedKey,
        surface: token.surface || existing?.surface || identity.normalizedSurface,
        lemma: token.baseForm || existing?.lemma || null,
        reading: token.reading || existing?.reading || null,
        readingKana: existing?.readingKana || convertReadingToHiragana(token.reading || existing?.reading || null),
        readingRomaji: existing?.readingRomaji || convertReadingToRomaji(token.reading || existing?.reading || null),
        pos: token.pos || existing?.pos || null,
        defaultDefinition: existing?.defaultDefinition || null,
        meanings: existing?.meanings || [],
        userDefinition: existing?.userDefinition || null,
        dictionarySource: existing?.dictionarySource || null,
        enrichedAt: existing?.enrichedAt || null,
        familiarityLevel: existing?.familiarityLevel ?? null,
        firstSeenAt: existing?.firstSeenAt || now,
        lastSeenAt: now,
        timesClicked: (existing?.timesClicked || 0) + 1,
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        sourceBookIds: [...sourceBookIds]
      };
      await dbPut(STORES.vocabEntries, entry);
      state.vocabMap.set(entry.vocabKey, entry);
      touchVocabularyData();
      return entry;
    }

    async function setTokenFamiliarity(vocabKey, level) {
      const existing = await loadVocabEntryByKey(vocabKey);
      if (!existing) return null;
      const next = {
        ...existing,
        familiarityLevel: level == null ? null : Number(level),
        updatedAt: new Date().toISOString()
      };
      await dbPut(STORES.vocabEntries, next);
      state.vocabMap.set(next.vocabKey, next);
      touchVocabularyData();
      return next;
    }

    function getEffectiveFamiliarityLevel(level) {
      const numericLevel = Number(level);
      if (!Number.isFinite(numericLevel) || numericLevel <= 0) return null;
      if (numericLevel > 3) return 5;
      return numericLevel;
    }

    // =========================
    // [NUEVO Fase 3] Token interaction + panel + familiarity rendering
    // =========================
    function closeTokenPanel() {
      state.tokenSelection = { token: null, entry: null, draftLevel: null, dictionaryResult: null, userDefinitionDraft: '', isEditingUserDefinition: false };
      const host = $('#tokenPanelHost');
      if (host) host.innerHTML = '';
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.remove('with-panel');
    }

    function renderTokenWithKnowledgeState(token) {
      return attachTokenMetadata(token);
    }

    async function copyTextToClipboard(text) {
      const plainText = String(text ?? '');
      if (!plainText) return false;
      try {
        await navigator.clipboard.writeText(plainText);
        return true;
      } catch (err) {
        const textarea = document.createElement('textarea');
        textarea.value = plainText;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(textarea);
        return ok;
      }
    }

    function showCopyFeedback(button) {
      if (!button) return;
      const originalLabel = button.dataset.copyOriginalLabel || button.textContent || '⧉';
      button.dataset.copyOriginalLabel = originalLabel;
      button.classList.add('is-copied');
      button.textContent = '✓';
      window.setTimeout(() => {
        button.classList.remove('is-copied');
        button.textContent = originalLabel;
      }, 650);
    }

    function renderTokenPanel() {
      const host = $('#tokenPanelHost');
      if (!host) return;
      const { token, entry, draftLevel, dictionaryResult, userDefinitionDraft, isEditingUserDefinition } = state.tokenSelection;
      if (!token || !entry) {
        host.innerHTML = '';
        return;
      }
      const meanings = entry.meanings || dictionaryResult?.meanings || [];
      const dictionaryDefinition = entry.defaultDefinition || meanings[0] || '—';
      const hasUserDefinition = Boolean(entry.userDefinition);
      const displaySurface = entry.surface || token.surface || '—';
      const lemmaText = entry.lemma || dictionaryResult?.lemma || token.baseForm || null;
      const readingText = entry.readingKana || dictionaryResult?.readingKana || null;
      const inlineDictionaryDefinition = dictionaryDefinition || '—';
      const showLemmaLine = Boolean(lemmaText || readingText || inlineDictionaryDefinition);
      host.innerHTML = `
        <div class="token-panel-backdrop" data-close-token-panel="1" aria-hidden="true"></div>
        <aside class="token-panel" role="dialog" aria-label="Detalle de token enriquecido">
          <div class="token-panel-top-row">
            <div class="left-actions">
              <button class="level-btn danger token-remove-btn" id="removeVocabEntryBtn" title="Sacar del vocabulario">✕</button>
            </div>
            <div class="level-picker" aria-label="Nivel de conocimiento">
              ${[1,2,3].map((lvl) => `<button class="level-btn ${lvl === 3 ? 'level-checkmark' : ''} ${(Number(draftLevel) >= lvl) ? 'active' : ''}" data-level="${lvl}">${lvl === 3 ? '✓' : lvl}</button>`).join('')}
            </div>
            <div class="right-actions"></div>
          </div>
          <div class="toolbar token-panel-word-row">
            <div>
              <div class="token-panel-headword">
                <h3>${escapeHtml(displaySurface)}</h3>
                <button id="copyTokenSurfaceBtn" class="copy-glyph-btn" title="Copiar palabra" aria-label="Copiar palabra">⧉</button>
              </div>
              ${showLemmaLine ? `<div class="token-lemma-line">${escapeHtml(lemmaText || '—')} <span class="hiragana">(${escapeHtml(readingText || '—')})</span> - ${escapeHtml(inlineDictionaryDefinition)}</div>` : ''}
            </div>
          </div>
          <div class="token-grid">
            <div class="token-panel-section">
              <div class="token-panel-section-content">
                <div style="${hasUserDefinition && !isEditingUserDefinition ? 'display:none;' : ''}">
                  <div class="custom-definition-input-row">
                    <div class="custom-definition-input-shell">
                      <button id="askGeminiDefinitionBtn" class="gemini-icon-btn" title="Consultar Gemini" aria-label="Consultar Gemini">✦</button>
                      <textarea id="userDefinitionInput" rows="1" placeholder="Escribe tu nota personal...">${escapeHtml(userDefinitionDraft || '')}</textarea>
                    </div>
                    <span class="custom-definition-actions">
                      <button id="saveUserDefinitionBtn" class="primary" title="Guardar definición">+</button>
                    </span>
                  </div>
                </div>
                ${hasUserDefinition ? `
                  <div class="v custom-definition-row">
                    <span class="custom-definition-actions">
                      <button id="editUserDefinitionBtn" class="icon-btn" title="Editar nota personal">✎</button>
                      <button id="deleteUserDefinitionBtn" class="icon-btn" title="Borrar nota personal">🗑</button>
                    </span>
                    <span>${escapeHtml(entry.userDefinition)}</span>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
          <div class="external-links-row">
            <button id="askChatgptBtn" class="chatgpt-btn">ChatGPT</button>
            <button id="openGoogleTranslateBtn" class="chatgpt-btn">Google Translate</button>
            <button id="openKanshudoBtn" class="chatgpt-btn">Kanshudo</button>
          </div>
        </aside>
      `;
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.add('with-panel');
      host.querySelectorAll('[data-level]').forEach((btn) => btn.addEventListener('click', async () => {
        const rawLevel = btn.dataset.level;
        const level = rawLevel ? Number(rawLevel) : null;
        const updated = await setTokenFamiliarity(entry.vocabKey, level);
        if (!updated) return;
        state.tokenSelection.entry = updated;
        state.tokenSelection.draftLevel = updated.familiarityLevel;
        applyFamiliarityStyles(updated.vocabKey, updated.familiarityLevel);
        closeTokenPanel();
      }));
      const userDefinitionInput = $('#userDefinitionInput');
      const autoGrowUserDefinitionInput = () => {
        if (!userDefinitionInput) return;
        userDefinitionInput.style.height = 'auto';
        userDefinitionInput.style.height = `${userDefinitionInput.scrollHeight}px`;
      };
      autoGrowUserDefinitionInput();
      userDefinitionInput?.addEventListener('input', (e) => {
        state.tokenSelection.userDefinitionDraft = e.target.value || '';
        autoGrowUserDefinitionInput();
      });
      $('#saveUserDefinitionBtn')?.addEventListener('click', async () => {
        const text = $('#userDefinitionInput')?.value || '';
        let updated = await updateUserDefinition(entry.vocabKey, text);
        if (!updated) return;
        if (text.trim() && getEffectiveFamiliarityLevel(updated.familiarityLevel) == null) {
          updated = await setTokenFamiliarity(entry.vocabKey, 1) || updated;
          applyFamiliarityStyles(updated.vocabKey, updated.familiarityLevel);
        }
        state.tokenSelection.entry = updated;
        state.tokenSelection.draftLevel = updated.familiarityLevel;
        state.tokenSelection.userDefinitionDraft = updated.userDefinition || '';
        state.tokenSelection.isEditingUserDefinition = false;
        renderTokenPanel();
      });
      $('#askGeminiDefinitionBtn')?.addEventListener('click', async () => {
        const actionBtn = $('#askGeminiDefinitionBtn');
        const input = $('#userDefinitionInput');
        const promptWord = entry.surface || token.surface || token.baseForm || '';
        if (!promptWord.trim()) return;
        const { prompt, apiKey } = getGeminiConfig();
        if (!apiKey) {
          alert('Configura primero tu clave API en Gemini.');
          return;
        }
        if (!input) return;
        const previousLabel = actionBtn?.textContent || '✨';
        const previousDraft = input.value || '';
        const finalPrompt = `${prompt || DEFAULT_GEMINI_PROMPT}${promptWord}`;
        try {
          if (actionBtn) {
            actionBtn.disabled = true;
            actionBtn.textContent = '…';
          }
          input.value = 'Consultando...';
          input.dispatchEvent(new Event('input', { bubbles: true }));
          const geminiText = await askGemini(finalPrompt);
          input.value = geminiText;
          state.tokenSelection.userDefinitionDraft = geminiText;
          input.dispatchEvent(new Event('input', { bubbles: true }));
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        } catch (err) {
          input.value = previousDraft;
          input.dispatchEvent(new Event('input', { bubbles: true }));
          alert(err?.message || 'No se pudo consultar Gemini.');
        } finally {
          if (actionBtn) {
            actionBtn.disabled = false;
            actionBtn.textContent = previousLabel;
          }
        }
      });
      $('#editUserDefinitionBtn')?.addEventListener('click', () => {
        state.tokenSelection.isEditingUserDefinition = true;
        state.tokenSelection.userDefinitionDraft = entry.userDefinition || '';
        renderTokenPanel();
      });
      $('#deleteUserDefinitionBtn')?.addEventListener('click', async () => {
        const updated = await updateUserDefinition(entry.vocabKey, '');
        if (!updated) return;
        state.tokenSelection.entry = updated;
        state.tokenSelection.userDefinitionDraft = '';
        state.tokenSelection.isEditingUserDefinition = true;
        renderTokenPanel();
      });
      $('#askChatgptBtn')?.addEventListener('click', () => {
        const promptWord = entry.surface || token.surface || token.baseForm || '';
        const { wordPrompt } = getChatGptConfig();
        openChatGptWithPrompt(promptWord, wordPrompt, { wrapInQuotes: true });
      });
      $('#openGoogleTranslateBtn')?.addEventListener('click', () => {
        const promptWord = entry.surface || token.surface || token.baseForm || '';
        openGoogleTranslateWithText(promptWord);
      });
      $('#openKanshudoBtn')?.addEventListener('click', () => {
        const promptWord = entry.surface || token.surface || token.baseForm || '';
        if (!promptWord.trim()) return;
        const url = 'https://www.kanshudo.com/searchq?q=' + encodeURIComponent(promptWord);
        window.open(url, '_blank', 'noopener,noreferrer');
      });
      $('#removeVocabEntryBtn')?.addEventListener('click', async () => {
        const existing = await loadVocabEntryByKey(entry.vocabKey);
        if (!existing?.id) return;
        await dbDelete(STORES.vocabEntries, existing.id);
        state.vocabMap.delete(entry.vocabKey);
        touchVocabularyData();
        applyFamiliarityStyles(entry.vocabKey, null);
        closeTokenPanel();
      });
      $('#copyTokenSurfaceBtn')?.addEventListener('click', async () => {
        const copied = await copyTextToClipboard(displaySurface);
        if (copied) showCopyFeedback($('#copyTokenSurfaceBtn'));
      });
      host.querySelectorAll('[data-close-token-panel="1"]').forEach((node) => node.addEventListener('click', closeTokenPanel));
    }

    function applyFamiliarityStyles(vocabKey, level) {
      document.querySelectorAll(`[data-vocab-key="${CSS.escape(vocabKey)}"]`).forEach((node) => {
        for (let i = 1; i <= 5; i++) node.classList.remove(`known-level-${i}`);
        node.classList.remove('known-learning', 'unknown-word');
        const effectiveLevel = getEffectiveFamiliarityLevel(level);
        if (effectiveLevel === 1) node.classList.add('known-learning');
        if (!effectiveLevel) node.classList.add('unknown-word');
        if (effectiveLevel) node.classList.add(`known-level-${effectiveLevel}`);
      });
    }

    async function openTokenPanel(token, context = {}) {
      if (!isInteractiveToken(token)) return;
      // Lookup primero para persistir una identidad léxica mejor (lemma resuelto cuando exista).
      const request = buildDictionaryLookupRequest(token, context);
      const dictionaryResult = await lookupDictionaryEntry(request, token, context);
      const clickedSurface = token.surface || '';
      const lookupSurface = request.candidateSurfaces?.[request.candidateSurfaces.length - 1] || clickedSurface;
      const resolvedToken = {
        ...token,
        surface: clickedSurface,
        lookupSurface,
        matchedSurface: dictionaryResult?.queriedSurface || lookupSurface,
        baseForm: dictionaryResult?.lemma || token.baseForm,
        reading: dictionaryResult?.readingKana || token.reading,
        pos: dictionaryResult?.pos || token.pos
      };
      let entry = await upsertVocabEntryFromToken(resolvedToken, context);
      if (!entry) return;
      const enriched = enrichVocabEntryWithDictionaryData(entry, dictionaryResult, resolvedToken);
      await dbPut(STORES.vocabEntries, enriched);
      state.vocabMap.set(enriched.vocabKey, enriched);
      touchVocabularyData();
      entry = enriched;
      if (getEffectiveFamiliarityLevel(entry.familiarityLevel) == null) {
        const withDefaultLevel = await setTokenFamiliarity(entry.vocabKey, 1);
        entry = withDefaultLevel || entry;
      }
      state.tokenSelection = {
        token: resolvedToken,
        entry,
        draftLevel: entry.familiarityLevel ?? null,
        dictionaryResult,
        userDefinitionDraft: entry.userDefinition || '',
        isEditingUserDefinition: false
      };
      renderTokenPanel();
      applyFamiliarityStyles(entry.vocabKey, entry.familiarityLevel);
    }

    function getTokenFromElement(el) {
      if (!el) return null;
      const surface = el.dataset.surface || '';
      const tokenType = classifyToken(surface);
      return {
        id: el.dataset.tokenId,
        surface,
        normalizedSurface: normalizeTokenSurface(surface),
        baseForm: el.dataset.baseForm || normalizeTokenSurface(surface),
        pos: el.dataset.pos || tokenType,
        reading: null,
        analysisSource: el.dataset.analysisSource || 'raw-segmenter',
        sourceRawTokenCount: Number(el.dataset.sourceRawTokenCount) || 1,
        isJapanese: isJapaneseText(surface),
        tokenType,
        sectionIndex: Number(el.dataset.sectionIndex),
        sentenceIndex: Number(el.dataset.sentenceIndex),
        tokenIndex: Number(el.dataset.tokenIndex)
      };
    }

    // =========================
    // [NUEVO Fase 4] Lookup normalization + kana/romaji utilities
    // =========================
    function katakanaToHiragana(text) {
      return (text || '').replace(/[ァ-ヶ]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60));
    }

    function convertReadingToHiragana(reading) {
      const normalized = normalizeTokenSurface(reading || '');
      if (!normalized) return null;
      return katakanaToHiragana(normalized);
    }

    const ROMAJI_DIGRAPHS = {
      きゃ:'kya',きゅ:'kyu',きょ:'kyo',しゃ:'sha',しゅ:'shu',しょ:'sho',ちゃ:'cha',ちゅ:'chu',ちょ:'cho',
      にゃ:'nya',にゅ:'nyu',にょ:'nyo',ひゃ:'hya',ひゅ:'hyu',ひょ:'hyo',みゃ:'mya',みゅ:'myu',みょ:'myo',
      りゃ:'rya',りゅ:'ryu',りょ:'ryo',ぎゃ:'gya',ぎゅ:'gyu',ぎょ:'gyo',じゃ:'ja',じゅ:'ju',じょ:'jo',
      びゃ:'bya',びゅ:'byu',びょ:'byo',ぴゃ:'pya',ぴゅ:'pyu',ぴょ:'pyo'
    };
    const ROMAJI_SINGLE = {
      あ:'a',い:'i',う:'u',え:'e',お:'o',か:'ka',き:'ki',く:'ku',け:'ke',こ:'ko',さ:'sa',し:'shi',す:'su',せ:'se',そ:'so',
      た:'ta',ち:'chi',つ:'tsu',て:'te',と:'to',な:'na',に:'ni',ぬ:'nu',ね:'ne',の:'no',は:'ha',ひ:'hi',ふ:'fu',へ:'he',ほ:'ho',
      ま:'ma',み:'mi',む:'mu',め:'me',も:'mo',や:'ya',ゆ:'yu',よ:'yo',ら:'ra',り:'ri',る:'ru',れ:'re',ろ:'ro',
      わ:'wa',を:'wo',ん:'n',が:'ga',ぎ:'gi',ぐ:'gu',げ:'ge',ご:'go',ざ:'za',じ:'ji',ず:'zu',ぜ:'ze',ぞ:'zo',
      だ:'da',ぢ:'ji',づ:'zu',で:'de',ど:'do',ば:'ba',び:'bi',ぶ:'bu',べ:'be',ぼ:'bo',ぱ:'pa',ぴ:'pi',ぷ:'pu',ぺ:'pe',ぽ:'po',
      ぁ:'a',ぃ:'i',ぅ:'u',ぇ:'e',ぉ:'o',ゔ:'vu',ー:'-'
    };

    function convertReadingToRomaji(reading) {
      const hira = convertReadingToHiragana(reading);
      if (!hira) return null;
      let out = '';
      for (let i = 0; i < hira.length; i++) {
        const current = hira[i];
        const nextPair = hira.slice(i, i + 2);
        if (ROMAJI_DIGRAPHS[nextPair]) { out += ROMAJI_DIGRAPHS[nextPair]; i++; continue; }
        if (current === 'っ') {
          const next = ROMAJI_DIGRAPHS[hira.slice(i + 1, i + 3)] || ROMAJI_SINGLE[hira[i + 1]] || '';
          out += next ? next[0] : '';
          continue;
        }
        out += ROMAJI_SINGLE[current] || current;
      }
      return out.replace(/-+/g, '');
    }


    function normalizeLookupKey(value) {
      return normalizeTokenSurface(value || '').toLowerCase();
    }

    function isKanaChunk(text) {
      const s = normalizeTokenSurface(text || '');
      if (!s) return false;
      return /^[ぁ-ゖー]+$/u.test(s);
    }

    function isLookupJoinableToken(token) {
      if (!token) return false;
      if (!token.isJapanese) return false;
      if (!token.surface || !token.surface.trim()) return false;
      return token.tokenType !== 'punct' && token.tokenType !== 'space' && token.tokenType !== 'empty';
    }

    function isLikelyInflectionContinuation(surface) {
      const s = normalizeTokenSurface(surface || '');
      if (!s) return false;
      if (PARTICLE_SURFACES.has(s)) return false;
      if (INFLECTION_CONTINUATION_SET.has(s)) return true;
      return /^(ている|でいる|てる|でる|ちゃう|じゃう|かった|くない|ない|ます|ました|く|ず|ぬ|った|くれ|くれる|くれた|くれて|てくれる|でくれる|てくれた|でくれた|てくれて|でくれて|ておく|でおく|ておいた|でおいた)$/u.test(s);
    }

    // Desde v3, la segmentación final ya llega fusionada para display + lookup.
    // Solo añadimos candidatos conservadores (surface + lemma) y mantenemos un fallback pequeño.
    function buildLookupCandidatesFromContext(token, context = {}) {
      const baseSurface = token?.surface || '';
      if (!baseSurface) return [];
      const out = [];
      const seen = new Set();
      const push = (value) => {
        const normalized = normalizeTokenSurface(value || '');
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        out.push(value);
      };
      push(baseSurface);
      if (token?.baseForm && normalizeTokenSurface(token.baseForm) !== normalizeTokenSurface(baseSurface)) {
        push(token.baseForm);
      }

      const bookId = context.bookId;
      const sectionIndex = Number.isFinite(token?.sectionIndex) ? token.sectionIndex : context.sectionIndex;
      const sentenceIndex = Number.isFinite(token?.sentenceIndex) ? token.sentenceIndex : context.sentenceIndex;
      const tokenIndex = Number.isFinite(token?.tokenIndex) ? token.tokenIndex : context.tokenIndex;
      if (!Number.isInteger(sectionIndex) || !Number.isInteger(sentenceIndex) || !Number.isInteger(tokenIndex)) return out;

      const sentencePayload = getTokenizedSentence(bookId, sectionIndex, sentenceIndex);
      const sentenceTokens = Array.isArray(sentencePayload?.tokens) ? sentencePayload.tokens : [];
      if (!sentenceTokens.length || !sentenceTokens[tokenIndex]) return out;

      if ((token?.sourceRawTokenCount || 1) > 1 || (token?.analysisSource && token.analysisSource !== 'raw-segmenter')) {
        return out;
      }

      let combined = token.surface || '';
      for (let i = tokenIndex + 1; i < Math.min(sentenceTokens.length, tokenIndex + 4); i++) {
        const nextToken = sentenceTokens[i];
        if (!isLookupJoinableToken(nextToken)) break;
        if ((nextToken?.sourceRawTokenCount || 1) > 1) break;
        if (!isLikelyInflectionContinuation(nextToken.surface)) break;
        combined += nextToken.surface || '';
        push(combined);
      }
      return out;
    }

    // =========================
    // [NUEVO Fase 4] Dictionary provider layer (offline, estilo Rikaikun)
    // =========================
    // Formato esperado para dictionary pack local (JSON):
    // {
    //   "pack": {"id": "jmdict-lite", "name": "JMdict Lite", "version": "2026-01"},
    //   "entries": [
    //     {"lemma": "思う", "surface": "思う", "reading": "おもう", "pos": ["v5u"], "glosses": ["to think"]}
    //   ]
    // }
    // Notas:
    // - Las glosses se muestran tal cual vengan de la fuente (normalmente inglés en JMdict/EDICT).
    // - El ranking prioriza lemma exacto, luego surface, luego reading y deinflection.
    // - La desinflexión es básica y extensible (no reemplaza un analizador morfológico completo).

    const EMBEDDED_FALLBACK_PACK = {
      id: 'embedded-fallback-v2',
      name: 'Embedded fallback dictionary',
      version: '2026-04-01',
      source: 'embedded-fallback',
      entries: [
        { lemma: '思う', surface: '思う', reading: 'おもう', pos: ['v5u'], glosses: ['to think', 'to believe'] },
        { lemma: '考える', surface: '考える', reading: 'かんがえる', pos: ['v1'], glosses: ['to think about', 'to consider'] },
        { lemma: '言う', surface: '言う', reading: 'いう', pos: ['v5u'], glosses: ['to say', 'to tell'] },
        { lemma: '食べる', surface: '食べる', reading: 'たべる', pos: ['v1'], glosses: ['to eat'] },
        { lemma: 'ある', surface: 'ある', reading: 'ある', pos: ['v5r-i'], glosses: ['to exist (inanimate)', 'to have'] },
        { lemma: 'する', surface: 'する', reading: 'する', pos: ['vs-i'], glosses: ['to do', 'to make'] },
        { lemma: '行く', surface: '行く', reading: 'いく', pos: ['v5k-s'], glosses: ['to go'] },
        { lemma: '見る', surface: '見る', reading: 'みる', pos: ['v1'], glosses: ['to see', 'to watch'] },
        { lemma: '読む', surface: '読む', reading: 'よむ', pos: ['v5m'], glosses: ['to read'] },
        { lemma: '本', surface: '本', reading: 'ほん', pos: ['n'], glosses: ['book'] }
      ]
    };

    function normalizeGlosses(raw) {
      if (!Array.isArray(raw)) return [];
      return raw.map((g) => String(g || '').trim()).filter(Boolean).slice(0, 10);
    }

    function normalizeDictionaryEntry(rawEntry, packMeta = {}) {
      const lemma = normalizeTokenSurface(rawEntry?.lemma || rawEntry?.base || rawEntry?.headword || '');
      const surface = normalizeTokenSurface(rawEntry?.surface || rawEntry?.word || lemma || '');
      const readingRaw = rawEntry?.reading || rawEntry?.readingKana || rawEntry?.kana || null;
      const readingKana = convertReadingToHiragana(readingRaw || null);
      const glosses = normalizeGlosses(rawEntry?.glosses || rawEntry?.meanings || rawEntry?.senses || []);
      const posRaw = Array.isArray(rawEntry?.pos) ? rawEntry.pos.join(', ') : (rawEntry?.pos || rawEntry?.partOfSpeech || null);
      return {
        id: rawEntry?.id || `${packMeta.id || 'pack'}:${lemma || surface}:${readingKana || ''}:${Math.random().toString(36).slice(2, 8)}`,
        packId: packMeta.id || 'unknown-pack',
        lemma,
        surface,
        readingKana,
        readingRomaji: convertReadingToRomaji(readingKana),
        lemmaKey: normalizeLookupKey(lemma),
        surfaceKey: normalizeLookupKey(surface),
        readingKey: normalizeLookupKey(readingKana),
        pos: posRaw ? String(posRaw) : null,
        meanings: glosses,
        bestGloss: glosses[0] || null,
        source: packMeta.source || packMeta.name || packMeta.id || 'local-pack',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    async function ensureEmbeddedFallbackDictionary() {
      const existingMeta = await dbGet(STORES.dictionaryMeta, 'embeddedInstalled');
      if (existingMeta?.installed) return;
      const packMeta = {
        id: EMBEDDED_FALLBACK_PACK.id,
        name: EMBEDDED_FALLBACK_PACK.name,
        version: EMBEDDED_FALLBACK_PACK.version,
        source: EMBEDDED_FALLBACK_PACK.source,
        installedAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        entryCount: EMBEDDED_FALLBACK_PACK.entries.length
      };
      await dbPut(STORES.dictionaryPacks, packMeta);
      for (const rawEntry of EMBEDDED_FALLBACK_PACK.entries) {
        const entry = normalizeDictionaryEntry(rawEntry, packMeta);
        await dbPut(STORES.dictionaryEntries, entry);
      }
      await dbPut(STORES.dictionaryMeta, { id: 'embeddedInstalled', installed: true, installedAt: new Date().toISOString() });
    }

    function buildDictionaryAnalysisIndex(entries = []) {
      const surfaceMap = new Map();
      const lemmaMap = new Map();
      for (const entry of entries) {
        const compact = {
          lemma: entry?.lemma || null,
          pos: entry?.pos || null,
          readingKana: entry?.readingKana || null
        };
        if (entry?.surfaceKey && !surfaceMap.has(entry.surfaceKey)) surfaceMap.set(entry.surfaceKey, compact);
        if (entry?.lemmaKey && !lemmaMap.has(entry.lemmaKey)) lemmaMap.set(entry.lemmaKey, compact);
      }
      return { surfaceMap, lemmaMap };
    }

    async function loadDictionaryIndexes() {
      const [packs, entries] = await Promise.all([
        dbGetAll(STORES.dictionaryPacks),
        dbGetAll(STORES.dictionaryEntries)
      ]);
      state.dictionaryAnalysisIndex = buildDictionaryAnalysisIndex(entries);
      state.dictionaryStatus.loadedEntries = entries.length;
      state.dictionaryStatus.packsCount = packs.length;
      state.dictionaryStatus.lastImportedAt = packs.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0))[0]?.updatedAt || null;
    }

    async function importDictionaryPack(file) {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const entries = Array.isArray(parsed) ? parsed : parsed.entries;
      if (!Array.isArray(entries) || !entries.length) {
        throw new Error('Dictionary pack inválido: falta array entries con contenido.');
      }
      const pack = parsed.pack || {};
      const packMeta = {
        id: String(pack.id || `pack-${Date.now()}`),
        name: String(pack.name || file.name || 'Local dictionary pack'),
        version: String(pack.version || 'unknown'),
        source: String(pack.source || 'local-import'),
        updatedAt: new Date().toISOString(),
        installedAt: new Date().toISOString(),
        entryCount: entries.length
      };

      await dbDeleteWhereIndexEquals(STORES.dictionaryEntries, 'packId', packMeta.id);
      for (const rawEntry of entries) {
        const normalized = normalizeDictionaryEntry(rawEntry, packMeta);
        if (!normalized.lemmaKey && !normalized.surfaceKey && !normalized.readingKey) continue;
        await dbPut(STORES.dictionaryEntries, normalized);
      }
      await dbPut(STORES.dictionaryPacks, packMeta);
      await dbPut(STORES.dictionaryMeta, { id: 'lastImport', packId: packMeta.id, updatedAt: new Date().toISOString(), fileName: file.name });
      await clearDictionaryCache();
      await loadDictionaryIndexes();
      return packMeta;
    }

    async function clearDictionaryCache() {
      const db = await openDatabase();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORES.dictionaryCache, 'readwrite');
        tx.objectStore(STORES.dictionaryCache).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function convertGodanNegativeStemToDictionaryForm(stem) {
      const normalizedStem = normalizeTokenSurface(stem || '');
      if (!normalizedStem) return null;
      const chars = [...normalizedStem];
      const last = chars.pop();
      const map = new Map([
        ['わ', 'う'], ['か', 'く'], ['が', 'ぐ'], ['さ', 'す'], ['た', 'つ'],
        ['な', 'ぬ'], ['ば', 'ぶ'], ['ま', 'む'], ['ら', 'る']
      ]);
      const replacement = map.get(last);
      if (!replacement) return null;
      return chars.join('') + replacement;
    }

    function applyDeinflectionRules(surface) {
      const s = normalizeTokenSurface(surface || '');
      if (!s) return [];
      const out = [];
      const seen = new Set();
      const add = (form, reason) => {
        const normalized = normalizeTokenSurface(form || '');
        if (!normalized || seen.has(normalized)) return;
        if (normalized.length <= 1 && normalized !== s) return;
        seen.add(normalized);
        out.push({ form: normalized, reason });
      };
      add(s, 'exact');
      const rules = [
        ['ませんでした', 'る', 'polite-negative-past'], ['ません', 'る', 'polite-negative'],
        ['ました', 'る', 'polite-past'], ['ます', 'る', 'polite'], ['なかった', 'る', 'negative-past'], ['ない', 'る', 'negative'],
        ['かった', 'い', 'adj-past'], ['くない', 'い', 'adj-negative'], ['く', 'い', 'adj-adverbial'],
        ['った', 'う', 'past-godan-u'], ['った', 'つ', 'past-godan-tsu'], ['った', 'る', 'past-godan-ru'],
        ['いて', 'く', 'te-godan-ku'], ['いた', 'く', 'past-godan-ku'],
        ['いで', 'ぐ', 'te-godan-gu'], ['いだ', 'ぐ', 'past-godan-gu'],
        ['んで', 'む', 'te-godan-mu'], ['んで', 'ぶ', 'te-godan-bu'], ['んで', 'ぬ', 'te-godan-nu'],
        ['んだ', 'む', 'past-godan-mu'], ['んだ', 'ぶ', 'past-godan-bu'], ['んだ', 'ぬ', 'past-godan-nu'],
        ['して', 'す', 'te-godan-su'], ['した', 'す', 'past-godan-su'],
        ['って', 'う', 'te-godan-u'], ['って', 'つ', 'te-godan-tsu'], ['って', 'る', 'te-godan-ru'],
        ['ている', 'る', 'progressive-teiru'], ['てる', 'る', 'progressive-teru'],
        ['て', 'る', 'te-ichidan'], ['た', 'る', 'past-ichidan'],
        ['した', 'する', 'suru-past'], ['して', 'する', 'suru-te'],
        ['きた', 'くる', 'kuru-past-kana'], ['来た', '来る', 'kuru-past-kanji']
      ];
      for (const [suffix, replacement, reason] of rules) {
        if (s.endsWith(suffix) && s.length > suffix.length) {
          add(s.slice(0, -suffix.length) + replacement, reason);
        }
      }

      if ((s.endsWith('ず') || s.endsWith('ぬ')) && s.length > 1) {
        const stem = s.slice(0, -1);
        add(stem + 'る', s.endsWith('ず') ? 'classical-negative-zu-ichidan' : 'classical-negative-nu-ichidan');
        const godanForm = convertGodanNegativeStemToDictionaryForm(stem);
        if (godanForm) add(godanForm, s.endsWith('ず') ? 'classical-negative-zu-godan' : 'classical-negative-nu-godan');
        if (stem.endsWith('し')) add(stem.slice(0, -1) + 'する', s.endsWith('ず') ? 'classical-negative-zu-suru' : 'classical-negative-nu-suru');
        if (stem.endsWith('こ')) add(stem.slice(0, -1) + 'くる', s.endsWith('ず') ? 'classical-negative-zu-kuru' : 'classical-negative-nu-kuru');
      }

      const recursiveAuxRules = [
        ['てくれた', 'て', 'aux-kureru-past'],
        ['でくれた', 'で', 'aux-kureru-past'],
        ['てくれる', 'て', 'aux-kureru-nonpast'],
        ['でくれる', 'で', 'aux-kureru-nonpast'],
        ['てくれて', 'て', 'aux-kureru-te'],
        ['でくれて', 'で', 'aux-kureru-te'],
        ['ておいた', 'て', 'aux-oku-past'],
        ['でおいた', 'で', 'aux-oku-past'],
        ['ておく', 'て', 'aux-oku'],
        ['でおく', 'で', 'aux-oku']
      ];
      for (const [suffix, bridge, reason] of recursiveAuxRules) {
        if (!s.endsWith(suffix) || s.length <= suffix.length) continue;
        const bridgeSurface = s.slice(0, -suffix.length) + bridge;
        for (const d of applyDeinflectionRules(bridgeSurface)) {
          if (d.form === s) continue;
          add(d.form, `${reason}::${d.reason}`);
        }
      }
      return out;
    }

    async function lookupByLemma(lemma, reading) {
      const key = normalizeLookupKey(lemma);
      if (!key) return [];
      const entries = await dbGetAllByIndex(STORES.dictionaryEntries, 'lemmaKey', key);
      if (!reading) return entries;
      const readingKey = normalizeLookupKey(convertReadingToHiragana(reading));
      return entries.sort((a, b) => Number(b.readingKey === readingKey) - Number(a.readingKey === readingKey));
    }

    async function lookupBySurface(surface) {
      const key = normalizeLookupKey(surface);
      if (!key) return [];
      return dbGetAllByIndex(STORES.dictionaryEntries, 'surfaceKey', key);
    }

    async function lookupByReading(reading) {
      const key = normalizeLookupKey(convertReadingToHiragana(reading));
      if (!key) return [];
      return dbGetAllByIndex(STORES.dictionaryEntries, 'readingKey', key);
    }

    function rankDictionaryCandidates(candidates, token, context = {}) {
      const lemmaKey = normalizeLookupKey(token?.baseForm || context?.lemma);
      const surfaceKey = normalizeLookupKey(token?.surface || context?.surface);
      const readingKey = normalizeLookupKey(convertReadingToHiragana(token?.reading || context?.reading));
      const candidateSurfaceKeys = new Set((context?.candidateSurfaces || []).map((s) => normalizeLookupKey(s)).filter(Boolean));
      const deinflectedKeys = new Set((context?.deinflections || []).map((d) => normalizeLookupKey(d?.form)).filter(Boolean));
      return [...candidates].map((entry) => {
        let score = 0;
        if (entry.lemmaKey && entry.lemmaKey === lemmaKey) score += 120;
        if (entry.surfaceKey && entry.surfaceKey === surfaceKey) score += 80;
        if (entry.surfaceKey && candidateSurfaceKeys.has(entry.surfaceKey)) score += 95;
        if (entry.lemmaKey && deinflectedKeys.has(entry.lemmaKey)) score += 90;
        if (entry.surfaceKey && deinflectedKeys.has(entry.surfaceKey)) score += 75;
        if (entry.readingKey && readingKey && entry.readingKey === readingKey) score += 60;
        if (entry.meanings?.length) score += 10;
        if (entry.bestGloss) score += 5;
        return { entry, score };
      }).sort((a, b) => b.score - a.score);
    }

    function chooseBestDictionaryEntry(rankedCandidates) {
      if (!rankedCandidates?.length) return null;
      return rankedCandidates[0].entry;
    }

    function buildDictionaryLookupRequest(token, context = {}) {
      const reading = convertReadingToHiragana(token?.reading || null);
