<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>日本語 Reader</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-strong: #ffffff;
      --surface-soft: #f5f5f7;
      --text: #252230;
      --muted: #7a7488;
      --primary: #7e78a2;
      --danger: #b2445e;
      --border: #cdc6db;
      --toggle-bg: #e5dfef;
      --toggle-active: #ffffff;
      --shadow-soft: 0 14px 34px rgba(116, 102, 153, 0.14);
      --shadow-strong: 0 18px 42px rgba(116, 102, 153, 0.18);
    }
    [data-theme="dark"] {
      --bg: #111628;
      --surface: #1b2134;
      --surface-strong: #22293e;
      --surface-soft: #262d45;
      --text: #f1eef8;
      --muted: #b8b2c9;
      --primary: #a59cc8;
      --danger: #f39ab0;
      --border: #48506b;
      --toggle-bg: #313852;
      --toggle-active: #454e6c;
      --shadow-soft: 0 18px 38px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 22px 46px rgba(0, 0, 0, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }
    body.reader-sentence-lock {
      overflow: hidden;
      height: 100dvh;
      min-height: 100dvh;
      overscroll-behavior: none;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 14px calc(env(safe-area-inset-bottom, 0px) + 34px);
    }
    .app.reader-app {
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    }
    .app.reader-app.reader-mode-page {
      overflow: hidden;
    }
    .app.reader-app.reader-mode-sentence {
      overflow: hidden;
    }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .spacer { flex: 1; }
    button, select, input[type="range"], input[type="text"], input[type="search"], input[type="password"] {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font: inherit;
    }
    button.primary { background: var(--primary); color: white; border-color: transparent; }
    button.danger { color: white; background: var(--danger); border-color: transparent; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
    .book-item { display: grid; grid-template-columns: 72px 1fr; gap: 12px; align-items: start; }
    .cover { width: 72px; height: 96px; border: 1px solid var(--border); border-radius: 8px; object-fit: cover; background: #cbd5e1; }
    .book-title { margin: 0 0 4px; font-size: 1rem; }
    .meta { margin: 2px 0; color: var(--muted); font-size: 0.85rem; }
    .empty { text-align: center; padding: 32px 12px; color: var(--muted); }
    .reader-shell {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
    }
    .reader-card {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 6px 0 0;
      position: relative;
      z-index: 12;
      flex: 0 0 auto;
    }
    .reader-topbar {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) 52px;
      gap: 12px;
      align-items: center;
      min-height: 52px;
    }
    .reader-topbar-btn {
      border: 0;
      background: transparent;
      color: #4b4b55;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      align-self: center;
      justify-self: center;
    }
    .reader-topbar-btn:hover {
      background: color-mix(in srgb, var(--border) 32%, transparent);
    }
    .reader-topbar-btn:active {
      background: color-mix(in srgb, var(--border) 42%, transparent);
    }
    .reader-topbar-btn.menu {
      font-size: inherit;
      letter-spacing: normal;
      padding-bottom: 0;
    }
    .reader-topbar-icon {
      width: 28px;
      height: 28px;
      display: block;
      pointer-events: none;
    }
    .reader-topbar-icon line {
      stroke: currentColor;
      fill: none;
      stroke-linecap: round;
      stroke-width: 2.35;
    }
    .reader-topbar-btn.menu .reader-topbar-icon {
      width: 26px;
      height: 10px;
      display: block;
    }
    .reader-topbar-btn.menu .reader-topbar-icon circle {
      fill: currentColor;
      stroke: none;
    }
    .reader-topbar-btn.menu {
      justify-self: end;
    }
    .reader-quick-nav {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .reader-quick-nav button {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 10px 8px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 95%, #eef2f8 5%);
      font-size: 1.35rem;
      line-height: 1;
    }
    .reader-quick-nav button span { display: none; }
    .reader-top {
      display: grid;
      gap: 12px;
      align-items: center;
    }
    .reader-headline {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-btn {
      border: none;
      background: transparent;
      color: var(--text);
      padding: 6px;
      border-radius: 10px;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
    }
    .icon-btn:hover { background: color-mix(in srgb, var(--border) 55%, transparent); }
    .reader-progress {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 0;
      margin: 0;
      min-width: 0;
    }
    .reader-progress-shell {
      position: relative;
      padding-top: 0;
      overflow: visible;
    }
    .reader-progress-bubble {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      transform: translateX(-50%) translateY(-4px) scale(0.96);
      transform-origin: center top;
      background: #4b4b55;
      color: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      min-width: 74px;
      text-align: center;
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      white-space: nowrap;
      z-index: 2;
    }
    .reader-progress-bubble.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .reader-progress input[type="range"] {
      --progress-value: 0%;
      width: 100%;
      padding: 0;
      height: 28px;
      border: 0;
      border-radius: 999px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }
    .reader-progress input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(to right, #49a143 0%, #49a143 var(--progress-value), #c4c7ce var(--progress-value), #c4c7ce 100%);
    }
    .reader-progress input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -4px;
      border-radius: 50%;
      border: 0;
      background: #b8bcc3;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.88);
    }
    .reader-progress input[type="range"]::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: #c4c7ce;
    }
    .reader-progress input[type="range"]::-moz-range-progress {
      height: 8px;
      border-radius: 999px;
      background: #49a143;
    }
    .reader-progress input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 0;
      background: #b8bcc3;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.88);
    }
    .reader-menu {
      display: grid;
      gap: 12px;
      padding: 14px;
      margin-top: 8px;
      background: color-mix(in srgb, var(--surface) 96%, #eef1f5 4%);
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
    }
    .reader-menu-section {
      display: grid;
      gap: 8px;
    }
    .reader-font-control-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: 4px;
    }
    .reader-font-stepper {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 11rem;
      max-width: 100%;
      justify-self: start;
      border-radius: 999px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface-soft) 82%, var(--border) 18%);
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38);
    }
    .reader-font-stepper button {
      border: 0;
      border-radius: 0;
      min-height: 3.8rem;
      padding: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 120ms ease, opacity 120ms ease;
    }
    .reader-font-stepper button .font-size-label {
      display: block;
      line-height: 1;
      transform: translateY(0.02em);
      pointer-events: none;
    }
    .reader-font-stepper button:hover {
      background: color-mix(in srgb, var(--border) 32%, transparent);
    }
    .reader-font-stepper button:active {
      background: color-mix(in srgb, var(--border) 40%, transparent);
    }
    .reader-font-stepper button + button {
      border-left: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    .reader-font-stepper button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .reader-font-stepper .font-size-small .font-size-label {
      font-size: 1.5rem;
    }
    .reader-font-stepper .font-size-large .font-size-label {
      font-size: 2.3rem;
    }
    .reader-menu-divider {
      height: 1px;
      background: color-mix(in srgb, var(--border) 70%, #f3f4f6 30%);
      border-radius: 999px;
    }
    .reader-content-wrap {
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
      flex: 1 1 auto;
      min-height: 0;
      overflow-anchor: none;
    }
    .reader-content-wrap.reader-content-wrap-page {
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    .reader-content-wrap.is-dragging {
      user-select: none;
      -webkit-user-select: none;
    }
    .reader-carousel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .reader-content-wrap.reader-content-wrap-page .reader-carousel {
      height: auto;
      min-height: 100%;
    }
    .reader-carousel-track {
      display: flex;
      width: 100%;
      min-width: 100%;
      height: 100%;
      will-change: transform;
      transform: translate3d(calc(-100% + var(--reader-drag-offset, 0px)), 0, 0);
      transition: transform 220ms ease;
      overflow-anchor: none;
    }
    .reader-content-wrap.reader-content-wrap-page .reader-carousel-track {
      height: auto;
      min-height: 100%;
      align-items: flex-start;
    }
    .reader-carousel-track.is-dragging {
      transition: none;
    }
    .reader-carousel-panel {
      flex: 0 0 100%;
      width: 100%;
      min-width: 100%;
      max-width: 100%;
      height: 100%;
      padding: 0 4px;
      overflow: hidden;
      display: flex;
      overflow-anchor: none;
    }
    .reader-content-wrap.reader-content-wrap-page .reader-carousel-panel {
      height: auto;
      min-height: 100%;
      overflow: visible;
      align-items: flex-start;
    }
    .reader-carousel-panel[data-panel-role="prev"],
    .reader-carousel-panel[data-panel-role="next"] {
      pointer-events: none;
    }
    .reader-content,
    .reader-preview-content {
      min-height: 0;
      height: 100%;
      overflow: visible;
      border: 0;
      border-radius: 0;
      padding: 0 4px 0;
      background: transparent;
      line-height: 1.85;
      font-size: var(--reader-font-size, 18px);
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .reader-content-wrap.reader-content-wrap-page .reader-content,
    .reader-content-wrap.reader-content-wrap-page .reader-preview-content {
      height: auto;
      min-height: 100%;
    }
    .reader-content iframe,
    .reader-preview-content iframe { width: 100%; min-height: 56vh; border: 0; }
    .reader-preview-content {
      opacity: 1;
      filter: none;
    }
    .reader-preview-empty {
      min-height: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px 0;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }
    .sentence-hero-preview {
      min-height: 0;
    }
    .sentence-box {
      font-size: 1em;
      line-height: 1.9;
      margin-top: 0;
      white-space: pre-wrap;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .page-mode-text {
      font-size: 1em;
      line-height: 1.95;
      white-space: pre-wrap;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .page-sentence {
      margin: 0;
      max-width: 100%;
      min-width: 0;
      display: inline;
    }
    .page-paragraph {
      margin: 0 0 0.7em;
      max-width: 100%;
      min-width: 0;
    }
    .reader-status-strip {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .reader-status-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .reader-status-subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.25;
    }
    .reader-status-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .reader-status-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      line-height: 1.2;
      background: color-mix(in srgb, var(--surface-strong) 82%, var(--surface-soft) 18%);
    }
    .reader-page-frame {
      min-height: var(--reader-page-height, calc(100vh - 250px));
      padding: 0 2px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .reader-content-wrap.reader-content-wrap-page .reader-page-frame {
      min-height: auto;
    }
    .reader-page-footer {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }
    #paginationMeasureHost {
      position: fixed;
      left: -99999px;
      top: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
      contain: layout style paint;
    }
    .segmented-line {
      display: flex;
      flex-wrap: wrap;
      gap: 0.12em;
      align-items: baseline;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }
    .segmented-line.compact { gap: 0; }
    .token {
      border-radius: 6px;
      padding: 0 0.12em;
      border-bottom: 1px solid transparent;
      transition: background-color 120ms ease;
    }
    .token.clickable { cursor: pointer; }
    .token.jp.unknown-word {
      background: var(--token-level-0-bg, #dbeafe);
      border-bottom-color: transparent;
      text-decoration: var(--token-level-0-decoration, none);
    }
    .token.jp.known-learning {
      background: var(--token-level-1-bg, #fef08a);
      border-bottom-color: transparent;
      text-decoration: var(--token-level-1-decoration, none);
    }
    .token.jp.known-level-5 {
      border-bottom-color: transparent;
      background: var(--token-level-5-bg, transparent);
      text-decoration: var(--token-level-5-decoration, none);
    }
    .token.punct { opacity: 0.9; }
    .segmented-line.compact .token { border-bottom-color: transparent; }
    .token.known-level-1 {
      border-bottom-color: transparent;
      background: var(--token-level-1-bg, #fef08a);
      text-decoration: var(--token-level-1-decoration, none);
    }
    .token.known-level-2 {
      border-bottom-color: transparent;
      background: var(--token-level-2-bg, transparent);
      text-decoration: var(--token-level-2-decoration, underline dotted);
      text-decoration-thickness: var(--token-level-2-decoration-thickness, 2px);
      text-underline-offset: 0.16em;
      text-decoration-color: var(--token-level-2-decoration-color, color-mix(in srgb, currentColor 78%, transparent));
    }
    .token.known-level-3 {
      border-bottom-color: transparent;
      background: var(--token-level-3-bg, transparent);
      text-decoration: var(--token-level-3-decoration, none);
    }
    .token.known-level-4 {
      border-bottom-color: transparent;
      background: var(--token-level-4-bg, transparent);
      text-decoration: var(--token-level-4-decoration, none);
    }
    .token.known-level-5 {
      border-bottom-color: transparent;
      background: var(--token-level-5-bg, transparent);
      text-decoration: var(--token-level-5-decoration, none);
    }
    [data-theme="dark"] .token.jp.unknown-word {
      background: #d1d5db;
      color: #111827;
    }
    [data-theme="dark"] .token.jp.known-learning,
    [data-theme="dark"] .token.known-level-1,
    [data-theme="dark"] .token.known-level-2 {
      color: #111827;
    }
    .reader-level-settings {
      display: grid;
      gap: 10px;
    }
    .reader-level-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: color-mix(in srgb, var(--surface-soft) 70%, transparent);
    }
    .reader-level-row label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .reader-level-preview {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .reader-level-preview .token {
      padding-inline: 0.32em;
    }
    .reader-content.with-panel { position: relative; }
    #tokenPanelHost {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    .token-panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      pointer-events: auto;
    }
    .token-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      padding: 10px 12px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      z-index: 3;
      width: min(560px, calc(100vw - 24px));
      max-height: min(82vh, 780px);
      overflow-y: auto;
      overflow-x: visible;
      pointer-events: auto;
    }
    .token-panel h3 { margin: 0; font-size: 1.55rem; line-height: 1.1; }
    .token-lemma-line {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 400;
    }
    .token-panel-top-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 0px;
      border-bottom: 0px solid #d1d5db;
    }
    .token-panel-top-row .left-actions {
      justify-self: start;
      display: flex;
    }
    .token-panel-top-row .right-actions {
      justify-self: end;
      display: flex;
    }
    .token-grid { display: grid; gap: 10px; }
    .token-grid .v { font-weight: 400; word-break: break-word; }
    .token-grid .hiragana { color: var(--muted); font-size: 0.95rem; }
    .token-panel h3 .hiragana {
      color: var(--muted);
      font-weight: 400;
    }
    .level-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0; justify-content: center; }
    .token-panel-word-row {
      margin: 0 -12px 12px;
      align-items: center;
      background: #eceff3;
      border: 1px solid #d1d5db;
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      padding: 12px 18px;
    }
    [data-theme="dark"] .token-panel-word-row {
      background: color-mix(in srgb, var(--surface-soft) 80%, #8b96ab 20%);
      border-color: color-mix(in srgb, var(--border) 78%, #9ca3af 22%);
    }
    .token-panel-section {
      border-top: 1px solid #d1d5db;
      padding: 12px 0;
      min-height: 50px;
      display: flex;
      align-items: center;
    }
    .token-panel-section-content {
      width: 100%;
    }
    .token-panel-footer {
      margin-top: 12px;
      display: flex;

<body>
  <div id="app" class="app"></div>

  <script>
    /*
      JP EPUB Reader - Fase 3 (offline-first)
      Arquitectura (todo autocontenido en este archivo):
      1) Config / constantes
      2) Utilidades generales
      3) Capa IndexedDB
      4) Importación y almacenamiento de EPUB
      5) Extracción de metadatos
      6) Lógica del lector (modo página + modo frase)
      7) [NUEVO Fase 2] Normalización + tokenización japonesa + render de tokens
      8) [NUEVO Fase 3] Vocabulario (modelo + interacción + panel + vista)
      9) Renderizado UI + Router
      10) Preferencias + Service Worker

      Limitaciones conocidas Fase 1:
      - Parser EPUB minimalista: soporta ZIP método Stored (0) y Deflate (8).
      - Algunos EPUB complejos pueden renderizar estilos/recursos de forma parcial.
      - Segmentación de frases heurística, prioriza robustez.
      - Fase 2 agrega tokenización y segmentación visual opcional.
      - Fase 3 agrega interacción con tokens, nivel 1..5 y persistencia de vocabulario (sin diccionario).
      - Fase 4 agrega diccionario offline, lecturas hiragana/romaji y definición personalizada del usuario.
    */

    // =========================
    // Config / constantes
    // =========================
    const DB_NAME = 'jp_epub_reader_db';
    const DB_VERSION = 6;
    const EPUB_PARSE_CACHE_VERSION = 1;
    const STORES = {
      books: 'books',
      bookFiles: 'bookFiles',
      bookParsedCache: 'bookParsedCache',
      progress: 'progress',
      settings: 'settings',
      vocabEntries: 'vocabEntries',
      dictionaryCache: 'dictionaryCache',
      dictionaryEntries: 'dictionaryEntries',
      dictionaryPacks: 'dictionaryPacks',
      dictionaryMeta: 'dictionaryMeta',
      sentenceOverrides: 'sentenceOverrides'
    };
    const SETTINGS_KEY = 'app_settings';
    const AZURE_TRANSLATOR_ENDPOINT = 'https://api.cognitive.microsofttranslator.com';
    const DEFAULT_GEMINI_MODEL = 'gemini-3.1-flash-lite-preview';
    const DEFAULT_GEMINI_PROMPT = 'Responde únicamente repitiendo la palabra + la palabra en hiragana entre parentesis + la definición en castellano ( por ej.  "仕方ない - しかたない  - No se puede evitar / No hay remedio"). La palabra a definir ahora es: ';
    const DEFAULT_CHATGPT_WORD_PROMPT = 'Dame la lectura en hiragana y la traducción de ';
    const DEFAULT_CHATGPT_SENTENCE_PROMPT = 'Dame la traducción y explícame la gramática y cada palabra de la frase: ';
    const READER_LEVEL_IDS = [0, 1, 2, 3, 4, 5];
    const DEFAULT_READER_LEVEL_STYLES = Object.freeze({
      light: {
        0: { bg: '#dbeafe', underline: false },
        1: { bg: '#fef08a', underline: false },
        2: { bg: 'transparent', underline: true },
        3: { bg: 'transparent', underline: false },
        4: { bg: 'transparent', underline: false },
        5: { bg: 'transparent', underline: false }
      },
      dark: {
        0: { bg: '#d1d5db', underline: false },
        1: { bg: '#fef08a', underline: false },
        2: { bg: 'transparent', underline: true },
        3: { bg: 'transparent', underline: false },
        4: { bg: 'transparent', underline: false },
        5: { bg: 'transparent', underline: false }
      }
    });
    const DEFAULT_SETTINGS = {
      theme: 'light',
      fontSize: 18,
      readerLevelStyles: DEFAULT_READER_LEVEL_STYLES,
      showSegmentation: false,
      tokenDebug: false,
      lastOpenedBookId: null,
      azureTranslateKey: '',
      azureTranslateRegion: '',
      geminiApiKey: '',
      geminiPrompt: DEFAULT_GEMINI_PROMPT,
      geminiModel: DEFAULT_GEMINI_MODEL,
      chatgptWordPrompt: DEFAULT_CHATGPT_WORD_PROMPT,
      chatgptSentencePrompt: DEFAULT_CHATGPT_SENTENCE_PROMPT
    };

    function buildDefaultReaderLevelStyles() {
      return JSON.parse(JSON.stringify(DEFAULT_READER_LEVEL_STYLES));
    }

    function getSafeCssColor(value, fallback = 'transparent') {
      const str = String(value || '').trim();
      if (!str) return fallback;
      const candidate = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(str) ? str : str;
      if (!window.CSS?.supports?.('color', candidate)) return fallback;
      return candidate;
    }

    function normalizeReaderLevelStyles(raw) {
      const defaults = buildDefaultReaderLevelStyles();
      const source = raw && typeof raw === 'object' ? raw : {};
      for (const themeName of ['light', 'dark']) {
        const themeStyles = source[themeName] && typeof source[themeName] === 'object' ? source[themeName] : {};
        for (const level of READER_LEVEL_IDS) {
          const levelKey = String(level);
          const incoming = themeStyles[levelKey] && typeof themeStyles[levelKey] === 'object' ? themeStyles[levelKey] : {};
          defaults[themeName][level] = {
            bg: getSafeCssColor(incoming.bg, defaults[themeName][level].bg),
            underline: Boolean(incoming.underline)
          };
        }
      }
      return defaults;
    }

    function getReaderLevelStyle(themeName, level) {
      const resolvedTheme = themeName === 'dark' ? 'dark' : 'light';
      const normalized = normalizeReaderLevelStyles(state.settings?.readerLevelStyles);
      return normalized[resolvedTheme][level] || DEFAULT_READER_LEVEL_STYLES[resolvedTheme][level];
    }

    function applyReaderLevelStyleVariables(themeName = state.settings?.theme) {
      const resolvedTheme = themeName === 'dark' ? 'dark' : 'light';
      for (const level of READER_LEVEL_IDS) {
        const style = getReaderLevelStyle(resolvedTheme, level);
        const bg = getSafeCssColor(style.bg, DEFAULT_READER_LEVEL_STYLES[resolvedTheme][level].bg);
        const underline = Boolean(style.underline);
        document.documentElement.style.setProperty(`--token-level-${level}-bg`, bg);
        document.documentElement.style.setProperty(`--token-level-${level}-decoration`, underline ? 'underline dotted' : 'none');
        if (level === 2) {
          document.documentElement.style.setProperty('--token-level-2-decoration-thickness', underline ? '2px' : '0px');
          document.documentElement.style.setProperty('--token-level-2-decoration-color', underline ? 'color-mix(in srgb, currentColor 78%, transparent)' : 'transparent');
        }
      }
    }
    const BACKUP_FORMAT = 'jp_epub_reader_backup';
    const BACKUP_FILE_VERSION = 1;
    const BACKUP_STORE_NAMES = Object.freeze([
      STORES.books,
      STORES.bookFiles,
      STORES.progress,
      STORES.settings,
      STORES.vocabEntries,
      STORES.dictionaryCache,
      STORES.dictionaryEntries,
      STORES.dictionaryPacks,
      STORES.dictionaryMeta,
      STORES.sentenceOverrides
    ]);

    const state = {
      route: 'library',
      books: [],
      currentBook: null,
      currentBookId: null,
      currentSpineIndex: 0,
      currentSentenceIndex: 0,
      readingMode: 'page',
      sections: [],
      sectionSentencesCache: new Map(),
      sectionParagraphsCache: new Map(),
      sentenceTokenCache: new Map(),
      pageMapsCache: new Map(),
      pageSummariesCache: new Map(),
      flatSentenceEntriesCache: null,
      flatSentenceIndexLookupCache: null,
      settings: { ...DEFAULT_SETTINGS },
      vocabMap: new Map(),
      vocabDataVersion: 0,
      tokenSelection: {
        token: null,
        entry: null,
        draftLevel: null,
        dictionaryResult: null,
        userDefinitionDraft: '',
        isEditingUserDefinition: false
      },
      vocabFilters: {
        query: '',
        level: 'all'
      },
      vocabView: {
        initialized: false,
        cacheKey: '',
        filteredEntries: [],
        allEntriesCount: 0,
        renderedCount: 0,
        batchSize: 80,
        debounceTimer: null,
        pendingNotes: new Map(),
        loadMoreObserver: null,
        isLoadingMore: false
      },
      vocabSelection: null,
      dictionaryStatus: {
        loadedEntries: 0,
        packsCount: 0,
        lastImportedAt: null,
        importMessage: ''
      },
      dictionaryAnalysisIndex: {
        surfaceMap: new Map(),
        lemmaMap: new Map()
      },
      backupUi: {
        isOpen: false,
        isBusy: false,
        status: ''
      },
      advancedSettingsUi: {
        isOpen: false
      },
      translationConfigStatus: '',
      geminiConfigStatus: '',
      sentenceTranslation: {
        bookId: null,
        sectionIndex: null,
        sentenceIndex: null,
        status: 'idle',
        translatedText: '',
        error: ''
      },
      sentenceOverrideMap: new Map(),
      sentenceEditor: {
        isOpen: false,
        bookId: null,
        sectionIndex: null,
        sentenceIndex: null,
        draft: '',
        error: ''
      }
    };

    // =========================
    // Utilidades generales
    // =========================
    const $ = (sel, root = document) => root.querySelector(sel);

    function touchVocabularyData() {
      state.vocabDataVersion += 1;
      state.vocabView.cacheKey = '';
    }

    function escapeHtml(str = '') {
      return str.replace(/[&<>"]/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m]));
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function renderSentenceEditMirrorHtml(text = '') {
      const chars = Array.from(text || '');
      let html = '';
      let pendingSpaceMarker = false;
      for (const char of chars) {
        if (char === '\n') {
          pendingSpaceMarker = false;
          html += '<br>';
          continue;
        }
        if (char === ' ' || char === '\t') {
          if (!pendingSpaceMarker) {
            html += '<span class="sentence-edit-space">&nbsp;</span>';
            pendingSpaceMarker = true;
          }
          continue;
        }
        pendingSpaceMarker = false;
        html += `<span class="sentence-edit-char">${escapeHtml(char)}</span>`;
      }
      return html;
    }

    function syncSentenceEditPreview() {
      const textarea = $('#sentenceEditInput');
      const preview = $('#sentenceEditPreview');
      if (!textarea || !preview) return;
      preview.innerHTML = renderSentenceEditMirrorHtml(textarea.value || '');
    }

    function uuid() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2)}`;
    }

    function normalizePath(path) {
      const parts = [];
      for (const part of path.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') parts.pop();
        else parts.push(part);
      }
      return parts.join('/');
    }

    function resolveHref(basePath, href) {
      if (!href) return '';
      if (/^[a-z]+:/i.test(href) || href.startsWith('/')) return href;
      const clean = href.split('#')[0].split('?')[0];
      const baseDir = basePath.includes('/') ? basePath.slice(0, basePath.lastIndexOf('/') + 1) : '';
      return normalizePath(baseDir + clean);
    }

    function uint8ToText(bytes, encoding = 'utf-8') {
      return new TextDecoder(encoding).decode(bytes);
    }

    function bytesToDataUrl(bytes, mime = 'application/octet-stream') {
      const blob = new Blob([bytes], { type: mime });
      return new Promise((resolve) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(blob);
      });
    }

    // =========================
    // Capa IndexedDB
    // =========================
    function openDatabase() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORES.books)) db.createObjectStore(STORES.books, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.bookFiles)) db.createObjectStore(STORES.bookFiles, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.progress)) db.createObjectStore(STORES.progress, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.settings)) db.createObjectStore(STORES.settings, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.vocabEntries)) {
            const vocabStore = db.createObjectStore(STORES.vocabEntries, { keyPath: 'id' });
            vocabStore.createIndex('vocabKey', 'vocabKey', { unique: true });
            vocabStore.createIndex('updatedAt', 'updatedAt', { unique: false });
            vocabStore.createIndex('familiarityLevel', 'familiarityLevel', { unique: false });
          }
          const vocabStore = req.transaction.objectStore(STORES.vocabEntries);
          if (!vocabStore.indexNames.contains('vocabKey')) vocabStore.createIndex('vocabKey', 'vocabKey', { unique: true });
          if (!vocabStore.indexNames.contains('updatedAt')) vocabStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          if (!vocabStore.indexNames.contains('familiarityLevel')) vocabStore.createIndex('familiarityLevel', 'familiarityLevel', { unique: false });
          if (!db.objectStoreNames.contains(STORES.dictionaryCache)) {
            const dictCacheStore = db.createObjectStore(STORES.dictionaryCache, { keyPath: 'lookupKey' });
            dictCacheStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          if (!db.objectStoreNames.contains(STORES.dictionaryEntries)) {
            const dictEntries = db.createObjectStore(STORES.dictionaryEntries, { keyPath: 'id' });
            dictEntries.createIndex('lemmaKey', 'lemmaKey', { unique: false });
            dictEntries.createIndex('surfaceKey', 'surfaceKey', { unique: false });
            dictEntries.createIndex('readingKey', 'readingKey', { unique: false });
            dictEntries.createIndex('packId', 'packId', { unique: false });
          }
          const dictionaryEntriesStore = req.transaction.objectStore(STORES.dictionaryEntries);
          if (!dictionaryEntriesStore.indexNames.contains('lemmaKey')) dictionaryEntriesStore.createIndex('lemmaKey', 'lemmaKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('surfaceKey')) dictionaryEntriesStore.createIndex('surfaceKey', 'surfaceKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('readingKey')) dictionaryEntriesStore.createIndex('readingKey', 'readingKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('packId')) dictionaryEntriesStore.createIndex('packId', 'packId', { unique: false });
          if (!db.objectStoreNames.contains(STORES.dictionaryPacks)) {
            const packsStore = db.createObjectStore(STORES.dictionaryPacks, { keyPath: 'id' });
            packsStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          if (!db.objectStoreNames.contains(STORES.dictionaryMeta)) {
            db.createObjectStore(STORES.dictionaryMeta, { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains(STORES.sentenceOverrides)) {
            const sentenceOverridesStore = db.createObjectStore(STORES.sentenceOverrides, { keyPath: 'id' });
            sentenceOverridesStore.createIndex('bookId', 'bookId', { unique: false });
            sentenceOverridesStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          if (!db.objectStoreNames.contains(STORES.bookParsedCache)) {
            const parsedCacheStore = db.createObjectStore(STORES.bookParsedCache, { keyPath: 'bookId' });
            parsedCacheStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          const sentenceOverridesStore = req.transaction.objectStore(STORES.sentenceOverrides);
          if (!sentenceOverridesStore.indexNames.contains('bookId')) sentenceOverridesStore.createIndex('bookId', 'bookId', { unique: false });
          if (!sentenceOverridesStore.indexNames.contains('updatedAt')) sentenceOverridesStore.createIndex('updatedAt', 'updatedAt', { unique: false });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(storeName, value) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(value);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGet(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGetAll(storeName) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDelete(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGetByIndex(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).index(indexName).get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }


    async function dbGetAllByIndex(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).index(indexName).getAll(IDBKeyRange.only(key));
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDeleteWhereIndexEquals(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const index = tx.objectStore(storeName).index(indexName);
        const cursorReq = index.openCursor(IDBKeyRange.only(key));
        cursorReq.onsuccess = () => {
          const cursor = cursorReq.result;
          if (cursor) {
            cursor.delete();
            cursor.continue();
          }
        };
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function listBooks() {
      const books = await dbGetAll(STORES.books);
      return books.sort((a, b) => {
        const aLastAccess = a.lastOpenedAt ? new Date(a.lastOpenedAt).getTime() : 0;
        const bLastAccess = b.lastOpenedAt ? new Date(b.lastOpenedAt).getTime() : 0;
        if (bLastAccess !== aLastAccess) return bLastAccess - aLastAccess;
        return new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime();
      });
    }

        && cache.sections.length

    function buildParsedSectionsCachePayload(bookId, parsed) {
      const sections = (parsed?.sections || []).map((section) => ({

        html: section.html,
        sentenceCount: getSentencesForSection(section).length
      }));
      return {

        parseVersion: EPUB_PARSE_CACHE_VERSION,

    async function getParsedBookData(bookId, blob = null) {
      const cached = await loadParsedBookCache(bookId);
      if (cached) {
        return {
          title: cached.parsedTitle || 'Sin título',
          author: cached.parsedAuthor || 'Autor desconocido',
          sections: cached.sections || []
        };
      }
      const sourceBlob = blob || await loadBookBlob(bookId);
      if (!sourceBlob) return null;
      const epubMap = await unzipEpub(await sourceBlob.arrayBuffer());
      const parsed = await extractReadableSections(epubMap);
      if (!parsed.sections.length) return parsed;
      const cachePayload = await saveParsedBookCache(bookId, parsed);
      return {
        title: cachePayload.parsedTitle,
        author: cachePayload.parsedAuthor,
        sections: cachePayload.sections
      };
    }

    function buildSentenceOverrideId(bookId, sectionPath, sentenceIndex) {
      return `${bookId || 'book'}::${sectionPath || 'section'}::${sentenceIndex}`;

    function normalizeSentenceOverrideText(text) {
      return String(text || '')
        .replace(/\s+/gu, ' ')
        .trim();
    }

    function removeSentenceOverrideWhitespace(text) {

    async function loadSentenceOverrides() {

    function getSentenceOverrideRecord(bookId, sectionIndex, sentenceIndex, sentence = null) {
      const section = state.sections[sectionIndex] || {};
      const id = buildSentenceOverrideId(bookId, section.path, sentenceIndex);
      const record = state.sentenceOverrideMap.get(id) || null;
      if (!record) return null;
      if (sentence != null) {
        const expected = removeSentenceOverrideWhitespace(sentence);
        const original = removeSentenceOverrideWhitespace(record.originalSentence || '');
        if (expected && original && expected !== original) return null;
      }
      return record;
    }

    function buildAutomaticSentenceTokenization(bookId, sectionIndex, sentenceIndex, sentence) {
      const raw = tokenizeJapaneseText(sentence);
      const mergedRaw = mergeJapaneseTokensForDisplayAndLookup(raw, {
        bookId,
        sectionIndex,
        sentenceIndex,
        analysisMemo: new Map()
      });
      const tokens = mergedRaw.map((tk, tokenIndex) => buildTokenModel(tk, {
        bookId,
        sectionIndex,
        sentenceIndex,
        tokenIndex
      }));
      return { sentence, tokens, tokenizationMode: 'auto' };
    }

    function buildManualSentenceTokens(sentence, segmentedText, context = {}) {
      const compactSentence = removeSentenceOverrideWhitespace(sentence);
      const normalizedSegmentedText = normalizeSentenceOverrideText(segmentedText);
      if (!compactSentence || !normalizedSegmentedText) return [];
      const pieces = normalizedSegmentedText.split(/\s+/u).filter(Boolean);
      if (!pieces.length) return [];
      if (pieces.join('') !== compactSentence) return [];
      const analysisMemo = new Map();
      let cursor = 0;
      return pieces.map((piece, tokenIndex) => {
        const startOffset = cursor;
        const endOffset = startOffset + piece.length;
        cursor = endOffset;
        const tokenType = classifyToken(piece);
        const analysis = isJapaneseText(piece) && tokenType !== 'punct' && tokenType !== 'space' && tokenType !== 'empty'
          ? resolveTokenAnalysisFromDictionary(piece, { ...context, analysisMemo })
          : null;
        return buildTokenModel({
          surface: piece,
          startOffset,
          endOffset,
          rawSpanLength: 1,
          rawStartTokenIndex: tokenIndex,
          rawEndTokenIndex: tokenIndex,
          analysis: {
            baseForm: analysis?.baseForm || normalizeTokenSurface(piece) || piece,
            pos: analysis?.pos || tokenType,
            reading: analysis?.reading || null,
            source: 'manual-override',
            score: Number(analysis?.analysisScore) || 0
          }
        }, {
          bookId: context.bookId,
          sectionIndex: context.sectionIndex,
          sentenceIndex: context.sentenceIndex,
          tokenIndex
        });
      });
    }

    function buildDefaultSentenceEditorDraft(bookId, sectionIndex, sentenceIndex) {
      const section = state.sections[sectionIndex] || {};
      const sentences = getSentencesForSection(section);
      const sentence = sentences[sentenceIndex] || '';
      if (!sentence) return '';
      const existingOverride = getSentenceOverrideRecord(bookId, sectionIndex, sentenceIndex, sentence);
      if (existingOverride?.segmentedText) return existingOverride.segmentedText;
      const tokenized = buildAutomaticSentenceTokenization(bookId, sectionIndex, sentenceIndex, sentence);
      return tokenized.tokens.map((token) => token.surface || '').join(' ').trim() || sentence;
    }

    async function saveSentenceOverrideForLocation(location, segmentedText) {
      const safeLocation = getNormalizedReaderLocation(location);
      const section = state.sections[safeLocation.sectionIndex] || {};
      const sentences = getSentencesForSection(section);
      const sentence = sentences[safeLocation.sentenceIndex] || '';
      const normalizedSegmentedText = normalizeSentenceOverrideText(segmentedText);
      const compactSentence = removeSentenceOverrideWhitespace(sentence);
      const compactSegmented = removeSentenceOverrideWhitespace(normalizedSegmentedText);
      if (!sentence) throw new Error('No se encontró la frase actual.');
      if (!normalizedSegmentedText) throw new Error('Añade al menos una división antes de guardar.');
      if (compactSegmented !== compactSentence) {
        throw new Error('La frase editada debe contener exactamente los mismos caracteres; solo puedes cambiar los espacios.');
      }
      const id = buildSentenceOverrideId(state.currentBookId, section.path, safeLocation.sentenceIndex);
      const now = new Date().toISOString();
      const existing = state.sentenceOverrideMap.get(id);
      const record = {
        id,
        bookId: state.currentBookId,
        sectionPath: section.path,
        sectionIndex: safeLocation.sectionIndex,
        sentenceIndex: safeLocation.sentenceIndex,
        originalSentence: sentence,
        segmentedText: normalizedSegmentedText,
        createdAt: existing?.createdAt || now,
        updatedAt: now
      };
      await dbPut(STORES.sentenceOverrides, record);
      state.sentenceOverrideMap.set(id, record);
      state.sentenceTokenCache.clear();
      return record;
    }

    async function deleteSentenceOverrideForLocation(location) {
      const safeLocation = getNormalizedReaderLocation(location);
      const section = state.sections[safeLocation.sectionIndex] || {};
      const id = buildSentenceOverrideId(state.currentBookId, section.path, safeLocation.sentenceIndex);
      await dbDelete(STORES.sentenceOverrides, id);
      state.sentenceOverrideMap.delete(id);
      state.sentenceTokenCache.clear();
    }

    async function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(String(fr.result || ''));
        fr.onerror = () => reject(fr.error || new Error('No se pudo serializar el fichero.'));
        fr.readAsDataURL(blob);
      });
    }

    async function dataUrlToBlob(dataUrl) {
      const response = await fetch(dataUrl);
      return response.blob();
    }

    async function serializeBackupValue(value) {
      if (value instanceof Blob) {
        return {
          __type: 'Blob',
          mimeType: value.type || 'application/octet-stream',
          dataUrl: await blobToDataUrl(value)
        };
      }
      if (Array.isArray(value)) {
        const out = [];
        for (const item of value) out.push(await serializeBackupValue(item));
        return out;
      }
      if (value && typeof value === 'object') {
        const out = {};
        for (const [key, nested] of Object.entries(value)) out[key] = await serializeBackupValue(nested);
        return out;
      }
      return value;
    }

    async function deserializeBackupValue(value) {
      if (Array.isArray(value)) {
        const out = [];
        for (const item of value) out.push(await deserializeBackupValue(item));
        return out;
      }
      if (value && typeof value === 'object') {
        if (value.__type === 'Blob' && typeof value.dataUrl === 'string') {
          return dataUrlToBlob(value.dataUrl);
        }
        const out = {};
        for (const [key, nested] of Object.entries(value)) out[key] = await deserializeBackupValue(nested);
        return out;
      }
      return value;
    }

    function getBackupFileName() {
      const now = new Date();
      const parts = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, '0'),
        String(now.getDate()).padStart(2, '0')
      ];
      const time = [
        String(now.getHours()).padStart(2, '0'),
        String(now.getMinutes()).padStart(2, '0'),
        String(now.getSeconds()).padStart(2, '0')
      ].join('-');
      return `nihongo-reader-backup-${parts.join('-')}_${time}.json`;
    }

    function downloadBlobFile(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function summarizeBackupStores(stores) {
      const byStore = {};
      let totalRecords = 0;
      for (const storeName of BACKUP_STORE_NAMES) {
        const count = Array.isArray(stores?.[storeName]) ? stores[storeName].length : 0;
        byStore[storeName] = count;
        totalRecords += count;
      }
      return { totalRecords, byStore };
    }

    async function createAppBackupPayload() {
      const stores = {};
      for (const storeName of BACKUP_STORE_NAMES) {
        const rows = await dbGetAll(storeName);
        const serializedRows = [];
        for (const row of rows) serializedRows.push(await serializeBackupValue(row));
        stores[storeName] = serializedRows;
      }
      return {
        format: BACKUP_FORMAT,
        fileVersion: BACKUP_FILE_VERSION,
        appName: '日本語 Reader',
        appVersion: APP_VERSION,
        dbName: DB_NAME,
        dbVersion: DB_VERSION,
        exportedAt: new Date().toISOString(),
        stores,
        summary: summarizeBackupStores(stores)
      };
    }

    async function downloadAppBackup() {
      const payload = await createAppBackupPayload();
      const fileName = getBackupFileName();
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      downloadBlobFile(blob, fileName);
      return { fileName, summary: payload.summary, exportedAt: payload.exportedAt };
    }

    async function parseAppBackupFile(file) {
      const text = await file.text();
      let parsed = null;
      try {
        parsed = JSON.parse(text);
      } catch (error) {
        throw new Error('El fichero no contiene un JSON válido.');
      }
      if (!parsed || parsed.format !== BACKUP_FORMAT || !parsed.stores || typeof parsed.stores !== 'object') {
        throw new Error('El fichero no parece un backup válido de 日本語 Reader.');
      }
      return parsed;
    }

    async function replaceAllBackupStores(rawStores) {
      const decodedStores = {};
      for (const storeName of BACKUP_STORE_NAMES) {
        const rows = Array.isArray(rawStores?.[storeName]) ? rawStores[storeName] : [];
        const decodedRows = [];
        for (const row of rows) decodedRows.push(await deserializeBackupValue(row));
        decodedStores[storeName] = decodedRows;
      }

      const db = await openDatabase();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE_NAMES, 'readwrite');
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error('No se pudo guardar el backup en la base de datos.'));
        tx.onabort = () => reject(tx.error || new Error('La importación del backup fue cancelada.'));

        for (const storeName of BACKUP_STORE_NAMES) {
          const store = tx.objectStore(storeName);
          store.clear();
          for (const row of decodedStores[storeName]) {
            store.put(row);
          }
        }
      });
      return decodedStores;
    }

    async function importAppBackup(file) {
      const parsed = await parseAppBackupFile(file);
      const importedStores = await replaceAllBackupStores(parsed.stores);
      state.currentBook = null;
      state.currentBookId = null;
      state.sections = [];
      state.currentSpineIndex = 0;
      state.currentSentenceIndex = 0;

      state.flatSentenceEntriesCache = null;

      closeTokenPanel();
      await loadSettings();
      await ensureEmbeddedFallbackDictionary();
      await loadDictionaryIndexes();
      await refreshBooks();
      await loadVocabularyMap();
      await loadSentenceOverrides();
      resetSentenceEditorState();
      return {
        fileName: file.name,
        exportedAt: parsed.exportedAt || null,
        summary: parsed.summary || summarizeBackupStores(importedStores)
      };
    }

    function getSentenceTranslationViewModel(location, sourceText = '') {
      const translation = state.sentenceTranslation;
      const placeholderText = `${sourceText || ''}`.trim();
      const matches = Boolean(
        translation
        && translation.bookId
        && translation.bookId === state.currentBookId
        && Number(translation.sectionIndex) === Number(location?.sectionIndex)
        && Number(translation.sentenceIndex) === Number(location?.sentenceIndex)
      );
      if (matches) {
        if (translation.status === 'loading') {
          return { visible: true, kind: 'loading', label: '', text: 'Traduciendo…' };
        }
        if (translation.status === 'success') {
          return { visible: true, kind: 'success', label: '', text: translation.translatedText || '' };
        }
        if (translation.status === 'error') {
          return { visible: true, kind: 'error', label: '', text: translation.error || 'No se pudo traducir la oración.' };
        }
      }
      if (placeholderText) {
        return { visible: true, kind: 'placeholder', label: '', text: placeholderText };
      }
      return { visible: false, kind: 'empty', label: '', text: '' };
    }

    function getSentenceTranslationButtonMeta(view) {
      const kind = view?.kind || 'empty';
      if (kind === 'loading') {
        return {
          title: 'Traduciendo oración…',
          ariaLabel: 'Traduciendo oración',
          disabled: true
        };
      }
      if (kind === 'success') {
        return {
          title: 'Traducción revelada',
          ariaLabel: 'Traducción revelada',
          disabled: false
        };
      }
      if (kind === 'error') {
        return {
          title: 'Error al traducir. Toca para reintentar.',
          ariaLabel: 'Error al traducir. Toca para reintentar',
          disabled: false
        };

      return `<span class="sentence-translation-text">${escapeHtml(view.text || '')}</span>`;

    function applySentenceTranslationViewToElement(host, view) {
      if (!host) return;
      const kind = view?.kind || 'empty';
      const meta = getSentenceTranslationButtonMeta(view);
      host.classList.toggle('hidden', !view?.visible);
      host.classList.remove('is-placeholder', 'is-loading', 'is-success', 'is-error', 'is-empty');
      host.classList.add(`is-${kind}`);
      host.disabled = Boolean(meta.disabled);
      host.setAttribute('aria-label', meta.ariaLabel);
      host.setAttribute('title', meta.title);
      host.setAttribute('aria-busy', kind === 'loading' ? 'true' : 'false');
      host.innerHTML = buildSentenceTranslationMarkup(view);
    }

      const disabledAttr = meta.disabled || options.preview ? 'disabled' : '';
      return `
        <button${idAttr} class="sentence-translate-btn is-${view.kind}${options.preview ? ' is-preview' : ''}" type="button" aria-busy="${view.kind === 'loading' ? 'true' : 'false'}" aria-label="${escapeHtml(meta.ariaLabel)}" title="${escapeHtml(meta.title)}" ${disabledAttr}${inertAttrs}>

    async function translateSentenceWithAzure(textToTranslate) {
      const { key, region, endpoint } = getAzureTranslatorConfig();
      if (!key || !region) throw new Error('Configura tu clave y región en Traducciones antes de traducir.');
      const response = await fetch(`${endpoint}/translate?api-version=3.0&from=ja&to=es`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Ocp-Apim-Subscription-Key': key,
          'Ocp-Apim-Subscription-Region': region
        },
        body: JSON.stringify([{ Text: textToTranslate }])
      });
      let payload = null;
      const raw = await response.text();
      if (raw) {
        try { payload = JSON.parse(raw); } catch { payload = raw; }
      }
      if (!response.ok) {
        const message = typeof payload === 'string'
          ? payload
          : payload?.error?.message || payload?.message || `Error ${response.status} al traducir.`;
        throw new Error(message);
      }
      const translatedText = payload?.[0]?.translations?.[0]?.text || '';
      if (!translatedText) throw new Error('Azure no devolvió ninguna traducción.');
      return translatedText;
    }


    async function askGemini(promptText, options = {}) {
      const { apiKey, model } = getGeminiConfig();
      const normalizedModel = normalizeGeminiModel(model);
      if (!apiKey) throw new Error('Configura tu clave API en Gemini antes de usar esta función.');
      if (!normalizedModel) throw new Error('Configura un modelo válido en Gemini antes de usar esta función.');
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(normalizedModel)}:generateContent`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': apiKey
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                { text: promptText }
              ]
            }
          ]
        })
      });
      let payload = null;
      const raw = await response.text();
      if (raw) {
        try { payload = JSON.parse(raw); } catch { payload = raw; }
      }
      if (!response.ok) {
        const message = typeof payload === 'string'
          ? payload
          : payload?.error?.message || payload?.message || `Error ${response.status} al consultar Gemini.`;
        throw new Error(message);
      }
      const textParts = payload?.candidates?.[0]?.content?.parts
        ?.map((part) => typeof part?.text === 'string' ? part.text : '')
        .filter(Boolean)
        || [];
      const result = textParts.join('\n').trim();
      if (!result) throw new Error('Gemini no devolvió ningún texto.');
      if (options.returnPayload) return { text: result, payload };
      return result;
    }

    // =========================
    // Importación / EPUB minimal parser
    // =========================
    function readU16(view, offset) { return view.getUint16(offset, true); }
    function readU32(view, offset) { return view.getUint32(offset, true); }

    async function inflateDeflateRaw(bytes) {
      if (typeof DecompressionStream === 'undefined') {
        throw new Error('Tu navegador no soporta DecompressionStream (necesario para EPUB Deflate).');
      }
      const ds = new DecompressionStream('deflate-raw');
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    async function unzipEpub(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const view = new DataView(arrayBuffer);
      let eocdOffset = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 65557); i--) {
        if (readU32(view, i) === 0x06054b50) { eocdOffset = i; break; }
      }
      if (eocdOffset < 0) throw new Error('No se encontró EOCD de ZIP');

      const centralDirSize = readU32(view, eocdOffset + 12);
      const centralDirOffset = readU32(view, eocdOffset + 16);
      const entries = [];
      let ptr = centralDirOffset;
      const end = centralDirOffset + centralDirSize;

      while (ptr < end) {
        if (readU32(view, ptr) !== 0x02014b50) throw new Error('Cabecera central inválida');
        const compression = readU16(view, ptr + 10);
        const compressedSize = readU32(view, ptr + 20);
        const fileNameLen = readU16(view, ptr + 28);
        const extraLen = readU16(view, ptr + 30);
        const commentLen = readU16(view, ptr + 32);
        const localHeaderOffset = readU32(view, ptr + 42);
        const nameBytes = bytes.slice(ptr + 46, ptr + 46 + fileNameLen);
        const name = uint8ToText(nameBytes);
        entries.push({ name, compression, compressedSize, localHeaderOffset });
        ptr += 46 + fileNameLen + extraLen + commentLen;
      }

      const files = new Map();
      for (const entry of entries) {
        if (entry.name.endsWith('/')) continue;
        const lh = entry.localHeaderOffset;
        if (readU32(view, lh) !== 0x04034b50) continue;
        const nameLen = readU16(view, lh + 26);
        const extraLen = readU16(view, lh + 28);
        const dataStart = lh + 30 + nameLen + extraLen;
        const compBytes = bytes.slice(dataStart, dataStart + entry.compressedSize);
        let out;
        if (entry.compression === 0) out = compBytes;
        else if (entry.compression === 8) out = await inflateDeflateRaw(compBytes);
        else continue;
        files.set(normalizePath(entry.name), out);
      }
      return files;
    }

    function parseXml(xmlText) {
      return new DOMParser().parseFromString(xmlText, 'application/xml');
    }

    function parseXhtml(htmlText) {
      return new DOMParser().parseFromString(htmlText, 'text/html');
    }

    async function extractReadableSections(epubMap) {
      const containerBytes = epubMap.get('META-INF/container.xml');
      if (!containerBytes) throw new Error('EPUB inválido: falta META-INF/container.xml');
      const containerXml = parseXml(uint8ToText(containerBytes));
      const rootFile = containerXml.querySelector('rootfile')?.getAttribute('full-path');
      if (!rootFile) throw new Error('EPUB inválido: falta rootfile OPF');

      const opfPath = normalizePath(rootFile);
      const opfBytes = epubMap.get(opfPath);
      if (!opfBytes) throw new Error(`No se encontró OPF: ${opfPath}`);

      const opfXml = parseXml(uint8ToText(opfBytes));
      const title = opfXml.querySelector('metadata > title, metadata > dc\\:title')?.textContent?.trim() || 'Sin título';
      const author = opfXml.querySelector('metadata > creator, metadata > dc\\:creator')?.textContent?.trim() || 'Autor desconocido';

      const manifest = new Map();
      opfXml.querySelectorAll('manifest > item').forEach((item) => {
        manifest.set(item.getAttribute('id'), {
          href: item.getAttribute('href') || '',
          mediaType: item.getAttribute('media-type') || '',
          properties: item.getAttribute('properties') || ''
        });
      });

      const spineIds = [...opfXml.querySelectorAll('spine > itemref')].map((n) => n.getAttribute('idref')).filter(Boolean);
      const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

      let coverDataUrl = null;
      const coverMetaId = opfXml.querySelector('metadata > meta[name="cover"]')?.getAttribute('content');
      const coverManifestItem = coverMetaId ? manifest.get(coverMetaId) : [...manifest.values()].find((m) => (m.properties || '').includes('cover-image'));
      if (coverManifestItem?.href) {
        const coverPath = normalizePath(opfDir + coverManifestItem.href);
        const coverBytes = epubMap.get(coverPath);
        if (coverBytes) coverDataUrl = await bytesToDataUrl(coverBytes, coverManifestItem.mediaType || 'image/jpeg');
      }

      const sections = [];
      for (let i = 0; i < spineIds.length; i++) {
        const item = manifest.get(spineIds[i]);
        if (!item || !item.href) continue;
        const sectionPath = normalizePath(opfDir + item.href);
        const sectionBytes = epubMap.get(sectionPath);
        if (!sectionBytes) continue;
        const rawHtml = uint8ToText(sectionBytes);
        const doc = parseXhtml(rawHtml);
        const sectionTitle = doc.querySelector('title,h1,h2')?.textContent?.trim() || `Sección ${i + 1}`;
        sections.push({ index: i, path: sectionPath, title: sectionTitle, html: rawHtml });
      }

      return { title, author, coverDataUrl, sections };
    }

    async function importEpubFiles(fileList) {
      for (const file of fileList) {
        try {
          const buffer = await file.arrayBuffer();
          const epubMap = await unzipEpub(buffer);
          const meta = await extractReadableSections(epubMap);
          const now = new Date().toISOString();
          const book = {
            id: uuid(), fileName: file.name, title: meta.title, author: meta.author,
            cover: meta.coverDataUrl, sectionCount: meta.sections.length,
            createdAt: now, updatedAt: now, lastOpenedAt: null
          };
          await saveBook(book, file);
          await saveParsedBookCache(book.id, meta);
        } catch (err) {
          alert(`Error importando ${file.name}: ${err.message}`);
        }
      }
      await refreshBooks();
      renderLibraryView();
    }

    // =========================
    // Modo frase (heurística)
    // =========================
    function splitTextIntoSentences(text) {
      return splitTextIntoParagraphSentenceStructure(text).sentences;
    }

    function splitBlockIntoSentences(blockText) {
      const paragraph = String(blockText || '')
        .replace(/\n+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!paragraph) return [];
      const withBreaks = paragraph.replace(/([。！？!?])\s*/g, '$1\n');
      const parts = withBreaks
        .split('\n')
        .map((part) => part.trim())
        .filter(Boolean);
      return parts.length ? parts : [paragraph];
    }

    function splitTextIntoParagraphSentenceStructure(text) {
      const normalized = String(text || '')
        .replace(/\r\n?/g, '\n')
        .replace(/\u3000/g, ' ')
        .trim();
      if (!normalized) return { sentences: [], paragraphs: [] };

      const sentences = [];
      const paragraphs = [];
      const blocks = normalized
        .split(/\n{2,}/)
        .map((block) => block.replace(/[ \t]+/g, ' ').trim())
        .filter(Boolean);

      blocks.forEach((block) => {
        const paragraphEntry = { lines: [] };
        const lines = block
          .split(/\n+/)
          .map((line) => line.replace(/[ \t]+/g, ' ').trim())
          .filter(Boolean);
        if (!lines.length) return;
        lines.forEach((line) => {
          const lineSentences = splitBlockIntoSentences(line);
          const sentenceIndexes = lineSentences.map((sentence) => {
            const index = sentences.length;
            sentences.push(sentence);
            return index;
          });
          if (sentenceIndexes.length) {
            paragraphEntry.lines.push({ sentenceIndexes });
          }
        });
        if (paragraphEntry.lines.length) {
          paragraphs.push(paragraphEntry);
        }
      });

      if (!sentences.length) {
        const fallbackSentence = normalized.replace(/\s+/g, ' ').trim();
        if (!fallbackSentence) return { sentences: [], paragraphs: [] };
        return {
          sentences: [fallbackSentence],
          paragraphs: [{ lines: [{ sentenceIndexes: [0] }] }]
        };
      }
      return { sentences, paragraphs };
    }

    function stripRubyAnnotationsFromDocument(doc) {
      if (!doc?.querySelectorAll) return doc;
      doc.querySelectorAll('rt,rp').forEach((n) => n.remove());
      doc.querySelectorAll('ruby').forEach((ruby) => {
        const frag = doc.createDocumentFragment();
        while (ruby.firstChild) {
          frag.appendChild(ruby.firstChild);
        }
        ruby.replaceWith(frag);
      });
      return doc;
    }

    function extractVisibleTextFromSection(html) {
      const doc = parseXhtml(html);
      doc.querySelectorAll('script,style,noscript').forEach((n) => n.remove());
      stripRubyAnnotationsFromDocument(doc);
      return doc.body?.innerText || doc.documentElement?.textContent || '';
    }

    function getSentencesForSection(section) {
      if (state.sectionSentencesCache.has(section.path)) return state.sectionSentencesCache.get(section.path);
      const structure = getParagraphSentenceStructureForSection(section);
      const sentences = structure.sentences;
      state.sectionSentencesCache.set(section.path, sentences);
      return sentences;
    }

    function getParagraphSentenceStructureForSection(section) {
      if (state.sectionParagraphsCache.has(section.path)) return state.sectionParagraphsCache.get(section.path);
      const text = extractVisibleTextFromSection(section.html);
      const structure = splitTextIntoParagraphSentenceStructure(text);
      state.sectionParagraphsCache.set(section.path, structure);
      return structure;
    }

    // =========================
    // [NUEVO Fase 2] Text normalization utilities
    // =========================
    const WORD_SEGMENTER = typeof Intl !== 'undefined' && Intl.Segmenter
      ? new Intl.Segmenter('ja', { granularity: 'word' })
      : null;

    function normalizeTokenSurface(text) {
      return (text || '').normalize('NFKC').replace(/\s+/g, ' ').trim();
    }

    function isJapaneseChar(char) {
      return /[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}]/u.test(char || '');
    }

    function isJapaneseText(text) {
      return [...(text || '')].some(isJapaneseChar);
    }

    function classifyToken(surface) {
      if (!surface) return 'empty';
      if (/^\s+$/u.test(surface)) return 'space';
      if (/^[\p{P}\p{S}]+$/u.test(surface)) return 'punct';
      if (/^\d+([.,]\d+)?$/u.test(surface)) return 'number';
      if (/^[A-Za-z]+$/u.test(surface)) return 'latin';
      return 'word';
    }

    const TOKEN_ANALYSIS_VERSION = 'jp-token-v7';
    const MAX_JAPANESE_SPAN_TOKENS = 8;
    const PARTICLE_SURFACES = new Set(['の','は','が','を','に','へ','と','も']);
    const INFLECTION_CONTINUATION_SET = new Set([
      'っ','て','で','た','だ','った','ない','なかった','ます','ました','ません','たい','たくない',
      'んで','んだ','いて','いで','して','した','れる','られる','せる','させる','くない','かった','そう',
      'ている','でいる','てる','でる','ちゃう','じゃう','いた','いだ',
      'く','ず','ぬ','くれ','くれる','くれた','くれて',
      'てくれる','でくれる','てくれた','でくれた','てくれて','でくれて',
      'ておく','でおく','ておいた','でおいた'
    ]);

    function isKanaOnly(text) {
      return /^[ぁ-ゖァ-ヺー]+$/u.test(text || '');
    }

    function isSingleKanji(text) {
      return /^[\p{Script=Han}]$/u.test(text || '');
    }

    function containsKanji(text) {
      return /[\p{Script=Han}]/u.test(text || '');
    }

    function isSuspiciousStandaloneInflectionToken(surface) {
      const s = normalizeTokenSurface(surface || '');
      if (!s) return false;
      if (INFLECTION_CONTINUATION_SET.has(s)) return true;
      return /^(っ|て|で|た|だ|く|ず|ぬ|った|ない|なかった|くない|かった|くれ|くれる|くれた|くれて)$/u.test(s);
    }

    function isLikelyParticleSurface(surface) {
      return PARTICLE_SURFACES.has(normalizeTokenSurface(surface || ''));
    }

    function isJapaneseMergeableRawToken(rawToken) {
      if (!rawToken?.surface || !rawToken.surface.trim()) return false;
      const tokenType = classifyToken(rawToken.surface);
      if (tokenType === 'punct' || tokenType === 'space' || tokenType === 'empty') return false;
      return isJapaneseText(rawToken.surface);
    }

    // =========================
    // [NUEVO Fase 2] Japanese tokenization layer
    // =========================
    function tokenizeJapaneseText(text) {
      const source = text || '';
      if (!source) return [];
      if (WORD_SEGMENTER) {
        return [...WORD_SEGMENTER.segment(source)].map((seg) => ({
          surface: seg.segment,
          startOffset: seg.index,
          endOffset: seg.index + seg.segment.length,
          isWordLike: Boolean(seg.isWordLike)
        }));
      }
      // Fallback offline simple: separa espacios, puntuación y bloques de letras.
      const fallback = [];
      const pattern = /(\s+|[。、！？「」『』（）［］【】〈〉《》・…ー,.!?;:()[\]{}"'])/gu;
      let cursor = 0;
      for (const m of source.matchAll(pattern)) {
        const idx = m.index ?? 0;
        if (idx > cursor) {
          fallback.push({
            surface: source.slice(cursor, idx),
            startOffset: cursor,
            endOffset: idx,
            isWordLike: true
          });
        }
        fallback.push({
          surface: m[0],
          startOffset: idx,
          endOffset: idx + m[0].length,
          isWordLike: false
        });
        cursor = idx + m[0].length;
      }
      if (cursor < source.length) {
        fallback.push({
          surface: source.slice(cursor),
          startOffset: cursor,
          endOffset: source.length,
          isWordLike: true
        });
      }
      return fallback;
    }

    function collectJapaneseTokenRuns(rawTokens) {
      const runs = [];
      let cursor = 0;
      while (cursor < rawTokens.length) {
        if (!isJapaneseMergeableRawToken(rawTokens[cursor])) {
          cursor += 1;
          continue;
        }
        const start = cursor;
        while (cursor < rawTokens.length && isJapaneseMergeableRawToken(rawTokens[cursor])) {
          cursor += 1;
        }
        runs.push({ start, end: cursor, tokens: rawTokens.slice(start, cursor) });
      }
      return runs;
    }


    const RAW_CLAUSE_PREFIXES = ['から','なら','ので','のに','けど','けれど','また','そして','でも'];
    const RAW_CLAUSE_SUFFIXES = ['から','なら','ので','のに','けど','けれど'];
    const RAW_INTERNAL_BREAK_SUFFIXES = ['たら'];

    function shouldSplitLeadingParticle(surface, prevSurface) {
      const normalizedSurface = normalizeTokenSurface(surface || '');
      const chars = [...normalizedSurface];
      const first = chars[0] || '';
      const rest = chars.slice(1).join('');
      if (!first || !rest) return false;
      if (!PARTICLE_SURFACES.has(first)) return false;
      if (!prevSurface || !isJapaneseText(prevSurface)) return false;
      if (normalizedSurface === 'もう') return false;
      return /^[ぁ-ゖァ-ヺ\p{Script=Han}]/u.test(rest);
    }

    function splitSuspiciousJapaneseRawToken(rawToken, prevSurface = '') {
      const surface = normalizeTokenSurface(rawToken?.surface || '');
      if (!surface || [...surface].length <= 1 || !isJapaneseText(surface) || classifyToken(surface) !== 'word') {
        return rawToken ? [rawToken] : [];
      }

      const toRawTokens = (parts) => {
        const out = [];
        let offset = rawToken.startOffset ?? 0;
        for (const part of parts) {
          const len = [...part].length;
          out.push({
            surface: part,
            startOffset: offset,
            endOffset: offset + len,
            isWordLike: true
          });
          offset += len;
        }
        return out;
      };

      if (shouldSplitLeadingParticle(surface, prevSurface)) {
        const chars = [...surface];
        return toRawTokens([chars[0], chars.slice(1).join('')]);
      }

      for (const prefix of RAW_CLAUSE_PREFIXES) {
        if (!surface.startsWith(prefix) || surface.length <= prefix.length) continue;
        const tail = surface.slice(prefix.length);
        if (tail && (containsKanji(tail) || /^[ぁ-ゖ]/u.test(tail))) {
          return toRawTokens([prefix, tail]);
        }
      }

      for (const suffix of RAW_CLAUSE_SUFFIXES) {
        if (!surface.endsWith(suffix) || surface.length <= suffix.length) continue;
        const head = surface.slice(0, -suffix.length);
        if (head && (containsKanji(head) || /^[ぁ-ゖ]/u.test(head))) {
          return toRawTokens([head, suffix]);
        }
      }

      for (const boundary of RAW_INTERNAL_BREAK_SUFFIXES) {
        const idx = surface.indexOf(boundary);
        if (idx <= 0 || idx + boundary.length >= surface.length) continue;
        const head = surface.slice(0, idx + boundary.length);
        const tail = surface.slice(idx + boundary.length);
        if (tail && (containsKanji(tail) || /^[ぁ-ゖ]/u.test(tail))) {
          return toRawTokens([head, tail]);
        }
      }

      return [rawToken];
    }

    function refineJapaneseRawTokens(rawTokens) {
      const out = [];
      for (const rawToken of rawTokens || []) {
        const prevSurface = out.length ? out[out.length - 1].surface || '' : '';
        out.push(...splitSuspiciousJapaneseRawToken(rawToken, prevSurface));
      }
      return out;
    }

    function getDictionaryAnalysisIndexEntry(surfaceKey) {
      const index = state.dictionaryAnalysisIndex;
      if (!index || !surfaceKey) return null;
      return index.surfaceMap.get(surfaceKey) || null;
    }

    function resolveTokenAnalysisFromDictionary(surface, context = {}) {
      const normalizedSurface = normalizeTokenSurface(surface || '');
      if (!normalizedSurface) return null;
      const cache = context.analysisMemo || new Map();
      const memoKey = `dict::${normalizedSurface}`;
      if (cache.has(memoKey)) return cache.get(memoKey);
      const result = {
        baseForm: normalizedSurface,
        pos: 'word',
        reading: null,
        analysisSource: 'heuristic',
        analysisScore: 0
      };
      const surfaceKey = normalizeLookupKey(normalizedSurface);
      const exactSurface = getDictionaryAnalysisIndexEntry(surfaceKey);
      if (exactSurface?.lemma) {
        result.baseForm = exactSurface.lemma || normalizedSurface;
        result.pos = exactSurface.pos || result.pos;
        result.reading = exactSurface.readingKana || null;
        result.analysisSource = 'exact-dict';
        result.analysisScore = 120;
        cache.set(memoKey, result);
        return result;
      }

      const deinflections = applyDeinflectionRules(normalizedSurface);
      const lemmaMap = state.dictionaryAnalysisIndex?.lemmaMap || new Map();
      for (const d of deinflections) {
        const key = normalizeLookupKey(d.form);
        if (!key) continue;
