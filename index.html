              </label>
              <label title="Muestra los tokens visualmente en modo frase">
                <input id="segmentationToggle" type="checkbox" ${state.settings.showSegmentation ? 'checked' : ''} />
                Mostrar segmentación
              </label>
              <label title="Muestra metadatos básicos de token (depuración)">
                <input id="tokenDebugToggle" type="checkbox" ${state.settings.tokenDebug ? 'checked' : ''} />
                Debug tokens
              </label>
              <div>
                <span class="meta">Tema</span><br />
                <div id="readerThemeToggle" class="segmented-toggle" role="group" aria-label="Tema">
                  <button type="button" data-theme-option="light" class="${state.settings.theme === 'light' ? 'active' : ''}">Claro</button>
                  <button type="button" data-theme-option="dark" class="${state.settings.theme === 'dark' ? 'active' : ''}">Oscuro</button>
                </div>
              </div>
              <label>Fuente
                <input id="fontSize" type="range" min="14" max="30" step="1" value="${state.settings.fontSize}" />
              </label>
            </div>
          </div>
          <div class="reader-content-wrap">
            <div class="reader-content">${state.readingMode === 'page' ? renderPageMode(section, state.currentSpineIndex) : renderSentenceMode(section)}</div>
          </div>
        </div>
      `;

      $('#modeSelect').value = state.readingMode;
      $('#sectionSelect').value = String(state.currentSpineIndex);

      $('#readerExitBtn').addEventListener('click', async () => {
        closeTokenPanel();
        await persistCurrentProgress();
        await refreshBooks();
        renderLibraryView();
      });
      $('#openReaderMenuBtn').addEventListener('click', () => $('#readerMenu')?.classList.toggle('hidden'));
      $('#sectionProgress').addEventListener('input', async (e) => {
        state.currentSpineIndex = Number(e.target.value);
        state.currentSentenceIndex = 0;
        await persistCurrentProgress();
        renderReaderView();
      });
      $('#openVocabReaderBtn').addEventListener('click', async () => {
        await persistCurrentProgress();
        renderVocabularyView();
      });
      $('#prevBtn').addEventListener('click', prevStep);
      $('#nextBtn').addEventListener('click', nextStep);
      $('#toggleModeBtn').addEventListener('click', () => {
        const targetMode = state.readingMode === 'page' ? 'sentence' : 'page';
        setReadingMode(targetMode);
      });
      $('#modeSelect').addEventListener('change', (e) => setReadingMode(e.target.value));
      $('#sectionSelect').addEventListener('change', async (e) => {
        state.currentSpineIndex = Number(e.target.value);
        state.currentSentenceIndex = 0;
        await persistCurrentProgress();
        renderReaderView();
      });
      app.querySelectorAll('#readerThemeToggle [data-theme-option]').forEach((btn) => btn.addEventListener('click', async () => {
        await saveSettings({ theme: btn.dataset.themeOption });
        renderReaderView();
      }));
      $('#segmentationToggle').addEventListener('change', async (e) => {
        await saveSettings({ showSegmentation: e.target.checked });
        renderReaderView();
      });
      $('#tokenDebugToggle').addEventListener('change', async (e) => {
        await saveSettings({ tokenDebug: e.target.checked });
        renderReaderView();
      });
      $('#fontSize').addEventListener('input', async (e) => {
        await saveSettings({ fontSize: Number(e.target.value) });
        renderReaderView();
      });

      if (state.readingMode === 'page') {
        $('.reader-content')?.addEventListener('click', async (e) => {
          const tokenEl = e.target.closest('.token[data-interactive="1"]');
          if (!tokenEl) return;
          const token = getTokenFromElement(tokenEl);
          await openTokenPanel(token, { bookId: state.currentBookId });
          speakNativeTts(token?.surface || token?.baseForm || '', { lang: 'ja-JP' });
        });
      }

      if (state.readingMode === 'sentence') {
        $('#playSentenceBtn')?.addEventListener('click', () => {
          const currentSentence = getTokenizedSentence(state.currentBookId, state.currentSpineIndex, state.currentSentenceIndex)?.sentence
            || getSentencesForSection(state.sections[state.currentSpineIndex] || {})[state.currentSentenceIndex]
            || '';
          speakNativeTts(currentSentence, { lang: 'ja-JP' });
        });
        $('#translateSentenceBtn')?.addEventListener('click', () => {
          const currentSentence = getTokenizedSentence(state.currentBookId, state.currentSpineIndex, state.currentSentenceIndex)?.sentence
            || getSentencesForSection(state.sections[state.currentSpineIndex] || {})[state.currentSentenceIndex]
            || '';
          if (!currentSentence.trim()) return;
          const prompt = `Traduce: “${currentSentence}”`;
          const url = 'https://chatgpt.com/?q=' + encodeURIComponent(prompt);
          window.open(url, '_blank', 'noopener,noreferrer');
        });
        $('.sentence-box')?.addEventListener('click', async (e) => {
          const tokenEl = e.target.closest('.token[data-interactive="1"]');
          if (!tokenEl) return;
          const token = getTokenFromElement(tokenEl);
          await openTokenPanel(token, { bookId: state.currentBookId });
          speakNativeTts(token?.surface || token?.baseForm || '', { lang: 'ja-JP' });
        });
      }
    }

    // =========================
    // Preferencias + SW
    // =========================
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
    }

    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        await navigator.serviceWorker.register('./sw.js');
      } catch (e) {
        console.warn('No se pudo registrar SW', e);
      }
    }

    // =========================
    // Inicialización
    // =========================
    (async function init() {
      await loadSettings();
      await ensureEmbeddedFallbackDictionary();
      await loadDictionaryIndexes();
      await refreshBooks();
      await loadVocabularyMap();
      await registerServiceWorker();
      renderLibraryView();
      if (state.settings.lastOpenedBookId && state.books.some((b) => b.id === state.settings.lastOpenedBookId)) {
        // Punto de extensión futuro: restaurar auto-apertura configurable.
      }
    })();

    // Nota Fase 4 (corregida):
    // Diccionario offline con packs locales importables en IndexedDB + fallback embebido.
    // Lookup por lemma/surface/reading + deinflection básica extensible + cache técnico de resultados.
  </script>
</body>
</html>
