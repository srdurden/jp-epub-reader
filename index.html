      const candidateSurfaces = buildLookupCandidatesFromContext(token, context);
      const deinflectionMap = new Map();
      for (const candidate of candidateSurfaces) {
        for (const d of applyDeinflectionRules(candidate)) {
          const key = normalizeLookupKey(d.form);
          if (!key || deinflectionMap.has(key)) continue;
          deinflectionMap.set(key, d);
        }
      }
      const deinflections = [...deinflectionMap.values()];
      return {
        surface: candidateSurfaces[candidateSurfaces.length - 1] || token?.surface || '',
        lemma: token?.baseForm || '',
        reading,
        candidateSurfaces,
        deinflections
      };
    }

    async function readDictionaryCache(lookupKey) {
      if (!lookupKey) return null;
      return dbGet(STORES.dictionaryCache, lookupKey);
    }

    async function writeDictionaryCache(lookupKey, result) {
      if (!lookupKey || !result) return;
      await dbPut(STORES.dictionaryCache, { lookupKey, result, updatedAt: new Date().toISOString() });
    }

    async function lookupDictionaryEntry(request, token, context = {}) {
      const lookupKey = [
        'v2',
        normalizeLookupKey(request.lemma),
        normalizeLookupKey(request.surface),
        normalizeLookupKey(request.reading),
        ...(request.candidateSurfaces || []).map((s) => normalizeLookupKey(s)),
        ...request.deinflections.map((d) => normalizeLookupKey(d.form))
      ].filter(Boolean).join('|');

      const cached = await readDictionaryCache(lookupKey);
      if (cached?.result) return cached.result;

      const buckets = [];
      if (request.lemma) buckets.push(...await lookupByLemma(request.lemma, request.reading));
      for (const candidateSurface of request.candidateSurfaces || []) {
        buckets.push(...await lookupBySurface(candidateSurface));
      }
      if (request.reading) buckets.push(...await lookupByReading(request.reading));
      for (const deinflected of request.deinflections.slice(1, 16)) {
        buckets.push(...await lookupByLemma(deinflected.form, request.reading));
        buckets.push(...await lookupBySurface(deinflected.form));
      }

      const dedup = new Map();
      for (const e of buckets) dedup.set(e.id, e);
      const ranked = rankDictionaryCandidates([...dedup.values()], token, request);
      const best = chooseBestDictionaryEntry(ranked);
      const alternatives = ranked.slice(1, 4).map((x) => x.entry);

      const result = best ? {
        found: true,
        lookupKey,
        source: best.source || 'local-pack',
        queriedSurface: request.surface || request.candidateSurfaces?.[0] || null,
        lemma: best.lemma || request.lemma || null,
        readingKana: best.readingKana || convertReadingToHiragana(request.reading || token?.reading || null),
        readingRomaji: best.readingRomaji || convertReadingToRomaji(best.readingKana || request.reading || token?.reading || null),
        pos: best.pos || token?.pos || null,
        meanings: best.meanings || [],
        bestGloss: best.bestGloss || (best.meanings || [])[0] || null,
        alternatives
      } : {
        found: false,
        lookupKey,
        queriedSurface: request.surface || request.candidateSurfaces?.[0] || null,
        lemma: request.lemma || null,
        readingKana: convertReadingToHiragana(request.reading || token?.reading),
        readingRomaji: convertReadingToRomaji(request.reading || token?.reading),
        pos: token?.pos || null,
        meanings: [],
        bestGloss: null,
        alternatives: []
      };
      await writeDictionaryCache(lookupKey, result);
      return result;
    }

    function enrichVocabEntryWithDictionaryData(vocabEntry, dictionaryEntry, token) {
      const now = new Date().toISOString();
      return {
        ...vocabEntry,
        surface: token?.surface || vocabEntry.surface || dictionaryEntry?.queriedSurface || vocabEntry.normalizedKey,
        lemma: dictionaryEntry?.lemma || vocabEntry.lemma || token?.baseForm || null,
        readingKana: dictionaryEntry?.readingKana || vocabEntry.readingKana || null,
        readingRomaji: dictionaryEntry?.readingRomaji || vocabEntry.readingRomaji || null,
        pos: dictionaryEntry?.pos || vocabEntry.pos || token?.pos || null,
        defaultDefinition: dictionaryEntry?.bestGloss || vocabEntry.defaultDefinition || null,
        meanings: dictionaryEntry?.meanings?.length ? dictionaryEntry.meanings : (vocabEntry.meanings || []),
        dictionarySource: dictionaryEntry?.source || vocabEntry.dictionarySource || null,
        enrichedAt: dictionaryEntry?.found ? now : (vocabEntry.enrichedAt || null),
        updatedAt: now
      };
    }

    async function updateUserDefinition(vocabKey, text) {
      const existing = await loadVocabEntryByKey(vocabKey);
      if (!existing) return null;
      const next = { ...existing, userDefinition: (text || '').trim() || null, updatedAt: new Date().toISOString() };
      await dbPut(STORES.vocabEntries, next);
      state.vocabMap.set(next.vocabKey, next);
      touchVocabularyData();
      return next;
    }

      if (!meanings?.length) return '<p class="status">Sin acepciones secundarias.</p>';
      return `<ul class="meanings-list">${meanings.slice(1, 5).map((meaning) => `<li>${escapeHtml(meaning)}</li>`).join('') || '<li>—</li>'}</ul>`;

    // =========================
    // Lógica del lector
    // =========================
    async function openReader(bookId) {
      const book = state.books.find((b) => b.id === bookId);
      if (!book) return;

      const progressPromise = loadReadingProgress(bookId);
      const parsedPromise = getParsedBookData(bookId);
      const [progress, parsed] = await Promise.all([progressPromise, parsedPromise]);
      if (!parsed?.sections?.length) return alert('No se encontraron secciones legibles en este EPUB.');

      state.currentBook = { ...book, parsedTitle: parsed.title, parsedAuthor: parsed.author };
      state.currentBookId = bookId;
      state.sections = parsed.sections;
      state.currentSpineIndex = Math.min(progress?.currentSectionIndex || 0, parsed.sections.length - 1);
      state.readingMode = progress?.readingMode || 'page';
      state.currentSentenceIndex = progress?.currentSentenceIndex || 0;
      state.sectionSentencesCache.clear();
      state.sectionParagraphsCache.clear();
      state.sentenceTokenCache.clear();
      state.pageMapsCache.clear();
      state.pageSummariesCache.clear();
      state.flatSentenceEntriesCache = null;
      state.flatSentenceIndexLookupCache = null;
      resetSentenceTranslation();
      resetSentenceEditorState();

      state.route = 'reader';
      renderReaderView({ alignToCurrentSentence: true });

      const openedAt = new Date().toISOString();
      state.books = state.books.map((candidate) => candidate.id === bookId ? { ...candidate, lastOpenedAt: openedAt, updatedAt: openedAt } : candidate);
      dbPut(STORES.books, { ...book, lastOpenedAt: openedAt, updatedAt: openedAt }).catch(console.warn);
      saveSettings({ lastOpenedBookId: bookId }).catch(console.warn);
    }

    async function persistCurrentProgress() {
      if (!state.currentBookId) return;
      const pageInfo = getCurrentVirtualPageInfo();
      const percent = (pageInfo.globalPageCurrent / Math.max(pageInfo.globalPageTotal, 1)) * 100;
      await saveReadingProgress(state.currentBookId, {
        readingMode: state.readingMode,
        currentLocation: state.sections[state.currentSpineIndex]?.path || null,
        currentSectionIndex: state.currentSpineIndex,
        currentSentenceIndex: state.currentSentenceIndex,
        currentGlobalPageIndex: Math.max(pageInfo.globalPageCurrent - 1, 0),
        totalPages: pageInfo.globalPageTotal,
        currentSectionPageIndex: Math.max(pageInfo.sectionPageCurrent - 1, 0),
        sectionPageTotal: pageInfo.sectionPageTotal,
        percent: Number(percent.toFixed(2))
      });
    }

    async function setReadingMode(mode) {
      state.readingMode = mode;
      const sectionSentences = getSentencesForSection(state.sections[state.currentSpineIndex] || {});
      const sentenceCap = Math.max(sectionSentences.length - 1, 0);
      state.currentSentenceIndex = Math.max(0, Math.min(state.currentSentenceIndex, sentenceCap));
      closeTokenPanel();
      await persistCurrentProgress();
      renderReaderView({ alignToCurrentSentence: true });
    }

    async function nextStep() {
      closeTokenPanel();
      if (state.readingMode === 'page') {
        const pageInfo = getCurrentVirtualPageInfo();
        if (pageInfo.globalPageCurrent < pageInfo.globalPageTotal) {
          goToGlobalPage(pageInfo.globalPageIndex + 1, pageInfo.context);
        }
      } else {
        const sents = getSentencesForSection(state.sections[state.currentSpineIndex]);
        if (state.currentSentenceIndex < sents.length - 1) state.currentSentenceIndex++;
        else if (state.currentSpineIndex < state.sections.length - 1) {
          state.currentSpineIndex++;
          state.currentSentenceIndex = 0;
        }
      }
      await persistCurrentProgress();
      renderReaderView({ alignToCurrentSentence: true });
    }

    async function prevStep() {
      closeTokenPanel();
      if (state.readingMode === 'page') {
        const pageInfo = getCurrentVirtualPageInfo();
        if (pageInfo.globalPageCurrent > 1) {
          goToGlobalPage(pageInfo.globalPageIndex - 1, pageInfo.context);
        }
      } else {
        if (state.currentSentenceIndex > 0) state.currentSentenceIndex--;
        else if (state.currentSpineIndex > 0) {
          state.currentSpineIndex--;
          const sents = getSentencesForSection(state.sections[state.currentSpineIndex]);
          state.currentSentenceIndex = Math.max(0, sents.length - 1);
        }
      }
      await persistCurrentProgress();
      renderReaderView({ alignToCurrentSentence: true });
    }

    // =========================
    // [NUEVO Fase 3] Vocabulary list view
    // =========================
    function filterVocabularyEntries(entries, query, levelFilter) {
      const q = (query || '').trim().toLowerCase();
      return entries.filter((entry) => {
        const effectiveLevel = getEffectiveFamiliarityLevel(entry.familiarityLevel);
        const levelOk = levelFilter === 'all'
          ? true
          : String(effectiveLevel ?? 'none') === String(levelFilter);
        if (!levelOk) return false;
        if (!q) return true;
        const haystack = [entry.surface, entry.lemma, entry.reading, entry.readingKana, entry.readingRomaji, entry.defaultDefinition, entry.userDefinition, entry.normalizedKey].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }

    function getVocabularyCacheKey() {
      const query = (state.vocabFilters.query || '').trim().toLowerCase();
      const level = String(state.vocabFilters.level || 'all');
      return `${state.vocabDataVersion}|${query}|${level}`;
    }

    function getFilteredVocabularyEntries() {
      const cacheKey = getVocabularyCacheKey();
      if (state.vocabView.cacheKey === cacheKey) {
        return {
          allEntriesCount: state.vocabView.allEntriesCount,
          entries: state.vocabView.filteredEntries
        };
      }
      const allEntries = [...state.vocabMap.values()].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      const entries = filterVocabularyEntries(allEntries, state.vocabFilters.query, state.vocabFilters.level);
      state.vocabView.cacheKey = cacheKey;
      state.vocabView.allEntriesCount = allEntries.length;
      state.vocabView.filteredEntries = entries;
      return { allEntriesCount: allEntries.length, entries };
    }

    function snapshotVocabularyDraftNotes() {}

    function renderVocabularyEntriesChunk(entries) {
      return entries.map((entry) => {
        const effectiveLevel = getEffectiveFamiliarityLevel(entry.familiarityLevel);
        const draftNote = state.vocabView.pendingNotes.has(entry.vocabKey)
          ? state.vocabView.pendingNotes.get(entry.vocabKey)
          : (entry.userDefinition || '');
        const customDefinitionText = draftNote && draftNote.trim() ? draftNote.trim() : '-';
        return `
          <article class="vocab-item" style="border-radius:24px;box-shadow:var(--shadow-soft);">
            <button type="button" class="vocab-remove-btn danger" data-remove-vocab-entry data-vocab-key="${escapeHtml(entry.vocabKey)}" title="Quitar del vocabulario">✕</button>
            <div class="vocab-main">
              <strong style="font-size:1.2rem;">${escapeHtml(entry.surface || entry.lemma || entry.vocabKey)}</strong>
              ${entry.readingKana ? `<span class="badge">${escapeHtml(entry.readingKana)}</span>` : ''}
              <span class="badge level">Nivel ${escapeHtml(String(effectiveLevel ?? '—'))}</span>
            </div>
            <p class="vocab-translation"><strong>Diccionario:</strong> ${escapeHtml(entry.defaultDefinition || '-')}</p>
            <div class="vocab-custom-definition">
              <span class="vocab-custom-definition-actions">
                <button type="button" class="icon-btn" data-edit-vocab-definition data-vocab-key="${escapeHtml(entry.vocabKey)}" title="Editar definición personalizada">✏️</button>
                <button type="button" class="icon-btn" data-clear-vocab-definition data-vocab-key="${escapeHtml(entry.vocabKey)}" title="Borrar definición personalizada">🗑️</button>
              </span>
              <span class="vocab-custom-definition-text">${escapeHtml(customDefinitionText)}</span>
            </div>
            <div class="level-picker">
              ${[1,2,3].map((lvl) => `
                <button type="button" class="level-btn ${effectiveLevel === lvl ? 'active' : ''}" data-vocab-level="${lvl}" data-vocab-key="${escapeHtml(entry.vocabKey)}">${lvl}</button>
              `).join('')}
            </div>
          </article>
        `;
      }).join('');
    }

    function updateVocabularyCounters() {
      const { allEntriesCount, entries } = getFilteredVocabularyEntries();
      const statusEl = $('#vocabStatus');
      if (statusEl) {
        statusEl.textContent = `${allEntriesCount} guardadas · ${entries.length} filtradas · ${state.vocabView.renderedCount} renderizadas.`;
      }
    }

    function updateVocabularyLoadState() {
      const loadState = $('#vocabLoadState');
      if (!loadState) return;
      const pending = state.vocabView.filteredEntries.length - state.vocabView.renderedCount;
      if (state.vocabView.isLoadingMore && pending > 0) {
        loadState.textContent = 'Cargando más entradas…';
        loadState.style.display = 'block';
      } else if (pending > 0) {
        loadState.textContent = `Desliza para cargar más (${pending} pendientes).`;
        loadState.style.display = 'block';
      } else {
        loadState.textContent = '';
        loadState.style.display = 'none';
      }
    }

    function appendVocabularyChunk() {
      const list = $('#vocabList');
      if (!list) return;
      const entries = state.vocabView.filteredEntries;
      if (!entries.length) {
        list.innerHTML = `<div class="library-card"><p class="empty">No hay palabras guardadas todavía.</p></div>`;
        state.vocabView.renderedCount = 0;
        updateVocabularyCounters();
        updateVocabularyLoadState();
        return;
      }
      if (state.vocabView.renderedCount >= entries.length) {
        updateVocabularyLoadState();
        return;
      }
      state.vocabView.isLoadingMore = true;
      updateVocabularyLoadState();
      const nextCount = Math.min(entries.length, state.vocabView.renderedCount + state.vocabView.batchSize);
      const chunk = entries.slice(state.vocabView.renderedCount, nextCount);
      list.insertAdjacentHTML('beforeend', renderVocabularyEntriesChunk(chunk));
      state.vocabView.renderedCount = nextCount;
      state.vocabView.isLoadingMore = false;
      updateVocabularyCounters();
      updateVocabularyLoadState();
    }

    function resetVocabularyListRender() {
      snapshotVocabularyDraftNotes();
      const list = $('#vocabList');
      if (!list) return;
      list.innerHTML = '';
      state.vocabView.renderedCount = 0;
      appendVocabularyChunk();
    }

    function setupVocabularyLoadMoreObserver() {
      const sentinel = $('#vocabLoadMoreSentinel');
      if (!sentinel) return;
      state.vocabView.loadMoreObserver?.disconnect();
      state.vocabView.loadMoreObserver = new IntersectionObserver((entries) => {
        if (!entries.some((entry) => entry.isIntersecting)) return;
        appendVocabularyChunk();
      }, { root: null, rootMargin: '300px 0px', threshold: 0.01 });
      state.vocabView.loadMoreObserver.observe(sentinel);
    }

    function scheduleVocabularyListRefresh(delay = 180) {
      window.clearTimeout(state.vocabView.debounceTimer);
      state.vocabView.debounceTimer = window.setTimeout(() => {
        getFilteredVocabularyEntries();
        resetVocabularyListRender();
      }, delay);
    }

    function attachVocabularyEventDelegation(app) {
      const list = app.querySelector('#vocabList');
      if (!list || list.dataset.bound === '1') return;
      list.dataset.bound = '1';
      list.addEventListener('click', async (e) => {
        const levelBtn = e.target.closest('[data-vocab-level][data-vocab-key]');
        if (levelBtn) {
          const level = levelBtn.dataset.vocabLevel ? Number(levelBtn.dataset.vocabLevel) : null;
          await updateVocabularyEntryLevel(levelBtn.dataset.vocabKey, level);
          return;
        }
        const removeBtn = e.target.closest('[data-remove-vocab-entry][data-vocab-key]');
        if (removeBtn) {
          await removeVocabularyEntry(removeBtn.dataset.vocabKey);
          return;
        }
        const editBtn = e.target.closest('[data-edit-vocab-definition][data-vocab-key]');
        if (editBtn) {
          const key = editBtn.dataset.vocabKey;
          const existing = await loadVocabEntryByKey(key);
          const nextText = window.prompt('Nota personal', existing?.userDefinition || '');
          if (nextText == null) return;
          await updateUserDefinition(key, nextText);
          state.vocabView.pendingNotes.set(key, nextText);
          getFilteredVocabularyEntries();
          resetVocabularyListRender();
          return;
        }
        const clearBtn = e.target.closest('[data-clear-vocab-definition][data-vocab-key]');
        if (!clearBtn) return;
        const key = clearBtn.dataset.vocabKey;
        await updateUserDefinition(key, '');
        state.vocabView.pendingNotes.delete(key);
        getFilteredVocabularyEntries();
        resetVocabularyListRender();
      });
    }

    async function updateVocabularyEntryLevel(vocabKey, level) {
      await setTokenFamiliarity(vocabKey, level);
      getFilteredVocabularyEntries();
      resetVocabularyListRender();
    }

    async function removeVocabularyEntry(vocabKey) {
      const existing = await loadVocabEntryByKey(vocabKey);
      if (!existing) return;
      await dbDelete(STORES.vocabEntries, existing.id);
      state.vocabMap.delete(existing.vocabKey);
      state.vocabView.pendingNotes.delete(existing.vocabKey);
      bumpVocabVersion();
      applyFamiliarityStyles(existing.vocabKey, null);
      getFilteredVocabularyEntries();
      resetVocabularyListRender();
    }

        await registration?.update();
      }

    function getNormalizedReaderLocation(location = {}) {
      const safeSectionIndex = Math.max(0, Math.min(Number(location.sectionIndex) || 0, Math.max(state.sections.length - 1, 0)));
      const section = state.sections[safeSectionIndex] || {};
      const sentences = getSentencesForSection(section);
      const safeSentenceIndex = Math.max(0, Math.min(Number(location.sentenceIndex) || 0, Math.max(sentences.length - 1, 0)));
      return {
        sectionIndex: safeSectionIndex,
        sentenceIndex: safeSentenceIndex
      };
    }

    function getAdjacentReaderLocation(step, fromLocation = { sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex }, context = getReaderPaginationContext()) {
      const direction = Number(step) || 0;
      const base = getNormalizedReaderLocation(fromLocation);
      if (!direction) return base;

      if (state.readingMode === 'page') {
        const pageInfo = getVirtualPageInfoForLocation(base.sectionIndex, base.sentenceIndex, context);
        const targetPageIndex = pageInfo.globalPageIndex + direction;
        if (targetPageIndex < 0 || targetPageIndex >= pageInfo.globalPageTotal) return null;
        const located = locateGlobalPage(targetPageIndex, context);
        return getNormalizedReaderLocation({
          sectionIndex: located.sectionIndex,
          sentenceIndex: located.page.startSentence || 0
        });
      }

      let sectionIndex = base.sectionIndex;
      let sentenceIndex = base.sentenceIndex;
      let remaining = direction;
      while (remaining !== 0) {
        if (remaining > 0) {
          const sentences = getSentencesForSection(state.sections[sectionIndex] || {});
          if (sentenceIndex < Math.max(sentences.length - 1, 0)) {
            sentenceIndex += 1;
          } else if (sectionIndex < state.sections.length - 1) {
            sectionIndex += 1;
            sentenceIndex = 0;
          } else {
            return null;
          }
          remaining -= 1;
        } else {
          if (sentenceIndex > 0) {
            sentenceIndex -= 1;
          } else if (sectionIndex > 0) {
            sectionIndex -= 1;
            const previousSectionSentences = getSentencesForSection(state.sections[sectionIndex] || {});
            sentenceIndex = Math.max(previousSectionSentences.length - 1, 0);
          } else {
            return null;
          }
          remaining += 1;
        }
      }

      return getNormalizedReaderLocation({ sectionIndex, sentenceIndex });
    }

    function renderEmptyReaderPanel(label = 'Sin más contenido') {
      return `<div class="reader-preview-empty">${escapeHtml(label)}</div>`;
    }

    function getCurrentSentenceText() {
      return getTokenizedSentence(state.currentBookId, state.currentSpineIndex, state.currentSentenceIndex)?.sentence
        || getSentencesForSection(state.sections[state.currentSpineIndex] || {})[state.currentSentenceIndex]
        || '';
    }

    function renderPageModeForLocation(location, paginationContext = getReaderPaginationContext(), options = {}) {
      const safeLocation = getNormalizedReaderLocation(location);
      const wrapperClass = options.preview ? 'reader-preview-content' : 'reader-content';
      const highlightSentenceIndex = options.preview ? null : safeLocation.sentenceIndex;
      return `
        <div class="${wrapperClass}" style="font-size:${state.settings.fontSize}px;--reader-font-size:${state.settings.fontSize}px;">
          ${renderTokenizedVirtualPage(state.currentBookId, safeLocation.sectionIndex, safeLocation.sentenceIndex, paginationContext, { activeSentenceIndex: highlightSentenceIndex })}
        </div>
      `;
    }

    function renderSentenceModeForLocation(location, options = {}) {
      const safeLocation = getNormalizedReaderLocation(location);
      const section = state.sections[safeLocation.sectionIndex] || {};
      const sentences = getSentencesForSection(section);
      const idx = Math.max(0, Math.min(safeLocation.sentenceIndex, Math.max(0, sentences.length - 1)));
      const tokenized = shouldTokenizeCurrentView()
        ? getTokenizedSentence(state.currentBookId, safeLocation.sectionIndex, idx)
        : { sentence: sentences[idx] || '', tokens: [] };
      const sentence = tokenized.sentence || 'Sin texto legible en esta sección.';
      const sentenceHtml = tokenized.tokens.length
        ? renderSegmentedSentence(tokenized, { segmented: state.settings.showSegmentation, inline: true })
        : escapeHtml(sentence);
      const wrapperClass = options.preview ? 'reader-preview-content' : 'reader-content';
      const playButtonAttrs = options.preview
        ? 'class="play-main" title="Reproducir oración" aria-hidden="true" tabindex="-1"'
        : 'id="playSentenceBtn" class="play-main" title="Reproducir oración"';
      const sentenceChatgptAttrs = options.preview
        ? 'class="sentence-helper-link" type="button" aria-hidden="true" tabindex="-1"'
        : 'id="sentenceChatgptBtn" class="sentence-helper-link" type="button"';
      const sentenceGoogleTranslateAttrs = options.preview
        ? 'class="sentence-helper-link" type="button" aria-hidden="true" tabindex="-1"'
        : 'id="sentenceGoogleTranslateBtn" class="sentence-helper-link" type="button"';
      const translationHtml = renderSentenceTranslationResult({ sectionIndex: safeLocation.sectionIndex, sentenceIndex: idx }, sentence, options);
      const copySentenceAttrs = options.preview
        ? 'class="copy-glyph-btn" title="Copiar frase" aria-hidden="true" tabindex="-1"'
        : 'id="copySentenceBtn" class="copy-glyph-btn" title="Copiar frase" aria-label="Copiar frase"';
      const manualOverrideRecord = getSentenceOverrideRecord(state.currentBookId, safeLocation.sectionIndex, idx, sentence);
      const editorOpen = !options.preview && isSentenceEditorOpen({ sectionIndex: safeLocation.sectionIndex, sentenceIndex: idx });
      const editButtonHtml = options.preview
        ? `<button class="sentence-edit-link ${manualOverrideRecord ? 'has-manual-override' : ''}" type="button" aria-hidden="true" tabindex="-1">[EDIT]</button>`
        : `<button id="openSentenceEditorBtn" class="sentence-edit-link ${manualOverrideRecord ? 'has-manual-override' : ''}" type="button" aria-label="Editar divisiones de la frase">[EDIT]</button>`;
      const editorPanelHtml = options.preview || !editorOpen ? '' : `
          <div class="sentence-edit-panel">
            <div class="sentence-edit-input-wrap">
              <textarea id="sentenceEditInput" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off">${escapeHtml(state.sentenceEditor.draft || '')}</textarea>
            </div>
            <p class="sentence-edit-preview-label" aria-hidden="true">Espacios marcados</p>
            <div id="sentenceEditPreview" class="sentence-edit-visual-preview" aria-hidden="true">${renderSentenceEditMirrorHtml(state.sentenceEditor.draft || '')}</div>
            ${state.sentenceEditor.error ? `<p class="sentence-edit-error">${escapeHtml(state.sentenceEditor.error)}</p>` : ''}
            <div class="sentence-edit-actions">
              <button id="saveSentenceEditBtn" class="primary" type="button">Guardar</button>
              <button id="resetSentenceEditBtn" type="button">Auto</button>
              ${manualOverrideRecord ? '<button id="clearSentenceEditBtn" type="button">Quitar override</button>' : ''}
              <button id="cancelSentenceEditBtn" type="button">Cancelar</button>
            </div>
          </div>
      `;
      return `
        <div class="${wrapperClass} reader-sentence-layout" style="font-size:${state.settings.fontSize}px;--reader-font-size:${state.settings.fontSize}px;">
          <div class="sentence-hero${options.preview ? ' sentence-hero-preview' : ''}"${options.preview ? ' aria-hidden="true"' : ''}>
            <button ${playButtonAttrs}>▶</button>
          </div>
          <div class="sentence-box">
            <span class="sentence-copy-wrap">
              <button ${copySentenceAttrs}>⧉</button>
              <span class="sentence-copy-content">
                <span class="sentence-copy-line"><span class="sentence-copy-text">${sentenceHtml}</span>${editButtonHtml}</span>
                ${editorPanelHtml}
              </span>
            </span>
          </div>
          ${!options.preview && state.settings.tokenDebug ? `<p class="status">Tokenización: ${tokenized.tokens.length} tokens analizados. ${tokenized.tokenizationMode === 'manual' ? 'Override manual activo.' : ''} ${state.settings.showSegmentation ? 'Segmentación visible.' : 'Segmentación oculta.'}</p>` : ''}
          <div class="sentence-actions-stack">
            ${translationHtml}
            <div class="sentence-helper-links">
              <button ${sentenceChatgptAttrs}>[ChatGPT]</button>
              <button ${sentenceGoogleTranslateAttrs}>[Google Translate]</button>
            </div>
          </div>
          <div class="reader-sentence-footer-spacer" aria-hidden="true"></div>
        </div>
      `;
    }

    function renderReaderPanelForLocation(location, options = {}) {
      if (!location) return renderEmptyReaderPanel(options.emptyLabel || 'Sin más contenido');
      return state.readingMode === 'page'
        ? renderPageModeForLocation(location, options.paginationContext, options)
        : renderSentenceModeForLocation(location, options);
    }

    function renderReaderCarousel(paginationContext = getReaderPaginationContext()) {
      const currentLocation = getNormalizedReaderLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex });
      const previousLocation = getAdjacentReaderLocation(-1, currentLocation, paginationContext);
      const nextLocation = getAdjacentReaderLocation(1, currentLocation, paginationContext);
      return `
        <div class="reader-carousel" id="readerCarousel" data-has-prev="${previousLocation ? '1' : '0'}" data-has-next="${nextLocation ? '1' : '0'}">
          <div class="reader-carousel-track" id="readerCarouselTrack" style="--reader-drag-offset:0px;">
            <section class="reader-carousel-panel" data-panel-role="prev">${renderReaderPanelForLocation(previousLocation, { preview: true, emptyLabel: 'Inicio del libro', paginationContext })}</section>
            <section class="reader-carousel-panel" id="currentReaderPanel" data-panel-role="current">${renderReaderPanelForLocation(currentLocation, { preview: false, paginationContext })}</section>
            <section class="reader-carousel-panel" data-panel-role="next">${renderReaderPanelForLocation(nextLocation, { preview: true, emptyLabel: 'Fin del libro', paginationContext })}</section>
          </div>
        </div>
      `;
    }

    function renderPageMode(section, sectionIndex, paginationContext = getReaderPaginationContext()) {
      return renderPageModeForLocation({ sectionIndex, sentenceIndex: state.currentSentenceIndex }, paginationContext, { preview: false });
    }

    function renderSentenceMode(section) {
      return renderSentenceModeForLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex }, { preview: false });
    }

    function speakNativeTts(text, options = {}) {
      const content = String(text || '').trim();
      if (!content || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(content);
      const preferredLang = options.lang || 'ja-JP';
      utterance.lang = preferredLang;
      utterance.rate = Number(options.rate) || 1;
      utterance.pitch = Number(options.pitch) || 1;
      const voices = window.speechSynthesis.getVoices?.() || [];
      const preferredVoice = voices.find((voice) => voice.lang?.toLowerCase().startsWith('ja'));
      if (preferredVoice) utterance.voice = preferredVoice;
      window.speechSynthesis.speak(utterance);
    }

    async function renderReaderView(options = {}) {
      const shouldAutoAlign = Boolean(options.alignToCurrentSentence);
      const keepMenuOpen = Boolean(options.keepMenuOpen);
      if (!state.currentBook) return renderLibraryView();
      state.route = 'reader';
      syncDocumentScrollLock();
      const app = $('#app');
      if (app) app.className = `app reader-app reader-mode-${state.readingMode}`;
      const section = state.sections[state.currentSpineIndex];
      const sectionSentences = getSentencesForSection(section);
      const sentenceCurrent = Math.min(Math.max(state.currentSentenceIndex + 1, 1), Math.max(sectionSentences.length, 1));
      const sentenceTotal = Math.max(sectionSentences.length, 1);
      const initialContext = getReaderPaginationContext();
      const pageInfo = getCurrentVirtualPageInfo(initialContext);
      const percent = Math.round((pageInfo.globalPageCurrent / Math.max(pageInfo.globalPageTotal, 1)) * 100);

      app.innerHTML = `
        <div class="reader-shell">
          <div class="reader-card">
            <div class="reader-topbar">
              <button id="readerExitBtn" class="reader-topbar-btn" title="Volver al menú principal" aria-label="Volver al menú principal">
                <svg class="reader-topbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <line x1="5" y1="5" x2="19" y2="19"></line>
                  <line x1="19" y1="5" x2="5" y2="19"></line>
                </svg>
              </button>
              <div class="reader-progress">
                <div class="reader-progress-shell" id="pageProgressShell">
                  <div id="pageProgressPreview" class="reader-progress-bubble" aria-hidden="true">Pág. ${pageInfo.globalPageCurrent}/${pageInfo.globalPageTotal}</div>
                  <input id="pageProgress" type="range" min="0" max="${Math.max(pageInfo.globalPageTotal - 1, 0)}" value="${Math.max(pageInfo.globalPageCurrent - 1, 0)}" />
                </div>
              </div>
              <button id="openReaderMenuBtn" class="reader-topbar-btn menu" title="Opciones" aria-label="Opciones" aria-expanded="false" aria-controls="readerMenu">
                <svg class="reader-topbar-icon" viewBox="0 0 24 8" aria-hidden="true" focusable="false">
                  <circle cx="3" cy="4" r="1.4"></circle>
                  <circle cx="12" cy="4" r="1.4"></circle>
                  <circle cx="21" cy="4" r="1.4"></circle>
                </svg>
              </button>
            </div>
            <div id="readerMenu" class="toolbar reader-menu hidden">
              <div class="reader-menu-section reader-status-strip">
                <div class="reader-status-title">${escapeHtml(state.currentBook.parsedTitle || state.currentBook.title)}</div>
                <div class="reader-status-subtitle">${escapeHtml(state.currentBook.parsedAuthor || state.currentBook.author || 'Autor desconocido')}</div>
                <div class="reader-status-metrics">
                  <span class="reader-status-chip">${percent}%</span>
                  <span class="reader-status-chip">Pág ${pageInfo.globalPageCurrent}/${pageInfo.globalPageTotal}</span>
                  <span class="reader-status-chip">Frase ${sentenceCurrent}/${sentenceTotal}</span>
                </div>
              </div>
              <div class="reader-menu-section">
                <span class="reader-font-control-label">Tamaño de letra</span>
                <div class="reader-font-stepper" role="group" aria-label="Ajustar tamaño de letra">
                  <button id="fontSizeDecrease" type="button" class="font-size-small" aria-label="Hacer letra más pequeña" ${state.settings.fontSize <= 14 ? 'disabled' : ''}><span class="font-size-label" aria-hidden="true">A</span></button>
                  <button id="fontSizeIncrease" type="button" class="font-size-large" aria-label="Hacer letra más grande" ${state.settings.fontSize >= 30 ? 'disabled' : ''}><span class="font-size-label" aria-hidden="true">A</span></button>
                </div>
              </div>
            </div>
          </div>
          <div class="reader-content-wrap ${state.readingMode === 'page' ? 'reader-content-wrap-page' : 'reader-content-wrap-sentence'}">
            ${renderReaderCarousel(initialContext)}
          </div>
          <div class="reader-footer-bar">
            <button id="toggleModeBtn" class="reader-mode-toggle" title="Cambiar entre modo frase y modo página" aria-label="Cambiar entre modo frase y modo página">⇄</button>
          </div>
        </div>
        <div id="tokenPanelHost"></div>
      `;

      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;

      const pageProgressInput = $('#pageProgress');
      const pageProgressBubble = $('#pageProgressPreview');
      const pageProgressShell = $('#pageProgressShell');
      let hidePageProgressPreviewTimer = null;

      const getPageProgressPreviewMetrics = () => {
        const min = Number(pageProgressInput?.min) || 0;
        const max = Number(pageProgressInput?.max) || 0;
        const value = Math.max(min, Math.min(max, Number(pageProgressInput?.value) || 0));
        const total = Math.max((max - min) + 1, 1);
        const current = Math.max(1, Math.min(total, (value - min) + 1));
        const ratio = max > min ? (value - min) / (max - min) : 0;
        const inputWidth = pageProgressInput?.getBoundingClientRect().width || pageProgressShell?.getBoundingClientRect().width || 1;
        const estimatedThumbWidth = Math.min(28, Math.max(20, inputWidth * 0.055));
        const left = ratio * Math.max(inputWidth - estimatedThumbWidth, 0) + (estimatedThumbWidth / 2);
        return { current, total, left };
      };

      const updatePageProgressPreview = (visible = false) => {
        if (!pageProgressInput || !pageProgressBubble) return;
        const { current, total, left } = getPageProgressPreviewMetrics();
        const min = Number(pageProgressInput.min) || 0;
        const max = Number(pageProgressInput.max) || 0;
        const value = Math.max(min, Math.min(max, Number(pageProgressInput.value) || 0));
        const percent = max > min ? ((value - min) / (max - min)) * 100 : 0;
        pageProgressInput.style.setProperty('--progress-value', `${percent}%`);
        pageProgressBubble.textContent = `Pág. ${current}/${total}`;
        pageProgressBubble.style.left = `${left}px`;
        pageProgressBubble.classList.toggle('is-visible', Boolean(visible));
      };

      const showPageProgressPreview = () => {
        clearTimeout(hidePageProgressPreviewTimer);
        updatePageProgressPreview(true);
      };

      const hidePageProgressPreview = (delay = 0) => {
        clearTimeout(hidePageProgressPreviewTimer);
        if (!pageProgressBubble) return;
        if (delay > 0) {
          hidePageProgressPreviewTimer = window.setTimeout(() => {
            pageProgressBubble.classList.remove('is-visible');
          }, delay);
          return;
        }
        pageProgressBubble.classList.remove('is-visible');
      };

      updatePageProgressPreview(false);
      requestAnimationFrame(() => updatePageProgressPreview(false));
      const handleReaderResize = () => updatePageProgressPreview(pageProgressBubble?.classList.contains('is-visible'));
      window.addEventListener('resize', handleReaderResize, { passive: true });

      const readerMenu = $('#readerMenu');
      const openReaderMenuBtn = $('#openReaderMenuBtn');
      const closeReaderMenu = () => {
        readerMenu?.classList.add('hidden');
        openReaderMenuBtn?.setAttribute('aria-expanded', 'false');
      };
      const toggleReaderMenu = () => {
        const willOpen = readerMenu?.classList.contains('hidden');
        if (willOpen) {
          readerMenu?.classList.remove('hidden');
          openReaderMenuBtn?.setAttribute('aria-expanded', 'true');
        } else {
          closeReaderMenu();
        }
      };

      $('#readerExitBtn').addEventListener('click', async () => {
        closeTokenPanel();
        await persistCurrentProgress();
        await refreshBooks();
        renderLibraryView();
      });
      openReaderMenuBtn?.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleReaderMenu();
      });
      readerMenu?.addEventListener('click', (e) => {
        e.stopPropagation();
      });
      if (readerMenuOutsideClickHandler) {
        document.removeEventListener('click', readerMenuOutsideClickHandler);
      }
      readerMenuOutsideClickHandler = (e) => {
        if (!readerMenu || readerMenu.classList.contains('hidden')) return;
        if (readerMenu.contains(e.target) || openReaderMenuBtn?.contains(e.target)) return;
        closeReaderMenu();
      };
      document.addEventListener('click', readerMenuOutsideClickHandler);
      pageProgressInput?.addEventListener('input', showPageProgressPreview);
      pageProgressInput?.addEventListener('pointerdown', showPageProgressPreview);
      pageProgressInput?.addEventListener('touchstart', showPageProgressPreview, { passive: true });
      pageProgressInput?.addEventListener('focus', showPageProgressPreview);
      pageProgressInput?.addEventListener('pointerup', () => hidePageProgressPreview(220));
      pageProgressInput?.addEventListener('mouseup', () => hidePageProgressPreview(220));
      pageProgressInput?.addEventListener('touchend', () => hidePageProgressPreview(220));
      pageProgressInput?.addEventListener('keyup', () => hidePageProgressPreview(220));
      pageProgressInput?.addEventListener('blur', () => hidePageProgressPreview());
      pageProgressInput?.addEventListener('change', async (e) => {
        showPageProgressPreview();
        goToGlobalPage(Number(e.target.value));
        await persistCurrentProgress();
        renderReaderView({ alignToCurrentSentence: true });
      });
      $('#toggleModeBtn').addEventListener('click', () => {
        const targetMode = state.readingMode === 'page' ? 'sentence' : 'page';
        setReadingMode(targetMode);
      });
      if (keepMenuOpen) {
        readerMenu?.classList.remove('hidden');
        openReaderMenuBtn?.setAttribute('aria-expanded', 'true');
      }

      const applyReaderFontSize = async (nextSizeCandidate) => {
        const nextSize = Math.max(14, Math.min(30, Number(nextSizeCandidate) || 18));
        if (nextSize === state.settings.fontSize) return;
        state.settings.fontSize = nextSize;
        state.pageMapsCache.clear();
        state.pageSummariesCache.clear();
        const menuIsOpen = !$('#readerMenu')?.classList.contains('hidden');
        renderReaderView({ alignToCurrentSentence: true, keepMenuOpen: menuIsOpen });
        await saveSettings({ fontSize: nextSize });
        await persistCurrentProgress();
      };
      $('#fontSizeDecrease')?.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        applyReaderFontSize(state.settings.fontSize - 1);
      });
      $('#fontSizeIncrease')?.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        applyReaderFontSize(state.settings.fontSize + 1);
      });

      if (state.readingMode === 'page') {
        $('#currentReaderPanel .reader-content')?.addEventListener('click', async (e) => {
          const tokenEl = e.target.closest('.token[data-interactive="1"]');
          if (!tokenEl) return;
          const token = getTokenFromElement(tokenEl);
          syncCurrentSentenceFromToken(token);
          await openTokenPanel(token, { bookId: state.currentBookId });
          speakNativeTts(token?.surface || token?.baseForm || '', { lang: 'ja-JP' });
        });
        if (shouldAutoAlign) {
          requestAnimationFrame(() => requestAnimationFrame(() => alignPageModeToCurrentSentence()));
        }
      }

      if (state.readingMode === 'sentence') {
        $('#playSentenceBtn')?.addEventListener('click', () => {
          const currentSentence = getCurrentSentenceText();
          speakNativeTts(currentSentence, { lang: 'ja-JP' });
        });
        $('#translateSentenceBtn')?.addEventListener('click', async () => {
          const currentSentence = getCurrentSentenceText();
          if (!currentSentence.trim()) return;
          const currentLocation = getNormalizedReaderLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex });
          const currentView = getSentenceTranslationViewModel(currentLocation, currentSentence);
          if (currentView.kind === 'loading' || currentView.kind === 'success') return;
          state.sentenceTranslation = {
            bookId: state.currentBookId,
            sectionIndex: state.currentSpineIndex,
            sentenceIndex: state.currentSentenceIndex,
            status: 'loading',
            translatedText: '',
            error: ''
          };
          refreshCurrentSentenceTranslationResult();
          try {
            const translatedText = await translateSentenceWithAzure(currentSentence);
            state.sentenceTranslation = {
              bookId: state.currentBookId,
              sectionIndex: state.currentSpineIndex,
              sentenceIndex: state.currentSentenceIndex,
              status: 'success',
              translatedText,
              error: ''
            };
          } catch (err) {
            state.sentenceTranslation = {
              bookId: state.currentBookId,
              sectionIndex: state.currentSpineIndex,
              sentenceIndex: state.currentSentenceIndex,
              status: 'error',
              translatedText: '',
              error: err?.message || 'No se pudo traducir la oración.'
            };
          }
          refreshCurrentSentenceTranslationResult();
        });
        $('#copySentenceBtn')?.addEventListener('click', async () => {
          const currentSentence = getCurrentSentenceText();
          if (!currentSentence.trim()) return;
          const copied = await copyTextToClipboard(currentSentence.replace(/\s+/gu, ''));
          if (copied) showCopyFeedback($('#copySentenceBtn'));
        });
        $('#sentenceGoogleTranslateBtn')?.addEventListener('click', () => {
          openGoogleTranslateWithText(getCurrentSentenceText());
        });
        $('#sentenceChatgptBtn')?.addEventListener('click', () => {
          const { sentencePrompt } = getChatGptConfig();
          openChatGptWithPrompt(getCurrentSentenceText(), sentencePrompt);
        });
        $('#openSentenceEditorBtn')?.addEventListener('click', () => {
          const keepMenuOpen = !$('#readerMenu')?.classList.contains('hidden');
          if (isSentenceEditorOpen({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex })) {
            resetSentenceEditorState();
          } else {
            openSentenceEditorForLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex });
          }
          renderReaderView({ keepMenuOpen });
        });
        $('#cancelSentenceEditBtn')?.addEventListener('click', () => {
          const keepMenuOpen = !$('#readerMenu')?.classList.contains('hidden');
          resetSentenceEditorState();
          renderReaderView({ keepMenuOpen });
        });
        $('#resetSentenceEditBtn')?.addEventListener('click', () => {
          const textarea = $('#sentenceEditInput');
          const nextDraft = buildAutomaticSentenceTokenization(
            state.currentBookId,
            state.currentSpineIndex,
            state.currentSentenceIndex,
            getSentencesForSection(state.sections[state.currentSpineIndex] || {})[state.currentSentenceIndex] || ''
          ).tokens.map((token) => token.surface || '').join(' ').trim();
          state.sentenceEditor.draft = nextDraft;
          state.sentenceEditor.error = '';
          if (textarea) {
            textarea.value = nextDraft;
            syncSentenceEditPreview();
            textarea.focus();
            textarea.setSelectionRange(textarea.value.length, textarea.value.length);
          }
        });
        $('#clearSentenceEditBtn')?.addEventListener('click', async () => {
          const keepMenuOpen = !$('#readerMenu')?.classList.contains('hidden');
          await deleteSentenceOverrideForLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex });
          resetSentenceEditorState();
          renderReaderView({ keepMenuOpen });
          await persistCurrentProgress();
        });
        $('#saveSentenceEditBtn')?.addEventListener('click', async () => {
          const keepMenuOpen = !$('#readerMenu')?.classList.contains('hidden');
          const draft = $('#sentenceEditInput')?.value || '';
          state.sentenceEditor.draft = draft;
          state.sentenceEditor.error = '';
          try {
            await saveSentenceOverrideForLocation({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex }, draft);
            resetSentenceEditorState();
            renderReaderView({ keepMenuOpen });
            await persistCurrentProgress();
          } catch (err) {
            state.sentenceEditor.error = err?.message || 'No se pudo guardar la edición manual.';
            renderReaderView({ keepMenuOpen });
          }
        });
        $('#sentenceEditInput')?.addEventListener('input', (e) => {
          state.sentenceEditor.draft = e.target.value || '';
          state.sentenceEditor.error = '';
          syncSentenceEditPreview();
        });
        $('#sentenceEditInput')?.addEventListener('scroll', () => {
          syncSentenceEditPreview();
        });
        $('#sentenceEditInput')?.addEventListener('keydown', async (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            $('#saveSentenceEditBtn')?.click();
          }
        });
        if (isSentenceEditorOpen({ sectionIndex: state.currentSpineIndex, sentenceIndex: state.currentSentenceIndex })) {
          requestAnimationFrame(() => {
            const sentenceEditInput = $('#sentenceEditInput');
            if (!sentenceEditInput) return;
            syncSentenceEditPreview();
            sentenceEditInput.focus();
            sentenceEditInput.setSelectionRange(sentenceEditInput.value.length, sentenceEditInput.value.length);
          });
        }
        $('#currentReaderPanel .sentence-box')?.addEventListener('click', async (e) => {
          if (e.target.closest('#openSentenceEditorBtn, #saveSentenceEditBtn, #resetSentenceEditBtn, #clearSentenceEditBtn, #cancelSentenceEditBtn, #sentenceEditInput')) return;
          const tokenEl = e.target.closest('.token[data-interactive="1"]');
          if (!tokenEl) return;
          const token = getTokenFromElement(tokenEl);
          syncCurrentSentenceFromToken(token);
          await openTokenPanel(token, { bookId: state.currentBookId });
          speakNativeTts(token?.surface || token?.baseForm || '', { lang: 'ja-JP' });
        });
      }

      attachReaderSwipeGestures();
    }

    function attachReaderSwipeGestures() {
      const swipeSurface = document.querySelector('.reader-content-wrap');
      const swipeTrack = document.getElementById('readerCarouselTrack');
      if (!swipeSurface || !swipeTrack || swipeSurface.dataset.swipeAttached === '1') return;
      swipeSurface.dataset.swipeAttached = '1';

      const minHorizontalDelta = 42;
      const maxVerticalDelta = 86;
      const quickSwipeMs = 260;
      const stateGesture = {
        pointerId: null,
        x: 0,
        y: 0,
        lastX: 0,
        lastY: 0,
        t: 0,
        active: false,
        dragging: false,
        committing: false
      };

      const isInteractiveTarget = (target) => {
        const elementTarget = target instanceof Element
          ? target
          : target?.parentElement || null;
        return Boolean(elementTarget?.closest('button, input, textarea, select, a, #tokenPanelHost, .reader-card'));
      };
      const getPanelWidth = () => swipeSurface.clientWidth || window.innerWidth || 1;
      const hasPrev = () => document.getElementById('readerCarousel')?.dataset.hasPrev === '1';
      const hasNext = () => document.getElementById('readerCarousel')?.dataset.hasNext === '1';
      const shouldIgnoreKeyboardEvent = (event) => {
        const target = event.target instanceof Element ? event.target : null;
        if (!target) return false;
        if (target.closest('input, textarea, select, [contenteditable="true"]')) return true;
        return Boolean(target.closest('#tokenPanelHost'));
      };

      const setTrackOffset = (valuePx, options = {}) => {
        if (options.immediate) swipeTrack.classList.add('is-dragging');
        else swipeTrack.classList.remove('is-dragging');
        swipeTrack.style.setProperty('--reader-drag-offset', `${Math.round(valuePx)}px`);
      };

      const resetTrackPosition = (options = {}) => {
        if (options.immediate) swipeTrack.classList.add('is-dragging');
        else swipeTrack.classList.remove('is-dragging');
        swipeTrack.style.setProperty('--reader-drag-offset', '0px');
        swipeSurface.classList.toggle('is-dragging', Boolean(options.immediate));
      };

      const finishGesture = () => {
        stateGesture.pointerId = null;
        stateGesture.active = false;
        stateGesture.dragging = false;
        swipeSurface.classList.remove('is-dragging');
      };

      const waitForTrackTransition = () => new Promise((resolve) => {
        let done = false;
        const finalize = () => {
          if (done) return;
          done = true;
          swipeTrack.removeEventListener('transitionend', onEnd);
          resolve();
        };
        const onEnd = (event) => {
          if (event.target !== swipeTrack) return;
          finalize();
        };
        swipeTrack.addEventListener('transitionend', onEnd);
        setTimeout(finalize, 260);
      });

      const animateCommit = async (direction) => {
        if (stateGesture.committing) return;
        stateGesture.committing = true;
        swipeTrack.classList.remove('is-dragging');
        swipeSurface.classList.remove('is-dragging');
        setTrackOffset(direction < 0 ? -getPanelWidth() : getPanelWidth());
        await waitForTrackTransition();
        if (direction < 0) await nextStep();
        else await prevStep();
        stateGesture.committing = false;
      };

      const onPointerDown = (event) => {
        if (state.readingMode !== 'sentence' && state.readingMode !== 'page') return;
        if (stateGesture.committing) return;
        if (event.pointerType === 'mouse' && event.button !== 0) return;
        if (isInteractiveTarget(event.target)) {
          stateGesture.active = false;
          return;
        }
        stateGesture.pointerId = event.pointerId;
        stateGesture.x = event.clientX;
        stateGesture.y = event.clientY;
        stateGesture.lastX = event.clientX;
        stateGesture.lastY = event.clientY;
        stateGesture.t = Date.now();
        stateGesture.active = true;
        stateGesture.dragging = false;
        resetTrackPosition({ immediate: true });
      };

      const onPointerMove = (event) => {
        if (!stateGesture.active || event.pointerId !== stateGesture.pointerId || stateGesture.committing) return;
        const dx = event.clientX - stateGesture.x;
        const dy = event.clientY - stateGesture.y;
        stateGesture.lastX = event.clientX;
        stateGesture.lastY = event.clientY;

        if (!stateGesture.dragging) {
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
          if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 12) {
            finishGesture();
            resetTrackPosition({ immediate: false });
            return;
          }
          stateGesture.dragging = true;
          try { swipeSurface.setPointerCapture(event.pointerId); } catch (err) {}
        }

        let limitedDx = dx;
        const edgeLimit = 54;
        if (dx > 0 && !hasPrev()) limitedDx = Math.min(dx, edgeLimit);
        if (dx < 0 && !hasNext()) limitedDx = Math.max(dx, -edgeLimit);
        swipeSurface.classList.add('is-dragging');
        setTrackOffset(limitedDx, { immediate: true });
        event.preventDefault();
      };

      const onPointerEnd = async (event) => {
        if (!stateGesture.active || event.pointerId !== stateGesture.pointerId || stateGesture.committing) return;
        const elapsed = Date.now() - stateGesture.t;
        const dx = (event.clientX || stateGesture.lastX) - stateGesture.x;
        const dy = (event.clientY || stateGesture.lastY) - stateGesture.y;
        const shouldCommit = Math.abs(dx) >= Math.max(minHorizontalDelta, getPanelWidth() * 0.16) || (elapsed <= quickSwipeMs && Math.abs(dx) >= 28);
        const direction = dx < 0 ? -1 : 1;
        const canCommit = direction < 0 ? hasNext() : hasPrev();

        finishGesture();

        if (Math.abs(dy) > maxVerticalDelta || Math.abs(dx) < minHorizontalDelta || !shouldCommit || !canCommit) {
          resetTrackPosition({ immediate: false });
          return;
        }

        await animateCommit(direction);
      };

      swipeSurface.addEventListener('pointerdown', onPointerDown);
      swipeSurface.addEventListener('pointermove', onPointerMove);
      swipeSurface.addEventListener('pointerup', onPointerEnd);
      swipeSurface.addEventListener('pointercancel', () => {
        finishGesture();
        resetTrackPosition({ immediate: false });
      });

      if (document.body.dataset.readerKeyboardSwipeAttached !== '1') {
        document.body.dataset.readerKeyboardSwipeAttached = '1';
        document.addEventListener('keydown', async (event) => {
          if (event.defaultPrevented || state.route !== 'reader' || (state.readingMode !== 'sentence' && state.readingMode !== 'page')) return;
          if (stateGesture.committing || shouldIgnoreKeyboardEvent(event)) return;
          if (event.key === 'ArrowRight') {
            if (!hasNext()) return;
            event.preventDefault();
            await animateCommit(-1);
          } else if (event.key === 'ArrowLeft') {
            if (!hasPrev()) return;
            event.preventDefault();
            await animateCommit(1);
          }
        });
      }
    }

    // =========================
    // Preferencias + SW
    // =========================
    function disableIosZoomIn() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) return;

      document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
      document.addEventListener('gesturechange', (event) => event.preventDefault(), { passive: false });
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (event) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });
    }

    function applyTheme(theme) {
      const resolvedTheme = theme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', resolvedTheme);
      applyReaderLevelStyleVariables(resolvedTheme);
    }

    const APP_VERSION = '2026.04.09.2';
    const SERVICE_WORKER_URL = './sw.js';

    function getServiceWorkerAbsoluteUrl() {
      return new URL(SERVICE_WORKER_URL, window.location.href).href;
    }

    function getServiceWorkerScopeUrl() {
      return new URL('./', window.location.href).href;
    }

    function waitForControllerChange(timeoutMs = 4000) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const onChange = () => {
          if (settled) return;
          settled = true;
          navigator.serviceWorker.removeEventListener('controllerchange', onChange);
          clearTimeout(timer);
          resolve();
        };
        const timer = window.setTimeout(() => {
          if (settled) return;
          settled = true;
          navigator.serviceWorker.removeEventListener('controllerchange', onChange);
          reject(new Error('Timeout esperando controllerchange'));
        }, timeoutMs);
        navigator.serviceWorker.addEventListener('controllerchange', onChange);
      });
    }

    function waitForWorkerState(worker, targetState = 'installed', timeoutMs = 4000) {
      return new Promise((resolve, reject) => {
        if (!worker) {
          reject(new Error('No hay Service Worker en instalación.'));
          return;
        }
        if (worker.state === targetState) {
          resolve(worker);
          return;
        }
        let settled = false;
        const onStateChange = () => {
          if (settled) return;
          if (worker.state === targetState) {
            settled = true;
            worker.removeEventListener('statechange', onStateChange);
            clearTimeout(timer);
            resolve(worker);
          } else if (worker.state === 'redundant') {
            settled = true;
            worker.removeEventListener('statechange', onStateChange);
            clearTimeout(timer);
            reject(new Error('El Service Worker quedó redundante.'));
          }
        };
        const timer = window.setTimeout(() => {
          if (settled) return;
          settled = true;
          worker.removeEventListener('statechange', onStateChange);
          reject(new Error('Timeout esperando instalación del Service Worker.'));
        }, timeoutMs);
        worker.addEventListener('statechange', onStateChange);
      });
    }

    async function cleanupLegacyServiceWorkers() {
      if (!('serviceWorker' in navigator)) return;
      const registrations = await navigator.serviceWorker.getRegistrations();
      const expectedScriptUrl = getServiceWorkerAbsoluteUrl();
      const expectedScopeUrl = getServiceWorkerScopeUrl();
      for (const registration of registrations) {
        if (!registration.scope.startsWith(expectedScopeUrl)) continue;
        const scriptUrls = [registration.active?.scriptURL, registration.waiting?.scriptURL, registration.installing?.scriptURL]
          .filter(Boolean);
        if (!scriptUrls.length) continue;
        const isExpectedRegistration = scriptUrls.some((url) => url === expectedScriptUrl);
        if (!isExpectedRegistration) {
          await registration.unregister();
        }
      }
    }

    async function requestShellRefreshFromWorker(registration) {
      const targetWorker = registration?.waiting || registration?.active || navigator.serviceWorker.controller;
      if (!targetWorker || typeof MessageChannel === 'undefined') return false;
      return new Promise((resolve) => {
        const channel = new MessageChannel();
        const timer = window.setTimeout(() => resolve(false), 4000);
        channel.port1.onmessage = (event) => {
          clearTimeout(timer);
          resolve(!!event.data?.ok);
        };
        try {
          targetWorker.postMessage({ type: 'REFRESH_APP_SHELL' }, [channel.port2]);
        } catch (error) {
          clearTimeout(timer);
          resolve(false);
        }
      });
    }

    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return null;
      try {
        await cleanupLegacyServiceWorkers();
        const registration = await navigator.serviceWorker.register(SERVICE_WORKER_URL, { scope: './' });
        if (registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        return registration;
      } catch (e) {
        console.warn('No se pudo registrar SW', e);
        return null;
      }
    }

    async function refreshAppShellAndReload() {
      try {
        if (!('serviceWorker' in navigator)) {
          window.location.reload();
          return;
        }

        let registration = await navigator.serviceWorker.getRegistration();
        if (!registration) {
          registration = await registerServiceWorker();
        }
        if (!registration) {
          window.location.reload();
          return;
        }

        await registration.update().catch(() => null);

        if (registration.installing) {
          await waitForWorkerState(registration.installing, 'installed').catch(() => null);
        }

        registration = await navigator.serviceWorker.getRegistration() || registration;

        if (registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          await waitForControllerChange().catch(() => null);
          registration = await navigator.serviceWorker.getRegistration() || registration;
        }

        const refreshed = await requestShellRefreshFromWorker(registration);
        if (!refreshed) {
          await fetch(new Request('./index.html', { cache: 'no-store' })).catch(() => null);
        }

        window.location.reload();
      } catch (error) {
        console.warn('No se pudo refrescar la app', error);
        alert('No se pudo refrescar la app. Prueba a recargar la página manualmente.');
      }
    }

    // =========================
    // Inicialización
    // =========================
    function getReaderViewportState() {
      const docEl = document.documentElement;
      const visualViewport = window.visualViewport;
      return {
        layoutWidth: Math.round(docEl?.clientWidth || window.innerWidth || 0),
        layoutHeight: Math.round(docEl?.clientHeight || window.innerHeight || 0),
        innerWidth: Math.round(window.innerWidth || 0),
        innerHeight: Math.round(window.innerHeight || 0),
        visualWidth: Math.round(visualViewport?.width || 0),
        visualHeight: Math.round(visualViewport?.height || 0),
        orientation: (window.innerWidth || 0) > (window.innerHeight || 0) ? 'landscape' : 'portrait'
      };
    }

    let readerResizeDebounce = null;
    let lastReaderViewportState = getReaderViewportState();
    window.addEventListener('resize', () => {
      const nextViewportState = getReaderViewportState();
      if (state.route !== 'reader') {
        lastReaderViewportState = nextViewportState;
        return;
      }

      const widthDelta = Math.abs(nextViewportState.layoutWidth - lastReaderViewportState.layoutWidth);
      const innerWidthDelta = Math.abs(nextViewportState.innerWidth - lastReaderViewportState.innerWidth);
      const orientationChanged = nextViewportState.orientation !== lastReaderViewportState.orientation;

      lastReaderViewportState = nextViewportState;

      // En Safari iOS la barra de navegación puede provocar "resize" mientras se hace scroll.
      // En modo página, con 17 frases fijas por página, esos cambios de altura no deben forzar
      // un re-render ni recolocar la lectura. Solo reaccionamos a cambios reales de ancho/orientación.
      if (!orientationChanged && widthDelta < 24 && innerWidthDelta < 24) {
        return;
      }

      clearTimeout(readerResizeDebounce);
      readerResizeDebounce = setTimeout(async () => {
        closeTokenPanel();
        state.pageMapsCache.clear();
        state.pageSummariesCache.clear();
        renderReaderView({ alignToCurrentSentence: false });
        await persistCurrentProgress();
      }, 140);
    });

    (async function init() {
      disableIosZoomIn();
      await registerServiceWorker();
      await loadSettings();
      await ensureEmbeddedFallbackDictionary();
      await loadDictionaryIndexes();
      await refreshBooks();
      await loadVocabularyMap();
      await loadSentenceOverrides();
      resetSentenceEditorState();
      renderLibraryView();
      if (state.settings.lastOpenedBookId && state.books.some((b) => b.id === state.settings.lastOpenedBookId)) {
        // Punto de extensión futuro: restaurar auto-apertura configurable.
      }
    })();

    // Nota Fase 4 (corregida):
    // Diccionario offline con packs locales importables en IndexedDB + fallback embebido.
    // Lookup por lemma/surface/reading + deinflection básica extensible + cache técnico de resultados.
  </script>
