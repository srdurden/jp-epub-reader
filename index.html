<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>日本語 Reader</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-strong: #ffffff;
      --surface-soft: #f5f5f7;
      --text: #252230;
      --muted: #7a7488;
      --primary: #7e78a2;
      --danger: #b2445e;
      --border: #cdc6db;
      --toggle-bg: #e5dfef;
      --toggle-active: #ffffff;
      --shadow-soft: 0 14px 34px rgba(116, 102, 153, 0.14);
      --shadow-strong: 0 18px 42px rgba(116, 102, 153, 0.18);
    }
    [data-theme="dark"] {
      --bg: #111628;
      --surface: #1b2134;
      --surface-strong: #22293e;
      --surface-soft: #262d45;
      --text: #f1eef8;
      --muted: #b8b2c9;
      --primary: #a59cc8;
      --danger: #f39ab0;
      --border: #48506b;
      --toggle-bg: #313852;
      --toggle-active: #454e6c;
      --shadow-soft: 0 18px 38px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 22px 46px rgba(0, 0, 0, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }
    body.reader-sentence-lock {
      overflow: hidden;
      height: 100vh;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 14px calc(env(safe-area-inset-bottom, 0px) + 34px);
    }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .spacer { flex: 1; }
    button, select, input[type="range"], input[type="text"], input[type="search"], input[type="password"] {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font: inherit;
    }
    button.primary { background: var(--primary); color: white; border-color: transparent; }
    button.danger { color: white; background: var(--danger); border-color: transparent; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
    .book-item { display: grid; grid-template-columns: 72px 1fr; gap: 12px; align-items: start; }
    .cover { width: 72px; height: 96px; border: 1px solid var(--border); border-radius: 8px; object-fit: cover; background: #cbd5e1; }
    .book-title { margin: 0 0 4px; font-size: 1rem; }
    .meta { margin: 2px 0; color: var(--muted); font-size: 0.85rem; }
    .empty { text-align: center; padding: 32px 12px; color: var(--muted); }
    .reader-shell { display: grid; gap: 12px; }
    .reader-card {
      background: color-mix(in srgb, var(--surface) 96%, #e5e7eb 4%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px 14px 14px;
      position: sticky;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      z-index: 12;
    }
    .reader-close-bubble {
      position: absolute;
      top: -16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-soft);
      z-index: 2;
    }
    .reader-quick-nav {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .reader-quick-nav button {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 10px 8px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 95%, #eef2f8 5%);
      font-size: 1.35rem;
      line-height: 1;
    }
    .reader-quick-nav button span { display: none; }
    .reader-top {
      display: grid;
      gap: 12px;
      align-items: center;
    }
    .reader-headline {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-btn {
      border: none;
      background: transparent;
      color: var(--text);
      padding: 6px;
      border-radius: 10px;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
    }
    .icon-btn:hover { background: color-mix(in srgb, var(--border) 55%, transparent); }
    .reader-progress {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 10px;
      margin: 6px 0 2px;
    }
    .reader-progress-shell {
      position: relative;
      padding-top: 28px;
    }
    .reader-progress-bubble {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateX(-50%) translateY(4px) scale(0.96);
      transform-origin: center bottom;
      background: #4caf5a;
      color: #fff;
      border-radius: 999px;
      padding: 7px 14px;
      min-width: 86px;
      text-align: center;
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
      box-shadow: 0 10px 24px rgba(22, 163, 74, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      white-space: nowrap;
      z-index: 2;
    }
    .reader-progress-bubble.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .reader-progress input[type="range"] {
      --progress-value: 0%;
      width: 100%;
      padding: 0;
      height: 12px;
      border: 0;
      border-radius: 999px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }
    .reader-progress input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(to right, #16a34a 0%, #16a34a var(--progress-value), #9ca3af var(--progress-value), #9ca3af 100%);
    }
    .reader-progress input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      margin-top: -6px;
      border-radius: 50%;
      border: 0;
      background: #16a34a;
      box-shadow: 0 2px 8px rgba(22, 163, 74, 0.35);
    }
    .reader-progress input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      background: #9ca3af;
    }
    .reader-progress input[type="range"]::-moz-range-progress {
      height: 10px;
      border-radius: 999px;
      background: #16a34a;
    }
    .reader-progress input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 0;
      background: #16a34a;
      box-shadow: 0 2px 8px rgba(22, 163, 74, 0.35);
    }
    .reader-menu {
      display: grid;
      gap: 12px;
      padding-top: 8px;
      margin-top: 4px;
    }
    .reader-menu-section {
      display: grid;
      gap: 8px;
    }
    .reader-menu-divider {
      height: 1px;
      background: color-mix(in srgb, var(--border) 70%, #f3f4f6 30%);
      border-radius: 999px;
    }
    .reader-content-wrap {
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }
    .reader-content-wrap.is-dragging {
      user-select: none;
      -webkit-user-select: none;
    }
    .reader-carousel {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .reader-carousel-track {
      display: flex;
      width: 100%;
      min-width: 100%;
      will-change: transform;
      transform: translate3d(calc(-100% + var(--reader-drag-offset, 0px)), 0, 0);
      transition: transform 220ms ease;
    }
    .reader-carousel-track.is-dragging {
      transition: none;
    }
    .reader-carousel-panel {
      flex: 0 0 100%;
      width: 100%;
      min-width: 100%;
      max-width: 100%;
      padding: 0 4px;
      overflow: hidden;
    }
    .reader-carousel-panel[data-panel-role="prev"],
    .reader-carousel-panel[data-panel-role="next"] {
      pointer-events: none;
    }
    .reader-content,
    .reader-preview-content {
      min-height: calc(100vh - 210px);
      overflow: visible;
      border: 0;
      border-radius: 0;
      padding: 8px 4px 12px;
      background: transparent;
      line-height: 1.85;
      font-size: var(--reader-font-size, 18px);
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .reader-content iframe,
    .reader-preview-content iframe { width: 100%; min-height: 56vh; border: 0; }
    .reader-preview-content {
      opacity: 0.78;
      filter: saturate(0.96);
    }
    .reader-preview-empty {
      min-height: calc(100vh - 210px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 4px 12px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }
    .sentence-hero-preview {
      min-height: 122px;
    }
    .sentence-box {
      font-size: 1em;
      line-height: 1.9;
      white-space: pre-wrap;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .page-mode-text {
      font-size: 1em;
      line-height: 1.95;
      white-space: pre-wrap;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .page-sentence {
      margin: 0 0 0.4em;
      max-width: 100%;
      min-width: 0;
    }
    .reader-status-strip {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .reader-status-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .reader-status-subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.25;
    }
    .reader-status-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .reader-status-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      line-height: 1.2;
      background: color-mix(in srgb, var(--surface-strong) 82%, var(--surface-soft) 18%);
    }
    .reader-page-frame {
      min-height: var(--reader-page-height, calc(100vh - 250px));
      padding: 0 2px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .reader-page-footer {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }
    #paginationMeasureHost {
      position: fixed;
      left: -99999px;
      top: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
      contain: layout style paint;
    }
    .segmented-line {
      display: flex;
      flex-wrap: wrap;
      gap: 0.12em;
      align-items: baseline;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }
    .segmented-line.compact { gap: 0; }
    .token {
      border-radius: 6px;
      padding: 0 0.12em;
      border-bottom: 1px solid transparent;
      transition: background-color 120ms ease;
    }
    .token.clickable { cursor: pointer; }
    .token.jp.unknown-word { background: #dbeafe; border-bottom-color: transparent; }
    .token.jp.known-learning { background: #fef08a; border-bottom-color: transparent; }
    .token.jp.known-level-5 { border-bottom-color: transparent; background: transparent; }
    .token.punct { opacity: 0.9; }
    .segmented-line.compact .token { border-bottom-color: transparent; }
    .token.known-level-1 { border-bottom-color: transparent; background: #fef08a; }
    .token.known-level-2 {
      border-bottom-color: transparent;
      background: transparent;
      text-decoration-line: underline;
      text-decoration-style: dotted;
      text-decoration-thickness: 2px;
      text-underline-offset: 0.16em;
      text-decoration-color: color-mix(in srgb, currentColor 78%, transparent);
    }
    .token.known-level-3 { border-bottom-color: transparent; background: transparent; }
    .token.known-level-4 { border-bottom-color: transparent; background: transparent; }
    .token.known-level-5 { border-bottom-color: transparent; background: transparent; }
    [data-theme="dark"] .token.jp.unknown-word {
      background: #d1d5db;
      color: #111827;
    }
    [data-theme="dark"] .token.jp.known-learning,
    [data-theme="dark"] .token.known-level-1,
    [data-theme="dark"] .token.known-level-2 {
      color: #111827;
    }
    .reader-content.with-panel { position: relative; }
    #tokenPanelHost {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    .token-panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      pointer-events: auto;
    }
    .token-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      padding: 10px 12px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      z-index: 3;
      width: min(560px, calc(100vw - 24px));
      max-height: min(82vh, 780px);
      overflow-y: auto;
      overflow-x: visible;
      pointer-events: auto;
    }
    .token-panel h3 { margin: 0; font-size: 1.55rem; line-height: 1.1; }
    .token-lemma-line {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 400;
    }
    .token-panel-top-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #d1d5db;
    }
    .token-panel-top-row .left-actions {
      justify-self: start;
      display: flex;
    }
    .token-panel-top-row .right-actions {
      justify-self: end;
      display: flex;
    }
    .token-grid { display: grid; gap: 10px; }
    .token-grid .v { font-weight: 400; word-break: break-word; }
    .token-grid .hiragana { color: var(--muted); font-size: 0.95rem; }
    .token-panel h3 .hiragana {
      color: var(--muted);
      font-weight: 400;
    }
    .level-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0; justify-content: center; }
    .token-panel-word-row {
      margin: 16px 0 12px;
      align-items: center;
      background: #eceff3;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 12px;
    }
    [data-theme="dark"] .token-panel-word-row {
      background: color-mix(in srgb, var(--surface-soft) 80%, #8b96ab 20%);
      border-color: color-mix(in srgb, var(--border) 78%, #9ca3af 22%);
    }
    .token-panel-section {
      border-top: 1px solid #d1d5db;
      border-bottom: 1px solid #d1d5db;
      padding: 12px 0;
      min-height: 50px;
      display: flex;
      align-items: center;
    }
    .token-panel-section-content {
      width: 100%;
    }
    .token-panel-footer {
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }
    .custom-definition-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .custom-definition-actions {
      display: inline-flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .custom-definition-actions .icon-btn {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 0.95rem;
    }
    #userDefinitionInput {
      min-height: 2.3em;
      height: auto;
      resize: vertical;
      overflow: hidden;
    }
    #saveUserDefinitionBtn {
      background: #fff;
      color: #000;
      border-color: var(--border);
    }
    .chatgpt-btn {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .external-links-row {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #eceff3;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    [data-theme="dark"] .external-links-row {
      background: color-mix(in srgb, var(--surface-soft) 80%, #8b96ab 20%);
      border-color: color-mix(in srgb, var(--border) 78%, #9ca3af 22%);
    }
    .level-btn { min-width: 42px; padding: 6px 10px; border-radius: 999px; }
    .level-btn.active { background: var(--primary); color: #fff; border-color: transparent; }
    .level-btn.level-checkmark {
      color: #16a34a;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .level-btn.level-checkmark.active {
      background: color-mix(in srgb, #16a34a 12%, var(--surface));
      color: #16a34a;
      border-color: #16a34a;
    }
    .vocab-list { display: grid; gap: 10px; }
    .vocab-item {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 16px 14px;
      background: var(--surface);
    }
    .vocab-main { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .vocab-remove-btn {
      position: absolute;
      top: -14px;
      right: -10px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1rem;
      font-weight: 700;
      padding: 0;
      box-shadow: var(--shadow-soft);
      z-index: 2;
    }
    .vocab-translation {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }
    .vocab-custom-definition {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 1.8rem;
      line-height: 1.2;
    }
    .vocab-custom-definition-text {
      font-size: 0.9rem;
      color: var(--text);
      word-break: break-word;
    }
    .vocab-custom-definition-actions {
      display: inline-flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .vocab-custom-definition-actions .icon-btn {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 0;
    }
    .badge { border: 1px solid var(--border); border-radius: 999px; font-size: 0.78rem; padding: 2px 8px; color: var(--muted); }
    .badge.level { color: var(--text); }
    .token.dbg::after {
      content: attr(data-debug);
      display: block;
      font-size: 0.62rem;
      line-height: 1.2;
      color: var(--muted);
      margin-top: 0.06rem;
      text-align: center;
    }
    .field-help { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }
    textarea {
      width: 100%;
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
      resize: vertical;
    }
    .meanings-list { margin: 4px 0 0; padding-left: 18px; }
    .meanings-list li { margin: 2px 0; color: var(--muted); }
    .status { color: var(--muted); font-size: 0.9rem; }
    .hidden { display: none !important; }
    .sentence-hero {
      display: grid;
      place-items: center;
      padding: 8px 0 18px;
    }
    .sentence-hero .play-main {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      font-size: 2rem;
      border: 2px solid color-mix(in srgb, var(--text) 70%, transparent);
      background: transparent;
    }
    .sentence-translation-result {
      margin-top: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .sentence-translation-result.is-error {
      color: var(--danger);
    }
    .sentence-translation-label { display: none; }
    .copy-glyph-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 2px 4px;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
      border-radius: 8px;
      min-width: auto;
    }
    .copy-glyph-btn:hover {
      color: var(--text);
      background: color-mix(in srgb, var(--border) 45%, transparent);
    }
    .copy-glyph-btn.is-copied {
      color: #16a34a;
      background: color-mix(in srgb, #16a34a 18%, transparent);
      transform: scale(1.08);
    }
    .sentence-copy-wrap {
      display: inline-flex;
      align-items: flex-start;
      gap: 4px;
      width: 100%;
    }
    .sentence-copy-text {
      flex: 1;
      min-width: 0;
    }
    .token-panel-headword {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .token-panel-definition {
      margin-top: 8px;
    }
    .custom-definition-input-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .gemini-icon-btn {
      border: 0;
      background: transparent;
      color: var(--primary);
      padding: 6px 4px;
      min-width: auto;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
    }
    .library-shell { display: grid; gap: 18px; }
    .library-card,
    .book-tile {

<body>
  <div id="app" class="app"></div>

  <script>
    /*
      JP EPUB Reader - Fase 3 (offline-first)
      Arquitectura (todo autocontenido en este archivo):
      1) Config / constantes
      2) Utilidades generales
      3) Capa IndexedDB
      4) Importación y almacenamiento de EPUB
      5) Extracción de metadatos
      6) Lógica del lector (modo página + modo frase)
      7) [NUEVO Fase 2] Normalización + tokenización japonesa + render de tokens
      8) [NUEVO Fase 3] Vocabulario (modelo + interacción + panel + vista)
      9) Renderizado UI + Router
      10) Preferencias + Service Worker

      Limitaciones conocidas Fase 1:
      - Parser EPUB minimalista: soporta ZIP método Stored (0) y Deflate (8).
      - Algunos EPUB complejos pueden renderizar estilos/recursos de forma parcial.
      - Segmentación de frases heurística, prioriza robustez.
      - Fase 2 agrega tokenización y segmentación visual opcional.
      - Fase 3 agrega interacción con tokens, nivel 1..5 y persistencia de vocabulario (sin diccionario).
      - Fase 4 agrega diccionario offline, lecturas hiragana/romaji y definición personalizada del usuario.
    */

    // =========================
    // Config / constantes
    // =========================
    const DB_NAME = 'jp_epub_reader_db';
    const DB_VERSION = 4;
    const STORES = {
      books: 'books',
      bookFiles: 'bookFiles',
      progress: 'progress',
      settings: 'settings',
      vocabEntries: 'vocabEntries',
      dictionaryCache: 'dictionaryCache',
      dictionaryEntries: 'dictionaryEntries',
      dictionaryPacks: 'dictionaryPacks',
      dictionaryMeta: 'dictionaryMeta'
    };
    const SETTINGS_KEY = 'app_settings';
    const AZURE_TRANSLATOR_ENDPOINT = 'https://api.cognitive.microsofttranslator.com';
    const DEFAULT_GEMINI_MODEL = 'gemini-3.1-flash-lite-preview';
    const DEFAULT_GEMINI_PROMPT = 'Responde únicamente repitiendo la palabra + la palabra en hiragana entre parentesis + la definición en castellano ( por ej.  "仕方ない - しかたない  - No se puede evitar / No hay remedio"). La palabra a definir ahora es: ';
    const DEFAULT_SETTINGS = {
      theme: 'light',
      fontSize: 18,
      showSegmentation: false,
      tokenDebug: false,
      lastOpenedBookId: null,
      azureTranslateKey: '',
      azureTranslateRegion: '',
      geminiApiKey: '',
      geminiPrompt: DEFAULT_GEMINI_PROMPT,
      geminiModel: DEFAULT_GEMINI_MODEL
    };

    const state = {
      route: 'library',
      books: [],
      currentBook: null,
      currentBookId: null,
      currentSpineIndex: 0,
      currentSentenceIndex: 0,
      readingMode: 'page',
      sections: [],
      sectionSentencesCache: new Map(),
      sentenceTokenCache: new Map(),
      pageMapsCache: new Map(),
      pageSummariesCache: new Map(),
      flatSentenceEntriesCache: null,
      flatSentenceIndexLookupCache: null,
      settings: { ...DEFAULT_SETTINGS },
      vocabMap: new Map(),
      vocabDataVersion: 0,
      tokenSelection: {
        token: null,
        entry: null,
        draftLevel: null,
        dictionaryResult: null,
        userDefinitionDraft: '',
        isEditingUserDefinition: false
      },
      vocabFilters: {
        query: '',
        level: 'all'
      },
      vocabView: {
        initialized: false,
        cacheKey: '',
        filteredEntries: [],
        allEntriesCount: 0,
        renderedCount: 0,
        batchSize: 80,
        debounceTimer: null,
        pendingNotes: new Map(),
        loadMoreObserver: null,
        isLoadingMore: false
      },
      vocabSelection: null,
      dictionaryStatus: {
        loadedEntries: 0,
        packsCount: 0,
        lastImportedAt: null,
        importMessage: ''
      },
      translationConfigStatus: '',
      geminiConfigStatus: '',
      sentenceTranslation: {
        bookId: null,
        sectionIndex: null,
        sentenceIndex: null,
        status: 'idle',
        translatedText: '',
        error: ''
      }
    };

    // =========================
    // Utilidades generales
    // =========================
    const $ = (sel, root = document) => root.querySelector(sel);

    function touchVocabularyData() {
      state.vocabDataVersion += 1;
      state.vocabView.cacheKey = '';
    }

    function escapeHtml(str = '') {
      return str.replace(/[&<>"]/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m]));
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function uuid() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2)}`;
    }

    function normalizePath(path) {
      const parts = [];
      for (const part of path.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') parts.pop();
        else parts.push(part);
      }
      return parts.join('/');
    }

    function resolveHref(basePath, href) {
      if (!href) return '';
      if (/^[a-z]+:/i.test(href) || href.startsWith('/')) return href;
      const clean = href.split('#')[0].split('?')[0];
      const baseDir = basePath.includes('/') ? basePath.slice(0, basePath.lastIndexOf('/') + 1) : '';
      return normalizePath(baseDir + clean);
    }

    function uint8ToText(bytes, encoding = 'utf-8') {
      return new TextDecoder(encoding).decode(bytes);
    }

    function bytesToDataUrl(bytes, mime = 'application/octet-stream') {
      const blob = new Blob([bytes], { type: mime });
      return new Promise((resolve) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(blob);
      });
    }

    // =========================
    // Capa IndexedDB
    // =========================
    function openDatabase() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORES.books)) db.createObjectStore(STORES.books, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.bookFiles)) db.createObjectStore(STORES.bookFiles, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.progress)) db.createObjectStore(STORES.progress, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.settings)) db.createObjectStore(STORES.settings, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.vocabEntries)) {
            const vocabStore = db.createObjectStore(STORES.vocabEntries, { keyPath: 'id' });
            vocabStore.createIndex('vocabKey', 'vocabKey', { unique: true });
            vocabStore.createIndex('updatedAt', 'updatedAt', { unique: false });
            vocabStore.createIndex('familiarityLevel', 'familiarityLevel', { unique: false });
          }
          const vocabStore = req.transaction.objectStore(STORES.vocabEntries);
          if (!vocabStore.indexNames.contains('vocabKey')) vocabStore.createIndex('vocabKey', 'vocabKey', { unique: true });
          if (!vocabStore.indexNames.contains('updatedAt')) vocabStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          if (!vocabStore.indexNames.contains('familiarityLevel')) vocabStore.createIndex('familiarityLevel', 'familiarityLevel', { unique: false });
          if (!db.objectStoreNames.contains(STORES.dictionaryCache)) {
            const dictCacheStore = db.createObjectStore(STORES.dictionaryCache, { keyPath: 'lookupKey' });
            dictCacheStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          if (!db.objectStoreNames.contains(STORES.dictionaryEntries)) {
            const dictEntries = db.createObjectStore(STORES.dictionaryEntries, { keyPath: 'id' });
            dictEntries.createIndex('lemmaKey', 'lemmaKey', { unique: false });
            dictEntries.createIndex('surfaceKey', 'surfaceKey', { unique: false });
            dictEntries.createIndex('readingKey', 'readingKey', { unique: false });
            dictEntries.createIndex('packId', 'packId', { unique: false });
          }
          const dictionaryEntriesStore = req.transaction.objectStore(STORES.dictionaryEntries);
          if (!dictionaryEntriesStore.indexNames.contains('lemmaKey')) dictionaryEntriesStore.createIndex('lemmaKey', 'lemmaKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('surfaceKey')) dictionaryEntriesStore.createIndex('surfaceKey', 'surfaceKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('readingKey')) dictionaryEntriesStore.createIndex('readingKey', 'readingKey', { unique: false });
          if (!dictionaryEntriesStore.indexNames.contains('packId')) dictionaryEntriesStore.createIndex('packId', 'packId', { unique: false });
          if (!db.objectStoreNames.contains(STORES.dictionaryPacks)) {
            const packsStore = db.createObjectStore(STORES.dictionaryPacks, { keyPath: 'id' });
            packsStore.createIndex('updatedAt', 'updatedAt', { unique: false });
          }
          if (!db.objectStoreNames.contains(STORES.dictionaryMeta)) {
            db.createObjectStore(STORES.dictionaryMeta, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(storeName, value) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(value);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGet(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGetAll(storeName) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDelete(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGetByIndex(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).index(indexName).get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }


    async function dbGetAllByIndex(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).index(indexName).getAll(IDBKeyRange.only(key));
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDeleteWhereIndexEquals(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const index = tx.objectStore(storeName).index(indexName);
        const cursorReq = index.openCursor(IDBKeyRange.only(key));
        cursorReq.onsuccess = () => {
          const cursor = cursorReq.result;
          if (cursor) {
            cursor.delete();
            cursor.continue();
          }
        };
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function listBooks() {
      const books = await dbGetAll(STORES.books);
      return books.sort((a, b) => {
        const aLastAccess = a.lastOpenedAt ? new Date(a.lastOpenedAt).getTime() : 0;
        const bLastAccess = b.lastOpenedAt ? new Date(b.lastOpenedAt).getTime() : 0;
        if (bLastAccess !== aLastAccess) return bLastAccess - aLastAccess;
        return new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime();
      });
    }

    async function saveBook(book, fileBlob) {
      await dbPut(STORES.books, book);
      await dbPut(STORES.bookFiles, { bookId: book.id, epubBlob: fileBlob });
    }

    async function loadBookBlob(bookId) {
      const rec = await dbGet(STORES.bookFiles, bookId);
      return rec?.epubBlob || null;
    }

    async function deleteBook(bookId) {
      await dbDelete(STORES.books, bookId);
      await dbDelete(STORES.bookFiles, bookId);
      await dbDelete(STORES.progress, bookId);
    }

    async function saveReadingProgress(bookId, payload) {

    function getSentenceTranslationViewModel(location) {
      const translation = state.sentenceTranslation;
      const matches = Boolean(
        translation
        && translation.bookId
        && translation.bookId === state.currentBookId
        && Number(translation.sectionIndex) === Number(location?.sectionIndex)
        && Number(translation.sentenceIndex) === Number(location?.sentenceIndex)
      );
      if (!matches) return { visible: false, kind: 'empty', label: '', text: '' };
      if (translation.status === 'loading') {
        return { visible: true, kind: 'loading', label: '', text: 'Traduciendo…' };
      }
      if (translation.status === 'success') {
        return { visible: true, kind: 'success', label: '', text: translation.translatedText || '' };
      }
      if (translation.status === 'error') {
        return { visible: true, kind: 'error', label: '', text: translation.error || 'No se pudo traducir la oración.' };
      }
      return { visible: false, kind: 'empty', label: '', text: '' };

    async function translateSentenceWithAzure(textToTranslate) {
      const { key, region, endpoint } = getAzureTranslatorConfig();
      if (!key || !region) throw new Error('Configura tu clave y región en Traducciones antes de traducir.');
      const response = await fetch(`${endpoint}/translate?api-version=3.0&from=ja&to=es`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Ocp-Apim-Subscription-Key': key,
          'Ocp-Apim-Subscription-Region': region
        },
        body: JSON.stringify([{ Text: textToTranslate }])
      });
      let payload = null;
      const raw = await response.text();
      if (raw) {
        try { payload = JSON.parse(raw); } catch { payload = raw; }
      }
      if (!response.ok) {
        const message = typeof payload === 'string'
          ? payload
          : payload?.error?.message || payload?.message || `Error ${response.status} al traducir.`;
        throw new Error(message);
      }
      const translatedText = payload?.[0]?.translations?.[0]?.text || '';
      if (!translatedText) throw new Error('Azure no devolvió ninguna traducción.');
      return translatedText;
    }


    async function askGemini(promptText, options = {}) {
      const { apiKey, model } = getGeminiConfig();
      const normalizedModel = normalizeGeminiModel(model);
      if (!apiKey) throw new Error('Configura tu clave API en Gemini antes de usar esta función.');
      if (!normalizedModel) throw new Error('Configura un modelo válido en Gemini antes de usar esta función.');
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(normalizedModel)}:generateContent`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': apiKey
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                { text: promptText }
              ]
            }
          ]
        })
      });
      let payload = null;
      const raw = await response.text();
      if (raw) {
        try { payload = JSON.parse(raw); } catch { payload = raw; }
      }
      if (!response.ok) {
        const message = typeof payload === 'string'
          ? payload
          : payload?.error?.message || payload?.message || `Error ${response.status} al consultar Gemini.`;
        throw new Error(message);
      }
      const textParts = payload?.candidates?.[0]?.content?.parts
        ?.map((part) => typeof part?.text === 'string' ? part.text : '')
        .filter(Boolean)
        || [];
      const result = textParts.join('\n').trim();
      if (!result) throw new Error('Gemini no devolvió ningún texto.');
      if (options.returnPayload) return { text: result, payload };
      return result;
    }

    // =========================
    // Importación / EPUB minimal parser
    // =========================
    function readU16(view, offset) { return view.getUint16(offset, true); }
    function readU32(view, offset) { return view.getUint32(offset, true); }

    async function inflateDeflateRaw(bytes) {
      if (typeof DecompressionStream === 'undefined') {
        throw new Error('Tu navegador no soporta DecompressionStream (necesario para EPUB Deflate).');
      }
      const ds = new DecompressionStream('deflate-raw');
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    async function unzipEpub(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const view = new DataView(arrayBuffer);
      let eocdOffset = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 65557); i--) {
        if (readU32(view, i) === 0x06054b50) { eocdOffset = i; break; }
      }
      if (eocdOffset < 0) throw new Error('No se encontró EOCD de ZIP');

      const centralDirSize = readU32(view, eocdOffset + 12);
      const centralDirOffset = readU32(view, eocdOffset + 16);
      const entries = [];
      let ptr = centralDirOffset;
      const end = centralDirOffset + centralDirSize;

      while (ptr < end) {
        if (readU32(view, ptr) !== 0x02014b50) throw new Error('Cabecera central inválida');
        const compression = readU16(view, ptr + 10);
        const compressedSize = readU32(view, ptr + 20);
        const fileNameLen = readU16(view, ptr + 28);
        const extraLen = readU16(view, ptr + 30);
        const commentLen = readU16(view, ptr + 32);
        const localHeaderOffset = readU32(view, ptr + 42);
        const nameBytes = bytes.slice(ptr + 46, ptr + 46 + fileNameLen);
        const name = uint8ToText(nameBytes);
        entries.push({ name, compression, compressedSize, localHeaderOffset });
        ptr += 46 + fileNameLen + extraLen + commentLen;
      }

      const files = new Map();
      for (const entry of entries) {
        if (entry.name.endsWith('/')) continue;
        const lh = entry.localHeaderOffset;
        if (readU32(view, lh) !== 0x04034b50) continue;
        const nameLen = readU16(view, lh + 26);
        const extraLen = readU16(view, lh + 28);
        const dataStart = lh + 30 + nameLen + extraLen;
        const compBytes = bytes.slice(dataStart, dataStart + entry.compressedSize);
        let out;
        if (entry.compression === 0) out = compBytes;
        else if (entry.compression === 8) out = await inflateDeflateRaw(compBytes);
        else continue;
        files.set(normalizePath(entry.name), out);
      }
      return files;
    }

    function parseXml(xmlText) {
      return new DOMParser().parseFromString(xmlText, 'application/xml');
    }

    function parseXhtml(htmlText) {
      return new DOMParser().parseFromString(htmlText, 'text/html');
    }

    async function extractReadableSections(epubMap) {
      const containerBytes = epubMap.get('META-INF/container.xml');
      if (!containerBytes) throw new Error('EPUB inválido: falta META-INF/container.xml');
      const containerXml = parseXml(uint8ToText(containerBytes));
      const rootFile = containerXml.querySelector('rootfile')?.getAttribute('full-path');
      if (!rootFile) throw new Error('EPUB inválido: falta rootfile OPF');

      const opfPath = normalizePath(rootFile);
      const opfBytes = epubMap.get(opfPath);
      if (!opfBytes) throw new Error(`No se encontró OPF: ${opfPath}`);

      const opfXml = parseXml(uint8ToText(opfBytes));
      const title = opfXml.querySelector('metadata > title, metadata > dc\\:title')?.textContent?.trim() || 'Sin título';
      const author = opfXml.querySelector('metadata > creator, metadata > dc\\:creator')?.textContent?.trim() || 'Autor desconocido';

      const manifest = new Map();
      opfXml.querySelectorAll('manifest > item').forEach((item) => {
        manifest.set(item.getAttribute('id'), {
          href: item.getAttribute('href') || '',
          mediaType: item.getAttribute('media-type') || '',
          properties: item.getAttribute('properties') || ''
        });
      });

      const spineIds = [...opfXml.querySelectorAll('spine > itemref')].map((n) => n.getAttribute('idref')).filter(Boolean);
      const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

      let coverDataUrl = null;
      const coverMetaId = opfXml.querySelector('metadata > meta[name="cover"]')?.getAttribute('content');
      const coverManifestItem = coverMetaId ? manifest.get(coverMetaId) : [...manifest.values()].find((m) => (m.properties || '').includes('cover-image'));
      if (coverManifestItem?.href) {
        const coverPath = normalizePath(opfDir + coverManifestItem.href);
        const coverBytes = epubMap.get(coverPath);
        if (coverBytes) coverDataUrl = await bytesToDataUrl(coverBytes, coverManifestItem.mediaType || 'image/jpeg');
      }

      const sections = [];
      for (let i = 0; i < spineIds.length; i++) {
        const item = manifest.get(spineIds[i]);
        if (!item || !item.href) continue;
        const sectionPath = normalizePath(opfDir + item.href);
        const sectionBytes = epubMap.get(sectionPath);
        if (!sectionBytes) continue;
        const rawHtml = uint8ToText(sectionBytes);
        const doc = parseXhtml(rawHtml);
        const sectionTitle = doc.querySelector('title,h1,h2')?.textContent?.trim() || `Sección ${i + 1}`;
        sections.push({ index: i, path: sectionPath, title: sectionTitle, html: rawHtml });
      }

      return { title, author, coverDataUrl, sections };
    }

    async function importEpubFiles(fileList) {
      for (const file of fileList) {
        try {
          const buffer = await file.arrayBuffer();
          const epubMap = await unzipEpub(buffer);
          const meta = await extractReadableSections(epubMap);
          const now = new Date().toISOString();
          const book = {
            id: uuid(), fileName: file.name, title: meta.title, author: meta.author,
            cover: meta.coverDataUrl, sectionCount: meta.sections.length,
            createdAt: now, updatedAt: now, lastOpenedAt: null
          };
          await saveBook(book, file);
        } catch (err) {
          alert(`Error importando ${file.name}: ${err.message}`);
        }
      }
      await refreshBooks();
      renderLibraryView();
    }

    // =========================
    // Modo frase (heurística)
    // =========================
    function splitTextIntoSentences(text) {
      const normalized = String(text || '')
        .replace(/\r\n?/g, '\n')
        .replace(/\u3000/g, ' ')
        .trim();
      if (!normalized) return [];

      const sentenceList = [];
      const blocks = normalized
        .split(/\n{2,}/)
        .map((block) => block.replace(/[ \t]+/g, ' ').trim())
        .filter(Boolean);

      blocks.forEach((block) => {
        const paragraph = block
          .replace(/\n+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        const withBreaks = paragraph
          .replace(/([。！？!?])\s*/g, '$1\n');
        withBreaks
          .split('\n')
          .map((part) => part.trim())
          .filter(Boolean)
          .forEach((part) => sentenceList.push(part));
      });

      if (!sentenceList.length) {
        return [normalized.replace(/\s+/g, ' ').trim()];
      }
      return sentenceList;
    }

    function extractVisibleTextFromSection(html) {
      const doc = parseXhtml(html);
      doc.querySelectorAll('script,style,noscript').forEach((n) => n.remove());
      return doc.body?.innerText || doc.documentElement?.textContent || '';
    }

    function getSentencesForSection(section) {
      if (state.sectionSentencesCache.has(section.path)) return state.sectionSentencesCache.get(section.path);
      const text = extractVisibleTextFromSection(section.html);
      const sentences = splitTextIntoSentences(text);
      state.sectionSentencesCache.set(section.path, sentences);
      return sentences;
    }

    // =========================
    // [NUEVO Fase 2] Text normalization utilities
    // =========================
    const WORD_SEGMENTER = typeof Intl !== 'undefined' && Intl.Segmenter
      ? new Intl.Segmenter('ja', { granularity: 'word' })
      : null;

    function normalizeTokenSurface(text) {
      return (text || '').normalize('NFKC').replace(/\s+/g, ' ').trim();
    }

    function isJapaneseChar(char) {
      return /[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}]/u.test(char || '');
    }

    function isJapaneseText(text) {
      return [...(text || '')].some(isJapaneseChar);
    }

    function classifyToken(surface) {
      if (!surface) return 'empty';
      if (/^\s+$/u.test(surface)) return 'space';
      if (/^[\p{P}\p{S}]+$/u.test(surface)) return 'punct';
      if (/^\d+([.,]\d+)?$/u.test(surface)) return 'number';
      if (/^[A-Za-z]+$/u.test(surface)) return 'latin';
      return 'word';
    }

    // =========================
    // [NUEVO Fase 2] Japanese tokenization layer
    // =========================
    function tokenizeJapaneseText(text) {
      const source = text || '';
      if (!source) return [];
      if (WORD_SEGMENTER) {
        return [...WORD_SEGMENTER.segment(source)].map((seg) => ({
          surface: seg.segment,
          startOffset: seg.index,
          endOffset: seg.index + seg.segment.length,
          isWordLike: Boolean(seg.isWordLike)
        }));
      }
      // Fallback offline simple: separa espacios, puntuación y bloques de letras.
      const fallback = [];
      const pattern = /(\s+|[。、！？「」『』（）［］【】〈〉《》・…ー,.!?;:()[\]{}"'])/gu;
      let cursor = 0;
      for (const m of source.matchAll(pattern)) {
        const idx = m.index ?? 0;
        if (idx > cursor) {
          fallback.push({
            surface: source.slice(cursor, idx),
            startOffset: cursor,
            endOffset: idx,
            isWordLike: true
          });
        }
        fallback.push({
          surface: m[0],
          startOffset: idx,
          endOffset: idx + m[0].length,
          isWordLike: false
        });
        cursor = idx + m[0].length;
      }
      if (cursor < source.length) {
        fallback.push({
          surface: source.slice(cursor),
          startOffset: cursor,
          endOffset: source.length,
          isWordLike: true
        });
      }
      return fallback;
    }

    function buildTokenModel(rawToken, context) {
      const surface = rawToken.surface || '';
      const normalizedSurface = normalizeTokenSurface(surface);
      const tokenType = classifyToken(surface);
      const isJapanese = isJapaneseText(surface);
      const tokenIndex = context.tokenIndex;
      return {
        id: `${context.bookId || 'book'}_${context.sectionIndex}_${context.sentenceIndex}_${tokenIndex}`,
        surface,
        normalizedSurface,
        startOffset: rawToken.startOffset,
        endOffset: rawToken.endOffset,
        isJapanese,
        sectionIndex: context.sectionIndex,
        sentenceIndex: context.sentenceIndex,
        tokenIndex,
        tokenType,
        pos: tokenType,
        baseForm: normalizedSurface || surface,
        reading: null
      };
    }

    // =========================
    // [NUEVO Fase 2] Token cache / memoization + render layer
    // =========================
    function cacheTokenizationResult(cacheKey, payload) {
      state.sentenceTokenCache.set(cacheKey, payload);
      return payload;
    }

    function shouldTokenizeCurrentView() {
      return state.readingMode === 'sentence';
    }

    function getTokenizedSentence(bookId, sectionIndex, sentenceIndex) {
      const section = state.sections[sectionIndex];
      if (!section) return { sentence: '', tokens: [] };
      const sentences = getSentencesForSection(section);
      const sentence = sentences[sentenceIndex] || '';
      const cacheKey = `${bookId || 'book'}::${section.path}::${sentenceIndex}::${sentence}`;
      const cached = state.sentenceTokenCache.get(cacheKey);
      if (cached) return cached;

      const raw = tokenizeJapaneseText(sentence);
      const tokens = raw.map((tk, tokenIndex) => buildTokenModel(tk, {
        bookId,
        sectionIndex,
        sentenceIndex,
        tokenIndex
      }));
      return cacheTokenizationResult(cacheKey, { sentence, tokens });
    }

    function getTokenizedSection(bookId, sectionIndex) {
      const section = state.sections[sectionIndex];
      if (!section) return [];
      const sentences = getSentencesForSection(section);
      return sentences.map((_, sentenceIndex) => getTokenizedSentence(bookId, sectionIndex, sentenceIndex));
    }

    function getReaderPaginationContext() {
      const readerCard = $('.reader-card');
      const readerContent = $('.reader-content');
      const widthFromDom = Math.max((readerContent?.clientWidth || 0) - 8, 0);
      const widthFallback = Math.max(Math.min(window.innerWidth - 32, 720), 280);
      const stickyHeight = readerCard ? readerCard.getBoundingClientRect().height : 190;
      const pageHeight = Math.max(Math.round(window.innerHeight - stickyHeight - 42), 240);
      return {
        width: Math.round(widthFromDom || widthFallback),
        pageHeight,
        stickyHeight: Math.round(stickyHeight || 0)
      };
    }

    function getPaginationSignature(context = getReaderPaginationContext()) {
      return [
        state.currentBookId || 'book',
        state.settings.fontSize,
        state.settings.showSegmentation ? 1 : 0,
        context.width
      ].join('::');
    }

    function getPaginationCacheKey(sectionIndex, context = getReaderPaginationContext()) {
      const section = state.sections[Math.max(0, Number(sectionIndex) || 0)];
      return `${getPaginationSignature(context)}::${section?.path || sectionIndex || 0}`;
    }

    function getPaginationMeasureInner(context = getReaderPaginationContext()) {
      let host = document.getElementById('paginationMeasureHost');
      if (!host) {
        host = document.createElement('div');
        host.id = 'paginationMeasureHost';
        document.body.appendChild(host);
      }
      host.style.width = `${context.width}px`;
      host.innerHTML = `<div class="reader-content" style="width:${context.width}px;font-size:${state.settings.fontSize}px;--reader-font-size:${state.settings.fontSize}px;"><div class="reader-page-frame" style="--reader-page-height:${context.pageHeight}px;"><div class="page-mode-text" id="paginationMeasureInner"></div></div></div>`;
      return host.querySelector('#paginationMeasureInner');
    }

    function getFlatSentenceEntries(bookId = state.currentBookId) {
      const cached = state.flatSentenceEntriesCache;
      if (cached?.bookId === bookId && cached.entries) return cached.entries;
      const entries = [];
      state.sections.forEach((section, sectionIndex) => {
        const sentences = getSentencesForSection(section);
        sentences.forEach((_, sentenceIndex) => {
          entries.push({
            flatIndex: entries.length,
            sectionIndex,
            sentenceIndex
          });
        });
      });
      state.flatSentenceEntriesCache = { bookId, entries };
      state.flatSentenceIndexLookupCache = null;
      return entries;
    }

    function getFlatSentenceIndexLookup(bookId = state.currentBookId) {
      const cached = state.flatSentenceIndexLookupCache;
      if (cached?.bookId === bookId && cached.lookup) return cached.lookup;
      const lookup = new Map();
      getFlatSentenceEntries(bookId).forEach((entry, flatIndex) => {
        lookup.set(`${entry.sectionIndex}:${entry.sentenceIndex}`, flatIndex);
      });
      state.flatSentenceIndexLookupCache = { bookId, lookup };
      return lookup;
    }

    function getFlatSentenceIndexForLocation(sectionIndex, sentenceIndex, bookId = state.currentBookId) {
      const safeSectionIndex = Math.max(0, Math.min(Number(sectionIndex) || 0, Math.max(state.sections.length - 1, 0)));
      const sectionSentences = getSentencesForSection(state.sections[safeSectionIndex] || {});
      const safeSentenceIndex = Math.max(0, Math.min(Number(sentenceIndex) || 0, Math.max(sectionSentences.length - 1, 0)));
      const lookup = getFlatSentenceIndexLookup(bookId);
      const exact = lookup.get(`${safeSectionIndex}:${safeSentenceIndex}`);
      if (Number.isInteger(exact)) return exact;
      const fallback = lookup.get(`${safeSectionIndex}:0`);
      if (Number.isInteger(fallback)) return fallback;
      return 0;
    }

    function buildVirtualPageMap(sectionIndex, context = getReaderPaginationContext()) {
      const tokenizedSentences = getTokenizedSection(state.currentBookId, sectionIndex);
      if (!tokenizedSentences.length) {
        return [{ startSentence: 0, endSentence: 0 }];
      }

      const pages = [];
      const sentencesPerPage = 17;
      for (let pageStart = 0; pageStart < tokenizedSentences.length; pageStart += sentencesPerPage) {
        const endSentence = Math.min(pageStart + sentencesPerPage - 1, tokenizedSentences.length - 1);
        pages.push({ startSentence: pageStart, endSentence });
      }

      if (!pages.length) {
        pages.push({ startSentence: 0, endSentence: tokenizedSentences.length - 1 });
      }
      return pages;
    }

    function getPageMapForSection(sectionIndex, context = getReaderPaginationContext()) {
      const cacheKey = getPaginationCacheKey(sectionIndex, context);
      if (state.pageMapsCache.has(cacheKey)) return state.pageMapsCache.get(cacheKey);
      const pageMap = buildVirtualPageMap(sectionIndex, context);
      state.pageMapsCache.set(cacheKey, pageMap);
      return pageMap;
    }

    function getPaginationSummary(context = getReaderPaginationContext()) {
      const signature = getPaginationSignature(context);
      if (state.pageSummariesCache.has(signature)) return state.pageSummariesCache.get(signature);
      const sectionPageCounts = state.sections.map((_, sectionIndex) => getPageMapForSection(sectionIndex, context).length || 1);
      const summary = {
        signature,
        sectionPageCounts,
        totalPages: Math.max(sectionPageCounts.reduce((sum, count) => sum + count, 0), 1)
      };
      state.pageSummariesCache.set(signature, summary);
      return summary;
    }

    function findPageIndexForSentence(pageMap, sentenceIndex) {
      if (!pageMap?.length) return 0;
      const safeSentenceIndex = Math.max(0, Number(sentenceIndex) || 0);
      const found = pageMap.findIndex((page) => safeSentenceIndex >= page.startSentence && safeSentenceIndex <= page.endSentence);
      if (found >= 0) return found;
      if (safeSentenceIndex <= pageMap[0].startSentence) return 0;
      return pageMap.length - 1;
    }

    function getVirtualPageInfoForLocation(sectionIndex, sentenceIndex, context = getReaderPaginationContext()) {
      const summary = getPaginationSummary(context);
      const safeSectionIndex = Math.max(0, Math.min(Number(sectionIndex) || 0, Math.max(state.sections.length - 1, 0)));
      const pageMap = getPageMapForSection(safeSectionIndex, context);
      const sectionPageIndex = findPageIndexForSentence(pageMap, sentenceIndex);
      const page = pageMap[sectionPageIndex] || { startSentence: 0, endSentence: 0 };
      const pagesBefore = summary.sectionPageCounts.slice(0, safeSectionIndex).reduce((sum, count) => sum + count, 0);
      return {
        page,
        pageMap,
        sectionPageIndex,
        sectionPageCurrent: sectionPageIndex + 1,
        sectionPageTotal: Math.max(pageMap.length, 1),
        globalPageIndex: pagesBefore + sectionPageIndex,
        globalPageCurrent: pagesBefore + sectionPageIndex + 1,
        globalPageTotal: summary.totalPages,
        context
      };
    }

    function getCurrentVirtualPageInfo(context = getReaderPaginationContext()) {
      return getVirtualPageInfoForLocation(state.currentSpineIndex, state.currentSentenceIndex, context);
    }

    function locateGlobalPage(globalPageIndex, context = getReaderPaginationContext()) {
      const summary = getPaginationSummary(context);
      const targetIndex = Math.max(0, Math.min(Number(globalPageIndex) || 0, Math.max(summary.totalPages - 1, 0)));
      let remaining = targetIndex;
      for (let sectionIndex = 0; sectionIndex < state.sections.length; sectionIndex++) {
        const sectionPageCount = summary.sectionPageCounts[sectionIndex] || 1;
        if (remaining < sectionPageCount) {
          const pageMap = getPageMapForSection(sectionIndex, context);
          return {
            sectionIndex,
            pageIndex: remaining,
            page: pageMap[remaining] || { startSentence: 0, endSentence: 0 }
          };
        }
        remaining -= sectionPageCount;
      }
      const fallbackSectionIndex = Math.max(state.sections.length - 1, 0);
      const fallbackPageMap = getPageMapForSection(fallbackSectionIndex, context);
      const fallbackPageIndex = Math.max(fallbackPageMap.length - 1, 0);
      return {
        sectionIndex: fallbackSectionIndex,
        pageIndex: fallbackPageIndex,
        page: fallbackPageMap[fallbackPageIndex] || { startSentence: 0, endSentence: 0 }
      };
    }

    function goToGlobalPage(globalPageIndex, context = getReaderPaginationContext()) {
      const location = locateGlobalPage(globalPageIndex, context);
      state.currentSpineIndex = location.sectionIndex;
      state.currentSentenceIndex = Math.max(0, location.page.startSentence || 0);
    }

    function renderTokenizedVirtualPage(bookId, sectionIndex, sentenceIndex = 0, context = getReaderPaginationContext(), options = {}) {
      const tokenizedSentences = getTokenizedSection(bookId, sectionIndex);
      if (!tokenizedSentences.length) return '<p class="status">Sin texto legible en esta sección.</p>';
      const footerPageInfo = getVirtualPageInfoForLocation(sectionIndex, sentenceIndex, context);
      const page = footerPageInfo.page;
      const visibleSentences = tokenizedSentences.slice(page.startSentence, page.endSentence + 1);
      const activeSentenceIndex = Number.isInteger(options.activeSentenceIndex) ? options.activeSentenceIndex : null;
      return `<div class="reader-page-frame" style="--reader-page-height:${context.pageHeight}px;"><div class="page-mode-text">${visibleSentences.map((payload, offset) => {
        const realSentenceIndex = page.startSentence + offset;
        const isCurrentSentence = activeSentenceIndex !== null && realSentenceIndex === activeSentenceIndex;
        return `<p class="page-sentence ${isCurrentSentence ? 'current-sentence' : ''}" data-section-index="${sectionIndex}" data-sentence-index="${realSentenceIndex}">${renderSegmentedSentence(payload, { segmented: state.settings.showSegmentation })}</p>`;
      }).join('')}</div><div class="reader-page-footer">Pg ${footerPageInfo.globalPageCurrent}/${footerPageInfo.globalPageTotal}</div></div>`;
    }

    function alignPageModeToCurrentSentence() {
      const readerContentWrap = $('.reader-content-wrap');
      if (!readerContentWrap) return;
      const stickyHeader = $('.reader-card');
      const stickyHeight = stickyHeader ? stickyHeader.getBoundingClientRect().height : 0;
      const topPadding = 10;
      const targetTop = window.scrollY + readerContentWrap.getBoundingClientRect().top - stickyHeight - topPadding;
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'auto' });
    }

    function syncCurrentSentenceFromToken(token) {
      if (!Number.isInteger(token?.sentenceIndex)) return;
      if (Number.isInteger(token?.sectionIndex)) {
        state.currentSpineIndex = Math.max(0, Math.min(token.sectionIndex, Math.max(state.sections.length - 1, 0)));
      }
      const sectionSentences = getSentencesForSection(state.sections[state.currentSpineIndex] || {});
      const cap = Math.max(sectionSentences.length - 1, 0);
      state.currentSentenceIndex = Math.max(0, Math.min(token.sentenceIndex, cap));
    }


    function attachTokenMetadata(token) {
      const debug = `${token.pos}${token.baseForm ? ` · ${token.baseForm}` : ''}`;
      const interactive = isInteractiveToken(token);
      const identity = interactive ? getTokenIdentity(token) : null;
      const storedLevel = identity ? state.vocabMap.get(identity.vocabKey)?.familiarityLevel : null;
      const knownLevel = getEffectiveFamiliarityLevel(storedLevel);
      const learningClass = knownLevel === 1 ? 'known-learning' : '';
      const unknownClass = interactive && !knownLevel ? 'unknown-word' : '';
      return [
        `class="token ${token.isJapanese ? 'jp' : ''} ${token.pos === 'punct' ? 'punct' : ''} ${interactive ? 'clickable' : ''} ${learningClass} ${unknownClass} ${knownLevel ? `known-level-${knownLevel}` : ''} ${state.settings.tokenDebug ? 'dbg' : ''}"`,
        `data-token-id="${escapeHtml(token.id)}"`,
        `data-section-index="${token.sectionIndex}"`,
        `data-sentence-index="${token.sentenceIndex}"`,
        `data-token-index="${token.tokenIndex}"`,
        `data-interactive="${interactive ? '1' : '0'}"`,
        identity ? `data-vocab-key="${escapeHtml(identity.vocabKey)}"` : '',
        `data-surface="${escapeHtml(token.surface)}"`,
        `data-base-form="${escapeHtml(token.baseForm || '')}"`,
        `data-pos="${escapeHtml(token.pos || '')}"`,
        state.settings.tokenDebug ? `data-debug="${escapeHtml(debug)}"` : ''
      ].filter(Boolean).join(' ');
    }

    function renderSentenceTokens(tokens, options = {}) {
      const { segmented = false } = options;
      return `<div class="segmented-line ${segmented ? '' : 'compact'}">${
        tokens.map((token) => `<span ${renderTokenWithKnowledgeState(token)}>${escapeHtml(token.surface)}</span>`).join('')
      }</div>`;
    }

    function renderSegmentedSentence(payload, options = {}) {
      if (!payload?.tokens?.length) return escapeHtml(payload?.sentence || '');
      return renderSentenceTokens(payload.tokens, options);
    }

    // =========================
    // [NUEVO Fase 3] Vocabulary data model / deduplicación
    // =========================
    function isInteractiveToken(token) {
      if (!token) return false;
      if (!token.isJapanese) return false;
      if (!token.normalizedSurface) return false;
      return token.tokenType !== 'punct' && token.tokenType !== 'space' && token.tokenType !== 'empty';
    }

    function buildVocabKey(token) {
      // Estrategia Fase 3: preferir lemma/baseForm (si hay), fallback a normalizedSurface.
      // Fase 4 podrá refinar usando datos léxicos más ricos.
      const lemma = normalizeTokenSurface(token?.baseForm || '');
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const normalizedKey = lemma || normalizedSurface;
      return normalizedKey ? `jp:${normalizedKey}` : '';
    }

    function getTokenIdentity(token) {
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const vocabKey = buildVocabKey(token);
      return { vocabKey, normalizedKey: vocabKey.replace(/^jp:/, ''), normalizedSurface };
    }

    async function loadVocabularyMap() {
      const entries = await dbGetAll(STORES.vocabEntries);
      state.vocabMap = new Map(entries.map((entry) => [entry.vocabKey, entry]));
      touchVocabularyData();
      return state.vocabMap;
    }

    async function loadVocabEntryByKey(key) {
      if (!key) return null;
      if (state.vocabMap.has(key)) return state.vocabMap.get(key);
      const entry = await dbGetByIndex(STORES.vocabEntries, 'vocabKey', key);
      if (entry) {
        state.vocabMap.set(key, entry);
        touchVocabularyData();
      }
      return entry;
    }

    async function upsertVocabEntryFromToken(token, context = {}) {
      const identity = getTokenIdentity(token);
      if (!identity.vocabKey) return null;
      const now = new Date().toISOString();
      const existing = await loadVocabEntryByKey(identity.vocabKey);
      const sourceBookIds = new Set(existing?.sourceBookIds || []);
      if (context.bookId) sourceBookIds.add(context.bookId);
      const entry = {
        id: existing?.id || uuid(),
        vocabKey: identity.vocabKey,
        normalizedKey: identity.normalizedKey,
        surface: token.surface || existing?.surface || identity.normalizedSurface,
        lemma: token.baseForm || existing?.lemma || null,
        reading: token.reading || existing?.reading || null,
        readingKana: existing?.readingKana || convertReadingToHiragana(token.reading || existing?.reading || null),
        readingRomaji: existing?.readingRomaji || convertReadingToRomaji(token.reading || existing?.reading || null),
        pos: token.pos || existing?.pos || null,
        defaultDefinition: existing?.defaultDefinition || null,
        meanings: existing?.meanings || [],
        userDefinition: existing?.userDefinition || null,
        dictionarySource: existing?.dictionarySource || null,
        enrichedAt: existing?.enrichedAt || null,
        familiarityLevel: existing?.familiarityLevel ?? null,
        firstSeenAt: existing?.firstSeenAt || now,
        lastSeenAt: now,
        timesClicked: (existing?.timesClicked || 0) + 1,
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        sourceBookIds: [...sourceBookIds]
      };
      await dbPut(STORES.vocabEntries, entry);
      state.vocabMap.set(entry.vocabKey, entry);
      touchVocabularyData();
      return entry;
    }

    async function setTokenFamiliarity(vocabKey, level) {
      const existing = await loadVocabEntryByKey(vocabKey);
      if (!existing) return null;
      const next = {
        ...existing,
        familiarityLevel: level == null ? null : Number(level),
        updatedAt: new Date().toISOString()
      };
      await dbPut(STORES.vocabEntries, next);
      state.vocabMap.set(next.vocabKey, next);
      touchVocabularyData();
      return next;
    }

    function getEffectiveFamiliarityLevel(level) {
      const numericLevel = Number(level);
      if (!Number.isFinite(numericLevel) || numericLevel <= 0) return null;
      if (numericLevel > 3) return 5;
      return numericLevel;
    }

    // =========================
    // [NUEVO Fase 3] Token interaction + panel + familiarity rendering
    // =========================
    function closeTokenPanel() {
      state.tokenSelection = { token: null, entry: null, draftLevel: null, dictionaryResult: null, userDefinitionDraft: '', isEditingUserDefinition: false };
      const host = $('#tokenPanelHost');
      if (host) host.innerHTML = '';
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.remove('with-panel');
    }

    function renderTokenWithKnowledgeState(token) {
      return attachTokenMetadata(token);
    }

    async function copyTextToClipboard(text) {
      const plainText = String(text ?? '');
      if (!plainText) return false;
      try {
        await navigator.clipboard.writeText(plainText);
        return true;
      } catch (err) {
        const textarea = document.createElement('textarea');
        textarea.value = plainText;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(textarea);
        return ok;
      }
    }

    function showCopyFeedback(button) {
      if (!button) return;
      const originalLabel = button.dataset.copyOriginalLabel || button.textContent || '⧉';
      button.dataset.copyOriginalLabel = originalLabel;
      button.classList.add('is-copied');
      button.textContent = '✓';
      window.setTimeout(() => {
        button.classList.remove('is-copied');
        button.textContent = originalLabel;
      }, 650);
    }

            <div class="token-panel-section">

                  <div class="custom-definition-input-row">

                    </span>

                </div>
                ${hasUserDefinition ? `
                  <div class="v custom-definition-row">
                    <span class="custom-definition-actions">
                      <button id="editUserDefinitionBtn" class="icon-btn" title="Editar nota personal">✎</button>
                      <button id="deleteUserDefinitionBtn" class="icon-btn" title="Borrar nota personal">🗑</button>
                    </span>
                    <span>${escapeHtml(entry.userDefinition)}</span>
                  </div>
                ` : ''}
              </div>

          </div>
          <div class="external-links-row">

      `;
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.add('with-panel');
      host.querySelectorAll('[data-level]').forEach((btn) => btn.addEventListener('click', async () => {
        const rawLevel = btn.dataset.level;
        const level = rawLevel ? Number(rawLevel) : null;
        const updated = await setTokenFamiliarity(entry.vocabKey, level);
        if (!updated) return;
        state.tokenSelection.entry = updated;
        state.tokenSelection.draftLevel = updated.familiarityLevel;
        applyFamiliarityStyles(updated.vocabKey, updated.familiarityLevel);
        closeTokenPanel();
      }));
      const userDefinitionInput = $('#userDefinitionInput');
      const autoGrowUserDefinitionInput = () => {
        if (!userDefinitionInput) return;
        userDefinitionInput.style.height = 'auto';
        userDefinitionInput.style.height = `${userDefinitionInput.scrollHeight}px`;
      };
      autoGrowUserDefinitionInput();
      userDefinitionInput?.addEventListener('input', (e) => {
        state.tokenSelection.userDefinitionDraft = e.target.value || '';
        autoGrowUserDefinitionInput();
      });
      $('#saveUserDefinitionBtn')?.addEventListener('click', async () => {
        const text = $('#userDefinitionInput')?.value || '';
        let updated = await updateUserDefinition(entry.vocabKey, text);
        if (!updated) return;
        if (text.trim() && getEffectiveFamiliarityLevel(updated.familiarityLevel) == null) {
          updated = await setTokenFamiliarity(entry.vocabKey, 1) || updated;
          applyFamiliarityStyles(updated.vocabKey, updated.familiarityLevel);
        }
        state.tokenSelection.entry = updated;
        state.tokenSelection.draftLevel = updated.familiarityLevel;

            actionBtn.disabled = false;

      });

        const updated = await updateUserDefinition(entry.vocabKey, '');
        if (!updated) return;
        state.tokenSelection.entry = updated;
        state.tokenSelection.userDefinitionDraft = '';
        state.tokenSelection.isEditingUserDefinition = true;
        renderTokenPanel();
      });
      $('#askChatgptBtn')?.addEventListener('click', () => {
