<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JP EPUB Reader - Fase 3</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1f2430;
      --muted: #5f6b7a;
      --primary: #2563eb;
      --danger: #dc2626;
      --border: #dbe2ea;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --primary: #60a5fa;
      --danger: #f87171;
      --border: #374151;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }
    .app { max-width: 980px; margin: 0 auto; padding: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .spacer { flex: 1; }
    button, select, input[type="range"] {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font: inherit;
    }
    button.primary { background: var(--primary); color: white; border-color: transparent; }
    button.danger { color: white; background: var(--danger); border-color: transparent; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
    .book-item { display: grid; grid-template-columns: 72px 1fr; gap: 12px; align-items: start; }
    .cover { width: 72px; height: 96px; border: 1px solid var(--border); border-radius: 8px; object-fit: cover; background: #cbd5e1; }
    .book-title { margin: 0 0 4px; font-size: 1rem; }
    .meta { margin: 2px 0; color: var(--muted); font-size: 0.85rem; }
    .empty { text-align: center; padding: 32px 12px; color: var(--muted); }
    .reader-shell { display: grid; gap: 10px; }
    .reader-content {
      min-height: 58vh;
      max-height: 65vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: var(--surface);
      line-height: 1.8;
    }
    .reader-content iframe { width: 100%; min-height: 56vh; border: 0; }
    .sentence-box { font-size: 1.35em; line-height: 1.9; white-space: pre-wrap; }
    .segmented-line {
      display: flex;
      flex-wrap: wrap;
      gap: 0.12em;
      align-items: baseline;
    }
    .segmented-line.compact { gap: 0; }
    .token {
      border-radius: 4px;
      padding: 0 0.05em;
      border-bottom: 1px solid transparent;
    }
    .token.clickable { cursor: pointer; }
    .token.jp { border-bottom-color: color-mix(in srgb, var(--primary) 40%, transparent); }
    .token.punct { opacity: 0.9; }
    .segmented-line.compact .token { padding: 0; border-bottom-color: transparent; }
    .token.known-level-1 { border-bottom-color: color-mix(in srgb, #ef4444 45%, transparent); }
    .token.known-level-2 { border-bottom-color: color-mix(in srgb, #f97316 45%, transparent); }
    .token.known-level-3 { border-bottom-color: color-mix(in srgb, #f59e0b 45%, transparent); }
    .token.known-level-4 { border-bottom-color: color-mix(in srgb, #22c55e 45%, transparent); }
    .token.known-level-5 { border-bottom-color: color-mix(in srgb, #16a34a 65%, transparent); }
    .reader-content.with-panel { position: relative; padding-bottom: 220px; }
    .token-panel {
      position: sticky;
      bottom: 0;
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      z-index: 3;
    }
    .token-panel h3 { margin: 0 0 10px; font-size: 1rem; }
    .token-grid { display: grid; gap: 6px; grid-template-columns: minmax(120px, 170px) 1fr; }
    .token-grid .k { color: var(--muted); font-size: 0.9rem; }
    .token-grid .v { font-weight: 500; word-break: break-word; }
    .level-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .level-btn { min-width: 42px; padding: 6px 10px; border-radius: 999px; }
    .level-btn.active { background: var(--primary); color: #fff; border-color: transparent; }
    .vocab-list { display: grid; gap: 10px; }
    .vocab-item { border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: var(--surface); }
    .vocab-main { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .badge { border: 1px solid var(--border); border-radius: 999px; font-size: 0.78rem; padding: 2px 8px; color: var(--muted); }
    .badge.level { color: var(--text); }
    .token.dbg::after {
      content: attr(data-debug);
      display: block;
      font-size: 0.62rem;
      line-height: 1.2;
      color: var(--muted);
      margin-top: 0.06rem;
      text-align: center;
    }
    .status { color: var(--muted); font-size: 0.9rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app" class="app"></div>

  <script>
    /*
      JP EPUB Reader - Fase 3 (offline-first)
      Arquitectura (todo autocontenido en este archivo):
      1) Config / constantes
      2) Utilidades generales
      3) Capa IndexedDB
      4) Importación y almacenamiento de EPUB
      5) Extracción de metadatos
      6) Lógica del lector (modo página + modo frase)
      7) [NUEVO Fase 2] Normalización + tokenización japonesa + render de tokens
      8) [NUEVO Fase 3] Vocabulario (modelo + interacción + panel + vista)
      9) Renderizado UI + Router
      10) Preferencias + Service Worker

      Limitaciones conocidas Fase 1:
      - Parser EPUB minimalista: soporta ZIP método Stored (0) y Deflate (8).
      - Algunos EPUB complejos pueden renderizar estilos/recursos de forma parcial.
      - Segmentación de frases heurística, prioriza robustez.
      - Fase 2 agrega tokenización y segmentación visual opcional.
      - Fase 3 agrega interacción con tokens, nivel 1..5 y persistencia de vocabulario (sin diccionario).
    */

    // =========================
    // Config / constantes
    // =========================
    const DB_NAME = 'jp_epub_reader_db';
    const DB_VERSION = 2;
    const STORES = {
      books: 'books',
      bookFiles: 'bookFiles',
      progress: 'progress',
      settings: 'settings',
      vocabEntries: 'vocabEntries'
    };
    const SETTINGS_KEY = 'app_settings';
    const DEFAULT_SETTINGS = {
      theme: 'light',
      fontSize: 18,
      showSegmentation: false,
      tokenDebug: false,
      lastOpenedBookId: null
    };

    const state = {
      route: 'library',
      books: [],
      currentBook: null,
      currentBookId: null,
      currentSpineIndex: 0,
      currentSentenceIndex: 0,
      readingMode: 'page',
      sections: [],
      sectionSentencesCache: new Map(),
      sentenceTokenCache: new Map(),
      settings: { ...DEFAULT_SETTINGS },
      vocabMap: new Map(),
      tokenSelection: {
        token: null,
        entry: null,
        draftLevel: null
      },
      vocabFilters: {
        query: '',
        level: 'all'
      }
    };

    // =========================
    // Utilidades generales
    // =========================
    const $ = (sel, root = document) => root.querySelector(sel);

    function escapeHtml(str = '') {
      return str.replace(/[&<>"]/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m]));
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function uuid() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2)}`;
    }

    function normalizePath(path) {
      const parts = [];
      for (const part of path.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') parts.pop();
        else parts.push(part);
      }
      return parts.join('/');
    }

    function resolveHref(basePath, href) {
      if (!href) return '';
      if (/^[a-z]+:/i.test(href) || href.startsWith('/')) return href;
      const clean = href.split('#')[0].split('?')[0];
      const baseDir = basePath.includes('/') ? basePath.slice(0, basePath.lastIndexOf('/') + 1) : '';
      return normalizePath(baseDir + clean);
    }

    function uint8ToText(bytes, encoding = 'utf-8') {
      return new TextDecoder(encoding).decode(bytes);
    }

    function bytesToDataUrl(bytes, mime = 'application/octet-stream') {
      const blob = new Blob([bytes], { type: mime });
      return new Promise((resolve) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(blob);
      });
    }

    // =========================
    // Capa IndexedDB
    // =========================
    function openDatabase() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORES.books)) db.createObjectStore(STORES.books, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.bookFiles)) db.createObjectStore(STORES.bookFiles, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.progress)) db.createObjectStore(STORES.progress, { keyPath: 'bookId' });
          if (!db.objectStoreNames.contains(STORES.settings)) db.createObjectStore(STORES.settings, { keyPath: 'id' });
          if (!db.objectStoreNames.contains(STORES.vocabEntries)) {
            const vocabStore = db.createObjectStore(STORES.vocabEntries, { keyPath: 'id' });
            vocabStore.createIndex('vocabKey', 'vocabKey', { unique: true });
            vocabStore.createIndex('updatedAt', 'updatedAt', { unique: false });
            vocabStore.createIndex('familiarityLevel', 'familiarityLevel', { unique: false });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(storeName, value) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(value);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGet(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbGetAll(storeName) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbDelete(storeName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbGetByIndex(storeName, indexName, key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).index(indexName).get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function listBooks() {
      const books = await dbGetAll(STORES.books);
      return books.sort((a,b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));
    }

    async function saveBook(book, fileBlob) {
      await dbPut(STORES.books, book);
      await dbPut(STORES.bookFiles, { bookId: book.id, epubBlob: fileBlob });
    }

    async function loadBookBlob(bookId) {
      const rec = await dbGet(STORES.bookFiles, bookId);
      return rec?.epubBlob || null;
    }

    async function deleteBook(bookId) {
      await dbDelete(STORES.books, bookId);
      await dbDelete(STORES.bookFiles, bookId);
      await dbDelete(STORES.progress, bookId);
    }

    async function saveReadingProgress(bookId, payload) {
      await dbPut(STORES.progress, { bookId, updatedAt: new Date().toISOString(), ...payload });
    }

    async function loadReadingProgress(bookId) {
      return (await dbGet(STORES.progress, bookId)) || null;
    }

    async function loadSettings() {
      const rec = await dbGet(STORES.settings, SETTINGS_KEY);
      state.settings = { ...DEFAULT_SETTINGS, ...(rec?.value || {}) };
      applyTheme(state.settings.theme);
    }

    async function saveSettings(next) {
      state.settings = { ...state.settings, ...next };
      await dbPut(STORES.settings, { id: SETTINGS_KEY, value: state.settings });
      applyTheme(state.settings.theme);
    }

    // =========================
    // Importación / EPUB minimal parser
    // =========================
    function readU16(view, offset) { return view.getUint16(offset, true); }
    function readU32(view, offset) { return view.getUint32(offset, true); }

    async function inflateDeflateRaw(bytes) {
      if (typeof DecompressionStream === 'undefined') {
        throw new Error('Tu navegador no soporta DecompressionStream (necesario para EPUB Deflate).');
      }
      const ds = new DecompressionStream('deflate-raw');
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    async function unzipEpub(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const view = new DataView(arrayBuffer);
      let eocdOffset = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 65557); i--) {
        if (readU32(view, i) === 0x06054b50) { eocdOffset = i; break; }
      }
      if (eocdOffset < 0) throw new Error('No se encontró EOCD de ZIP');

      const centralDirSize = readU32(view, eocdOffset + 12);
      const centralDirOffset = readU32(view, eocdOffset + 16);
      const entries = [];
      let ptr = centralDirOffset;
      const end = centralDirOffset + centralDirSize;

      while (ptr < end) {
        if (readU32(view, ptr) !== 0x02014b50) throw new Error('Cabecera central inválida');
        const compression = readU16(view, ptr + 10);
        const compressedSize = readU32(view, ptr + 20);
        const fileNameLen = readU16(view, ptr + 28);
        const extraLen = readU16(view, ptr + 30);
        const commentLen = readU16(view, ptr + 32);
        const localHeaderOffset = readU32(view, ptr + 42);
        const nameBytes = bytes.slice(ptr + 46, ptr + 46 + fileNameLen);
        const name = uint8ToText(nameBytes);
        entries.push({ name, compression, compressedSize, localHeaderOffset });
        ptr += 46 + fileNameLen + extraLen + commentLen;
      }

      const files = new Map();
      for (const entry of entries) {
        if (entry.name.endsWith('/')) continue;
        const lh = entry.localHeaderOffset;
        if (readU32(view, lh) !== 0x04034b50) continue;
        const nameLen = readU16(view, lh + 26);
        const extraLen = readU16(view, lh + 28);
        const dataStart = lh + 30 + nameLen + extraLen;
        const compBytes = bytes.slice(dataStart, dataStart + entry.compressedSize);
        let out;
        if (entry.compression === 0) out = compBytes;
        else if (entry.compression === 8) out = await inflateDeflateRaw(compBytes);
        else continue;
        files.set(normalizePath(entry.name), out);
      }
      return files;
    }

    function parseXml(xmlText) {
      return new DOMParser().parseFromString(xmlText, 'application/xml');
    }

    function parseXhtml(htmlText) {
      return new DOMParser().parseFromString(htmlText, 'text/html');
    }

    async function extractReadableSections(epubMap) {
      const containerBytes = epubMap.get('META-INF/container.xml');
      if (!containerBytes) throw new Error('EPUB inválido: falta META-INF/container.xml');
      const containerXml = parseXml(uint8ToText(containerBytes));
      const rootFile = containerXml.querySelector('rootfile')?.getAttribute('full-path');
      if (!rootFile) throw new Error('EPUB inválido: falta rootfile OPF');

      const opfPath = normalizePath(rootFile);
      const opfBytes = epubMap.get(opfPath);
      if (!opfBytes) throw new Error(`No se encontró OPF: ${opfPath}`);

      const opfXml = parseXml(uint8ToText(opfBytes));
      const title = opfXml.querySelector('metadata > title, metadata > dc\\:title')?.textContent?.trim() || 'Sin título';
      const author = opfXml.querySelector('metadata > creator, metadata > dc\\:creator')?.textContent?.trim() || 'Autor desconocido';

      const manifest = new Map();
      opfXml.querySelectorAll('manifest > item').forEach((item) => {
        manifest.set(item.getAttribute('id'), {
          href: item.getAttribute('href') || '',
          mediaType: item.getAttribute('media-type') || '',
          properties: item.getAttribute('properties') || ''
        });
      });

      const spineIds = [...opfXml.querySelectorAll('spine > itemref')].map((n) => n.getAttribute('idref')).filter(Boolean);
      const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

      let coverDataUrl = null;
      const coverMetaId = opfXml.querySelector('metadata > meta[name="cover"]')?.getAttribute('content');
      const coverManifestItem = coverMetaId ? manifest.get(coverMetaId) : [...manifest.values()].find((m) => (m.properties || '').includes('cover-image'));
      if (coverManifestItem?.href) {
        const coverPath = normalizePath(opfDir + coverManifestItem.href);
        const coverBytes = epubMap.get(coverPath);
        if (coverBytes) coverDataUrl = await bytesToDataUrl(coverBytes, coverManifestItem.mediaType || 'image/jpeg');
      }

      const sections = [];
      for (let i = 0; i < spineIds.length; i++) {
        const item = manifest.get(spineIds[i]);
        if (!item || !item.href) continue;
        const sectionPath = normalizePath(opfDir + item.href);
        const sectionBytes = epubMap.get(sectionPath);
        if (!sectionBytes) continue;
        const rawHtml = uint8ToText(sectionBytes);
        const doc = parseXhtml(rawHtml);
        const sectionTitle = doc.querySelector('title,h1,h2')?.textContent?.trim() || `Sección ${i + 1}`;
        sections.push({ index: i, path: sectionPath, title: sectionTitle, html: rawHtml });
      }

      return { title, author, coverDataUrl, sections };
    }

    async function importEpubFiles(fileList) {
      for (const file of fileList) {
        try {
          const buffer = await file.arrayBuffer();
          const epubMap = await unzipEpub(buffer);
          const meta = await extractReadableSections(epubMap);
          const now = new Date().toISOString();
          const book = {
            id: uuid(), fileName: file.name, title: meta.title, author: meta.author,
            cover: meta.coverDataUrl, createdAt: now, updatedAt: now, lastOpenedAt: null
          };
          await saveBook(book, file);
        } catch (err) {
          alert(`Error importando ${file.name}: ${err.message}`);
        }
      }
      await refreshBooks();
      renderLibraryView();
    }

    // =========================
    // Modo frase (heurística)
    // =========================
    function splitTextIntoSentences(text) {
      const cleaned = (text || '').replace(/\s+/g, ' ').replace(/\u3000/g, ' ').trim();
      if (!cleaned) return [];
      const rough = cleaned
        .replace(/([。！？!?])\s*/g, '$1\n')
        .replace(/\n+/g, '\n')
        .split('\n')
        .map((s) => s.trim())
        .filter(Boolean);
      return rough.length ? rough : [cleaned];
    }

    function extractVisibleTextFromSection(html) {
      const doc = parseXhtml(html);
      doc.querySelectorAll('script,style,noscript').forEach((n) => n.remove());
      return doc.body?.innerText || doc.documentElement?.textContent || '';
    }

    function getSentencesForSection(section) {
      if (state.sectionSentencesCache.has(section.path)) return state.sectionSentencesCache.get(section.path);
      const text = extractVisibleTextFromSection(section.html);
      const sentences = splitTextIntoSentences(text);
      state.sectionSentencesCache.set(section.path, sentences);
      return sentences;
    }

    // =========================
    // [NUEVO Fase 2] Text normalization utilities
    // =========================
    const WORD_SEGMENTER = typeof Intl !== 'undefined' && Intl.Segmenter
      ? new Intl.Segmenter('ja', { granularity: 'word' })
      : null;

    function normalizeTokenSurface(text) {
      return (text || '').normalize('NFKC').replace(/\s+/g, ' ').trim();
    }

    function isJapaneseChar(char) {
      return /[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}]/u.test(char || '');
    }

    function isJapaneseText(text) {
      return [...(text || '')].some(isJapaneseChar);
    }

    function classifyToken(surface) {
      if (!surface) return 'empty';
      if (/^\s+$/u.test(surface)) return 'space';
      if (/^[\p{P}\p{S}]+$/u.test(surface)) return 'punct';
      if (/^\d+([.,]\d+)?$/u.test(surface)) return 'number';
      if (/^[A-Za-z]+$/u.test(surface)) return 'latin';
      return 'word';
    }

    // =========================
    // [NUEVO Fase 2] Japanese tokenization layer
    // =========================
    function tokenizeJapaneseText(text) {
      const source = text || '';
      if (!source) return [];
      if (WORD_SEGMENTER) {
        return [...WORD_SEGMENTER.segment(source)].map((seg) => ({
          surface: seg.segment,
          startOffset: seg.index,
          endOffset: seg.index + seg.segment.length,
          isWordLike: Boolean(seg.isWordLike)
        }));
      }
      // Fallback offline simple: separa espacios, puntuación y bloques de letras.
      const fallback = [];
      const pattern = /(\s+|[。、！？「」『』（）［］【】〈〉《》・…ー,.!?;:()[\]{}"'])/gu;
      let cursor = 0;
      for (const m of source.matchAll(pattern)) {
        const idx = m.index ?? 0;
        if (idx > cursor) {
          fallback.push({
            surface: source.slice(cursor, idx),
            startOffset: cursor,
            endOffset: idx,
            isWordLike: true
          });
        }
        fallback.push({
          surface: m[0],
          startOffset: idx,
          endOffset: idx + m[0].length,
          isWordLike: false
        });
        cursor = idx + m[0].length;
      }
      if (cursor < source.length) {
        fallback.push({
          surface: source.slice(cursor),
          startOffset: cursor,
          endOffset: source.length,
          isWordLike: true
        });
      }
      return fallback;
    }

    function buildTokenModel(rawToken, context) {
      const surface = rawToken.surface || '';
      const normalizedSurface = normalizeTokenSurface(surface);
      const tokenType = classifyToken(surface);
      const isJapanese = isJapaneseText(surface);
      const tokenIndex = context.tokenIndex;
      return {
        id: `${context.bookId || 'book'}_${context.sectionIndex}_${context.sentenceIndex}_${tokenIndex}`,
        surface,
        normalizedSurface,
        startOffset: rawToken.startOffset,
        endOffset: rawToken.endOffset,
        isJapanese,
        sectionIndex: context.sectionIndex,
        sentenceIndex: context.sentenceIndex,
        tokenIndex,
        tokenType,
        pos: tokenType,
        baseForm: normalizedSurface || surface,
        reading: null
      };
    }

    // =========================
    // [NUEVO Fase 2] Token cache / memoization + render layer
    // =========================
    function cacheTokenizationResult(cacheKey, payload) {
      state.sentenceTokenCache.set(cacheKey, payload);
      return payload;
    }

    function shouldTokenizeCurrentView() {
      return state.readingMode === 'sentence';
    }

    function getTokenizedSentence(bookId, sectionIndex, sentenceIndex) {
      const section = state.sections[sectionIndex];
      if (!section) return { sentence: '', tokens: [] };
      const sentences = getSentencesForSection(section);
      const sentence = sentences[sentenceIndex] || '';
      const cacheKey = `${bookId || 'book'}::${section.path}::${sentenceIndex}::${sentence}`;
      const cached = state.sentenceTokenCache.get(cacheKey);
      if (cached) return cached;

      const raw = tokenizeJapaneseText(sentence);
      const tokens = raw.map((tk, tokenIndex) => buildTokenModel(tk, {
        bookId,
        sectionIndex,
        sentenceIndex,
        tokenIndex
      }));
      return cacheTokenizationResult(cacheKey, { sentence, tokens });
    }

    function attachTokenMetadata(token) {
      const debug = `${token.pos}${token.baseForm ? ` · ${token.baseForm}` : ''}`;
      const interactive = isInteractiveToken(token);
      const identity = interactive ? getTokenIdentity(token) : null;
      const knownLevel = identity ? state.vocabMap.get(identity.vocabKey)?.familiarityLevel : null;
      return [
        `class="token ${token.isJapanese ? 'jp' : ''} ${token.pos === 'punct' ? 'punct' : ''} ${interactive ? 'clickable' : ''} ${knownLevel ? `known-level-${knownLevel}` : ''} ${state.settings.tokenDebug ? 'dbg' : ''}"`,
        `data-token-id="${escapeHtml(token.id)}"`,
        `data-section-index="${token.sectionIndex}"`,
        `data-sentence-index="${token.sentenceIndex}"`,
        `data-token-index="${token.tokenIndex}"`,
        `data-interactive="${interactive ? '1' : '0'}"`,
        identity ? `data-vocab-key="${escapeHtml(identity.vocabKey)}"` : '',
        `data-surface="${escapeHtml(token.surface)}"`,
        `data-base-form="${escapeHtml(token.baseForm || '')}"`,
        `data-pos="${escapeHtml(token.pos || '')}"`,
        state.settings.tokenDebug ? `data-debug="${escapeHtml(debug)}"` : ''
      ].filter(Boolean).join(' ');
    }

    function renderSentenceTokens(tokens, options = {}) {
      const { segmented = false } = options;
      return `<div class="segmented-line ${segmented ? '' : 'compact'}">${
        tokens.map((token) => `<span ${renderTokenWithKnowledgeState(token)}>${escapeHtml(token.surface)}</span>`).join('')
      }</div>`;
    }

    function renderSegmentedSentence(payload, options = {}) {
      if (!payload?.tokens?.length) return escapeHtml(payload?.sentence || '');
      return renderSentenceTokens(payload.tokens, options);
    }

    // =========================
    // [NUEVO Fase 3] Vocabulary data model / deduplicación
    // =========================
    function isInteractiveToken(token) {
      if (!token) return false;
      if (!token.isJapanese) return false;
      if (!token.normalizedSurface) return false;
      return token.tokenType !== 'punct' && token.tokenType !== 'space' && token.tokenType !== 'empty';
    }

    function buildVocabKey(token) {
      // Estrategia Fase 3: preferir lemma/baseForm (si hay), fallback a normalizedSurface.
      // Fase 4 podrá refinar usando datos léxicos más ricos.
      const lemma = normalizeTokenSurface(token?.baseForm || '');
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const normalizedKey = lemma || normalizedSurface;
      return normalizedKey ? `jp:${normalizedKey}` : '';
    }

    function getTokenIdentity(token) {
      const normalizedSurface = normalizeTokenSurface(token?.normalizedSurface || token?.surface || '');
      const vocabKey = buildVocabKey(token);
      return { vocabKey, normalizedKey: vocabKey.replace(/^jp:/, ''), normalizedSurface };
    }

    async function loadVocabularyMap() {
      const entries = await dbGetAll(STORES.vocabEntries);
      state.vocabMap = new Map(entries.map((entry) => [entry.vocabKey, entry]));
      return state.vocabMap;
    }

    async function loadVocabEntryByKey(key) {
      if (!key) return null;
      if (state.vocabMap.has(key)) return state.vocabMap.get(key);
      const entry = await dbGetByIndex(STORES.vocabEntries, 'vocabKey', key);
      if (entry) state.vocabMap.set(key, entry);
      return entry;
    }

    async function upsertVocabEntryFromToken(token, context = {}) {
      const identity = getTokenIdentity(token);
      if (!identity.vocabKey) return null;
      const now = new Date().toISOString();
      const existing = await loadVocabEntryByKey(identity.vocabKey);
      const sourceBookIds = new Set(existing?.sourceBookIds || []);
      if (context.bookId) sourceBookIds.add(context.bookId);
      const entry = {
        id: existing?.id || uuid(),
        vocabKey: identity.vocabKey,
        normalizedKey: identity.normalizedKey,
        surface: token.surface || existing?.surface || identity.normalizedSurface,
        lemma: token.baseForm || existing?.lemma || null,
        reading: token.reading || existing?.reading || null,
        pos: token.pos || existing?.pos || null,
        familiarityLevel: existing?.familiarityLevel ?? null,
        firstSeenAt: existing?.firstSeenAt || now,
        lastSeenAt: now,
        timesClicked: (existing?.timesClicked || 0) + 1,
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        sourceBookIds: [...sourceBookIds]
      };
      await dbPut(STORES.vocabEntries, entry);
      state.vocabMap.set(entry.vocabKey, entry);
      return entry;
    }

    async function setTokenFamiliarity(vocabKey, level) {
      const existing = await loadVocabEntryByKey(vocabKey);
      if (!existing) return null;
      const next = {
        ...existing,
        familiarityLevel: level == null ? null : Number(level),
        updatedAt: new Date().toISOString()
      };
      await dbPut(STORES.vocabEntries, next);
      state.vocabMap.set(next.vocabKey, next);
      return next;
    }

    // =========================
    // [NUEVO Fase 3] Token interaction + panel + familiarity rendering
    // =========================
    function closeTokenPanel() {
      state.tokenSelection = { token: null, entry: null, draftLevel: null };
      const host = $('#tokenPanelHost');
      if (host) host.innerHTML = '';
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.remove('with-panel');
    }

    function renderTokenWithKnowledgeState(token) {
      return attachTokenMetadata(token);
    }

    function renderTokenPanel() {
      const host = $('#tokenPanelHost');
      if (!host) return;
      const { token, entry, draftLevel } = state.tokenSelection;
      if (!token || !entry) {
        host.innerHTML = '';
        return;
      }
      host.innerHTML = `
        <aside class="token-panel" role="dialog" aria-label="Detalle de token">
          <div class="toolbar" style="margin-bottom: 8px;">
            <h3>Token seleccionado</h3>
            <div class="spacer"></div>
            <button id="closeTokenPanelBtn">Cerrar</button>
          </div>
          <div class="token-grid">
            <span class="k">surface</span><span class="v">${escapeHtml(token.surface || '—')}</span>
            <span class="k">normalizedSurface</span><span class="v">${escapeHtml(getTokenIdentity(token).normalizedSurface || '—')}</span>
            <span class="k">lemma/baseForm</span><span class="v">${escapeHtml(token.baseForm || '—')}</span>
            <span class="k">reading</span><span class="v">${escapeHtml(token.reading || '—')}</span>
            <span class="k">pos</span><span class="v">${escapeHtml(token.pos || '—')}</span>
            <span class="k">vocabKey</span><span class="v">${escapeHtml(entry.vocabKey)}</span>
          </div>
          <div class="level-picker" aria-label="Nivel de conocimiento">
            ${[1,2,3,4,5].map((lvl) => `<button class="level-btn ${Number(draftLevel) === lvl ? 'active' : ''}" data-level="${lvl}">${lvl}</button>`).join('')}
            <button class="level-btn ${draftLevel == null ? 'active' : ''}" data-level="">Sin valorar</button>
          </div>
          <p class="status" style="margin: 8px 0 0;">Clicks: ${entry.timesClicked || 0} · Última vez: ${formatDate(entry.lastSeenAt)}</p>
        </aside>
      `;
      const readerContent = $('.reader-content');
      if (readerContent) readerContent.classList.add('with-panel');
      $('#closeTokenPanelBtn')?.addEventListener('click', closeTokenPanel);
      host.querySelectorAll('[data-level]').forEach((btn) => btn.addEventListener('click', async () => {
        const rawLevel = btn.dataset.level;
        const level = rawLevel ? Number(rawLevel) : null;
        const updated = await setTokenFamiliarity(entry.vocabKey, level);
        if (!updated) return;
        state.tokenSelection.entry = updated;
        state.tokenSelection.draftLevel = updated.familiarityLevel;
        applyFamiliarityStyles(updated.vocabKey, updated.familiarityLevel);
        renderTokenPanel();
      }));
    }

    function applyFamiliarityStyles(vocabKey, level) {
      document.querySelectorAll(`[data-vocab-key="${CSS.escape(vocabKey)}"]`).forEach((node) => {
        for (let i = 1; i <= 5; i++) node.classList.remove(`known-level-${i}`);
        if (level) node.classList.add(`known-level-${level}`);
      });
    }

    async function openTokenPanel(token, context = {}) {
      if (!isInteractiveToken(token)) return;
      const entry = await upsertVocabEntryFromToken(token, context);
      if (!entry) return;
      state.tokenSelection = {
        token,
        entry,
        draftLevel: entry.familiarityLevel ?? null
      };
      renderTokenPanel();
      applyFamiliarityStyles(entry.vocabKey, entry.familiarityLevel);
    }

    function getTokenFromElement(el) {
      if (!el) return null;
      const surface = el.dataset.surface || '';
      const tokenType = classifyToken(surface);
      return {
        id: el.dataset.tokenId,
        surface,
        normalizedSurface: normalizeTokenSurface(surface),
        baseForm: el.dataset.baseForm || normalizeTokenSurface(surface),
        pos: el.dataset.pos || tokenType,
        reading: null,
        isJapanese: isJapaneseText(surface),
        tokenType,
        sectionIndex: Number(el.dataset.sectionIndex),
        sentenceIndex: Number(el.dataset.sentenceIndex),
        tokenIndex: Number(el.dataset.tokenIndex)
      };
    }

    // =========================
    // Lógica del lector
    // =========================
    async function openReader(bookId) {
      const book = state.books.find((b) => b.id === bookId);
      if (!book) return;
      const blob = await loadBookBlob(bookId);
      if (!blob) return alert('No se encontró el archivo EPUB asociado.');

      const epubMap = await unzipEpub(await blob.arrayBuffer());
      const parsed = await extractReadableSections(epubMap);
      if (!parsed.sections.length) return alert('No se encontraron secciones legibles en este EPUB.');

      const progress = await loadReadingProgress(bookId);
      state.currentBook = { ...book, parsedTitle: parsed.title, parsedAuthor: parsed.author };
      state.currentBookId = bookId;
      state.sections = parsed.sections;
      state.currentSpineIndex = Math.min(progress?.currentSectionIndex || 0, parsed.sections.length - 1);
      state.readingMode = progress?.readingMode || 'page';
      state.currentSentenceIndex = progress?.currentSentenceIndex || 0;
      state.sectionSentencesCache.clear();
      state.sentenceTokenCache.clear();

      await dbPut(STORES.books, { ...book, lastOpenedAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      await saveSettings({ lastOpenedBookId: bookId });
      state.route = 'reader';
      await refreshBooks();
      renderReaderView();
    }

    async function persistCurrentProgress() {
      if (!state.currentBookId) return;
      const percent = ((state.currentSpineIndex + 1) / Math.max(state.sections.length, 1)) * 100;
      await saveReadingProgress(state.currentBookId, {
        readingMode: state.readingMode,
        currentLocation: state.sections[state.currentSpineIndex]?.path || null,
        currentSectionIndex: state.currentSpineIndex,
        currentSentenceIndex: state.currentSentenceIndex,
        percent: Number(percent.toFixed(2))
      });
    }

    async function setReadingMode(mode) {
      state.readingMode = mode;
      if (mode === 'sentence') state.currentSentenceIndex = 0;
      closeTokenPanel();
      await persistCurrentProgress();
      renderReaderView();
    }

    async function nextStep() {
      closeTokenPanel();
      if (state.readingMode === 'page') {
        if (state.currentSpineIndex < state.sections.length - 1) state.currentSpineIndex++;
      } else {
        const sents = getSentencesForSection(state.sections[state.currentSpineIndex]);
        if (state.currentSentenceIndex < sents.length - 1) state.currentSentenceIndex++;
        else if (state.currentSpineIndex < state.sections.length - 1) {
          state.currentSpineIndex++;
          state.currentSentenceIndex = 0;
        }
      }
      await persistCurrentProgress();
      renderReaderView();
    }

    async function prevStep() {
      closeTokenPanel();
      if (state.readingMode === 'page') {
        if (state.currentSpineIndex > 0) state.currentSpineIndex--;
      } else {
        if (state.currentSentenceIndex > 0) state.currentSentenceIndex--;
        else if (state.currentSpineIndex > 0) {
          state.currentSpineIndex--;
          const sents = getSentencesForSection(state.sections[state.currentSpineIndex]);
          state.currentSentenceIndex = Math.max(0, sents.length - 1);
        }
      }
      await persistCurrentProgress();
      renderReaderView();
    }

    // =========================
    // [NUEVO Fase 3] Vocabulary list view
    // =========================
    function filterVocabularyEntries(entries, query, levelFilter) {
      const q = (query || '').trim().toLowerCase();
      return entries.filter((entry) => {
        const levelOk = levelFilter === 'all'
          ? true
          : String(entry.familiarityLevel ?? 'none') === String(levelFilter);
        if (!levelOk) return false;
        if (!q) return true;
        const haystack = [entry.surface, entry.lemma, entry.reading, entry.normalizedKey].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }

    async function updateVocabularyEntryLevel(vocabKey, level) {
      await setTokenFamiliarity(vocabKey, level);
      await renderVocabularyView();
    }

    async function renderVocabularyView() {
      state.route = 'vocabulary';
      const app = $('#app');
      const allEntries = [...state.vocabMap.values()].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      const entries = filterVocabularyEntries(allEntries, state.vocabFilters.query, state.vocabFilters.level);
      app.innerHTML = `
        <div class="card">
          <div class="toolbar">
            <button id="backLibraryBtn">← Biblioteca</button>
            <h1 style="margin:0;font-size:1.2rem;">🧠 Vocabulario (Fase 3)</h1>
            <div class="spacer"></div>
            <input id="vocabSearch" placeholder="Buscar surface / lemma / reading" value="${escapeHtml(state.vocabFilters.query)}" />
            <label>Nivel
              <select id="vocabLevelFilter">
                <option value="all">Todos</option>
                <option value="none">Sin valorar</option>
                ${[1,2,3,4,5].map((n) => `<option value="${n}">${n}</option>`).join('')}
              </select>
            </label>
          </div>
          <p class="status">Entradas: ${entries.length} (total: ${allEntries.length}). Sin diccionario ni traducciones en Fase 3.</p>
          <div class="vocab-list">
            ${entries.length ? entries.map((entry) => `
              <article class="vocab-item">
                <div class="vocab-main">
                  <strong>${escapeHtml(entry.surface || entry.normalizedKey)}</strong>
                  <span class="badge">${escapeHtml(entry.lemma || 'lemma: —')}</span>
                  <span class="badge">${escapeHtml(entry.reading || 'reading: —')}</span>
                  <span class="badge">${escapeHtml(entry.pos || 'pos: —')}</span>
                  <span class="badge level">Nivel: ${entry.familiarityLevel ?? 'Sin valorar'}</span>
                </div>
                <p class="meta">Apariciones pulsadas: ${entry.timesClicked || 0} · Primera vez: ${formatDate(entry.firstSeenAt)} · Última actualización: ${formatDate(entry.updatedAt)}</p>
                <div class="toolbar" style="margin-top: 6px;">
                  ${[1,2,3,4,5].map((lvl) => `<button data-vocab-level="${lvl}" data-vocab-key="${escapeHtml(entry.vocabKey)}">${lvl}</button>`).join('')}
                  <button data-vocab-level="" data-vocab-key="${escapeHtml(entry.vocabKey)}">Sin valorar</button>
                </div>
              </article>
            `).join('') : `<div class="empty">Todavía no has seleccionado palabras en el lector.</div>`}
          </div>
        </div>
      `;
      $('#vocabLevelFilter').value = state.vocabFilters.level;
      $('#backLibraryBtn').addEventListener('click', renderLibraryView);
      $('#vocabSearch').addEventListener('input', (e) => {
        state.vocabFilters.query = e.target.value || '';
        renderVocabularyView();
      });
      $('#vocabLevelFilter').addEventListener('change', (e) => {
        state.vocabFilters.level = e.target.value;
        renderVocabularyView();
      });
      app.querySelectorAll('[data-vocab-key]').forEach((btn) => btn.addEventListener('click', () => {
        const level = btn.dataset.vocabLevel ? Number(btn.dataset.vocabLevel) : null;
        updateVocabularyEntryLevel(btn.dataset.vocabKey, level);
      }));
    }

    // =========================
    // Renderizado UI + Router
    // =========================
    async function refreshBooks() {
      state.books = await listBooks();
    }

    function getBookProgress(bookId) {
      return dbGet(STORES.progress, bookId);
    }

    async function renderLibraryView() {
      state.route = 'library';
      const app = $('#app');
      const progressMap = new Map();
      for (const b of state.books) progressMap.set(b.id, await getBookProgress(b.id));

      app.innerHTML = `
        <div class="card">
          <div class="toolbar">
            <h1 style="margin:0;font-size:1.3rem;">📚 JP EPUB Reader (Fase 3)</h1>
            <div class="spacer"></div>
            <button id="openVocabBtn">Vocabulario</button>
            <label><span class="hidden">Subir EPUB</span><input id="epubInput" type="file" accept=".epub,application/epub+zip" multiple /></label>
            <button id="toggleTheme" title="Cambiar tema">Tema: ${state.settings.theme === 'dark' ? 'Oscuro' : 'Claro'}</button>
          </div>
          ${state.books.length ? `<div class="book-grid">${state.books.map((b) => {
            const pg = progressMap.get(b.id);
            return `
              <article class="card book-item">
                ${b.cover ? `<img class="cover" src="${b.cover}" alt="Portada de ${escapeHtml(b.title)}" />` : `<div class="cover"></div>`}
                <div>

                  <p class="meta">Autor: ${escapeHtml(b.author || 'Desconocido')}</p>

                  <p class="meta">Último acceso: ${formatDate(b.lastOpenedAt)}</p>
                  <p class="meta">Progreso: ${pg?.percent != null ? `${pg.percent}% (${pg.readingMode})` : 'Sin iniciar'}</p>
                  <div class="toolbar" style="margin-top:8px;">
                    <button data-open="${b.id}" class="primary">Abrir</button>
                    <button data-delete="${b.id}" class="danger">Borrar</button>
                  </div>
                </div>
              </article>`;
          }).join('')}</div>` : `<div class="empty">No hay libros todavía. Sube uno o varios EPUB para comenzar.</div>`}
        </div>`;

      $('#epubInput').addEventListener('change', async (e) => {
        const files = [...e.target.files || []].filter((f) => f.name.toLowerCase().endsWith('.epub'));
        if (!files.length) return;
        await importEpubFiles(files);
      });

      $('#toggleTheme').addEventListener('click', async () => {
        const next = state.settings.theme === 'dark' ? 'light' : 'dark';
        await saveSettings({ theme: next });
        renderLibraryView();
      });
      $('#openVocabBtn').addEventListener('click', renderVocabularyView);

      app.querySelectorAll('[data-open]').forEach((btn) => btn.addEventListener('click', () => openReader(btn.dataset.open)));
      app.querySelectorAll('[data-delete]').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm('¿Seguro que quieres borrar este libro y su progreso?')) return;
        await deleteBook(btn.dataset.delete);
        await refreshBooks();
        renderLibraryView();
      }));
    }

    function renderPageMode(section) {
      const html = `<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:serif;line-height:1.8;font-size:${state.settings.fontSize}px;padding:8px;color:${state.settings.theme==='dark'?'#e5e7eb':'#1f2430'};background:${state.settings.theme==='dark'?'#111827':'#fff'};max-width:100%;}img{max-width:100%;height:auto;}a{color:inherit;text-decoration:underline;}</style></head><body>${section.html}</body></html>`;
      return `<iframe title="Contenido EPUB" srcdoc="${escapeHtml(html)}"></iframe>`;
    }

    function renderSentenceMode(section) {
      const sentences = getSentencesForSection(section);
      const idx = Math.max(0, Math.min(state.currentSentenceIndex, Math.max(0, sentences.length - 1)));
      const tokenized = shouldTokenizeCurrentView()
        ? getTokenizedSentence(state.currentBookId, state.currentSpineIndex, idx)
        : { sentence: sentences[idx] || '', tokens: [] };
      const sentence = tokenized.sentence || 'Sin texto legible en esta sección.';
      const sentenceHtml = tokenized.tokens.length
        ? renderSegmentedSentence(tokenized, { segmented: state.settings.showSegmentation })
        : escapeHtml(sentence);
      return `
        <div class="sentence-box">${sentenceHtml}</div>
        <p class="status">Tokenización: ${tokenized.tokens.length} tokens analizados. ${state.settings.showSegmentation ? 'Segmentación visible.' : 'Segmentación oculta.'}</p>
        <p class="status">Frase ${Math.min(idx + 1, Math.max(sentences.length, 1))} de ${Math.max(sentences.length, 1)} en esta sección.</p>
        <div id="tokenPanelHost"></div>
      `;
    }

    async function renderReaderView() {
      if (!state.currentBook) return renderLibraryView();
      const app = $('#app');
      const section = state.sections[state.currentSpineIndex];
      const percent = Math.round(((state.currentSpineIndex + 1) / state.sections.length) * 100);

      app.innerHTML = `
        <div class="reader-shell">
          <div class="card">
            <div class="toolbar">
              <button id="backBtn">← Biblioteca</button>
              <button id="openVocabReaderBtn">Vocabulario</button>
              <strong>${escapeHtml(state.currentBook.parsedTitle || state.currentBook.title)}</strong>
              <span class="status">${escapeHtml(state.currentBook.parsedAuthor || state.currentBook.author || 'Autor desconocido')}</span>
              <div class="spacer"></div>

                <select id="themeSelect"><option value="light">Claro</option><option value="dark">Oscuro</option></select>

              <label>Fuente
                <input id="fontSize" type="range" min="14" max="30" step="1" value="${state.settings.fontSize}" />
              </label>
            </div>
            <div class="toolbar">
              <button id="prevBtn">Anterior</button>
              <button id="nextBtn" class="primary">Siguiente</button>
              <label>Modo
                <select id="modeSelect"><option value="page">Página</option><option value="sentence">Frase</option></select>
              </label>
              <label>Capítulo
                <select id="sectionSelect">${state.sections.map((s, i) => `<option value="${i}">${i+1}. ${escapeHtml(s.title)}</option>`).join('')}</select>
              </label>
              <label title="Muestra los tokens visualmente en modo frase">
                <input id="segmentationToggle" type="checkbox" ${state.settings.showSegmentation ? 'checked' : ''} />
                Mostrar segmentación
              </label>
              <label title="Muestra metadatos básicos de token (depuración)">
                <input id="tokenDebugToggle" type="checkbox" ${state.settings.tokenDebug ? 'checked' : ''} />
                Debug tokens
              </label>
              <span class="status">Progreso aprox.: ${percent}% (${state.currentSpineIndex + 1}/${state.sections.length})</span>

          </div>

      $('#themeSelect').value = state.settings.theme;
      $('#modeSelect').value = state.readingMode;
      $('#sectionSelect').value = String(state.currentSpineIndex);

      $('#backBtn').addEventListener('click', async () => {
        closeTokenPanel();
        await persistCurrentProgress();
        await refreshBooks();
        renderLibraryView();

      $('#openVocabReaderBtn').addEventListener('click', async () => {
        await persistCurrentProgress();
        renderVocabularyView();
      });
      $('#prevBtn').addEventListener('click', prevStep);
      $('#nextBtn').addEventListener('click', nextStep);
      $('#modeSelect').addEventListener('change', (e) => setReadingMode(e.target.value));
      $('#sectionSelect').addEventListener('change', async (e) => {
        state.currentSpineIndex = Number(e.target.value);
        state.currentSentenceIndex = 0;
        await persistCurrentProgress();
        renderReaderView();
      });
      $('#themeSelect').addEventListener('change', async (e) => {
        await saveSettings({ theme: e.target.value });
        renderReaderView();
      });
      $('#segmentationToggle').addEventListener('change', async (e) => {
        await saveSettings({ showSegmentation: e.target.checked });
        renderReaderView();
      });
      $('#tokenDebugToggle').addEventListener('change', async (e) => {
        await saveSettings({ tokenDebug: e.target.checked });
        renderReaderView();
      });
      $('#fontSize').addEventListener('input', async (e) => {
        await saveSettings({ fontSize: Number(e.target.value) });
        renderReaderView();
      });

      if (state.readingMode === 'sentence') {
        $('.sentence-box')?.addEventListener('click', async (e) => {
          const tokenEl = e.target.closest('.token[data-interactive="1"]');
          if (!tokenEl) return;
          const token = getTokenFromElement(tokenEl);
          await openTokenPanel(token, { bookId: state.currentBookId });
        });
      }
    }

    // =========================
    // Preferencias + SW
    // =========================
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
    }

    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        await navigator.serviceWorker.register('./sw.js');
      } catch (e) {
        console.warn('No se pudo registrar SW', e);
      }
    }

    // =========================
    // Inicialización
    // =========================
    (async function init() {
      await loadSettings();
      await refreshBooks();
      await loadVocabularyMap();
      await registerServiceWorker();
      renderLibraryView();
      if (state.settings.lastOpenedBookId && state.books.some((b) => b.id === state.settings.lastOpenedBookId)) {
        // Punto de extensión futuro: restaurar auto-apertura configurable.
      }
    })();

    // Punto de extensión futuro (Fase 4):
    // El panel de token ya guarda familiaridad y metadatos básicos.
    // Aquí se podrá conectar lookup de diccionario/definiciones sin romper la base Fase 3.
  </script>
</body>
</html>
